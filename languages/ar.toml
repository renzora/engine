"export.cap.solari.help" = "إضاءة Bevy Solari المباشرة وغير المباشرة بتتبع الأشعة العتادي (DI + GI). مفعّلة فقط عند استخدام إضافة Solari."
"export.cap.meshlets.help" = "تصيير meshlets تجريبي مع معالجه المعتمد على metis. نادر الاستخدام؛ كبير الحجم."
"export.cap.feathers.help" = "مجموعة أدوات عناصر Bevy — غير مستخدمة في واجهة Renzora الخاصة."
"export.cap.remote_assets.help" = "تحميل الأصول عبر http/https أثناء التشغيل — يجلب حزمة TLS الكاملة rustls/ring/ureq (عدة ميغابايت). معطّل للعبة تشحن بأصول محلية (rpak)."
"export.cap.asset_pipeline.help" = "معالجة الأصول دون اتصال وحفظ الصور المضغوطة — أدوات للمحرر/التطوير، غير مطلوبة في لعبة مشحونة."
"export.cap.extra_shader_langs.help" = "دعم مظلِّلات GLSL وSPIR-V. مظلِّلات Renzora بصيغة WGSL/WESL، لذا فهذه غير مستخدمة."
"export.cap.editor_helpers.help" = "متحكمات الكاميرا الحرة/المحرّكة وتشخيصات معلومات النظام — للمحرر/التطوير فقط."
"export.cap.dev_extras.help" = "مراقبة الملفات لإعادة التحميل الفوري، سلاسل توثيق الانعكاس (تلميحات الفاحص)، الوصول للحافظة، اكتشاف خطوط النظام، ونظام إعدادات bevy — كلها للمحرر/التطوير فقط، دون أي استخدام في لعبة مشحونة. (خلفية الحافظة arboard تُجلب بشكل منفصل بواسطة المحرك وتحتاج بوابتها الخاصة للحفظ الكامل.)"
"export.cap.gizmos.help" = "bevy_gizmos + bevy_gizmos_render — رسم خطوط التصحيح بالوضع الفوري (~1.3 MiB). للمحرر/التصحيح فقط؛ نادرًا ما تستخدمها لعبة مشحونة. (أصبحت قابلة للإزالة الآن لأننا نملك بيان bevy الصريح — كانت ملحومة سابقًا في بيانات 2d/3d.) أداة تحويل المحرر هي حزمة منفصلة، renzora_gizmo، ولا تتأثر."
"export.cap.image_extra.help" = "كل فاكّ ترميز نسيج اختياري — DDS وJPEG وWebP وbasis-universal وEXR/HDR وTIFF وGIF وBMP وTGA وPNM وQOI. يُحتفظ دائمًا بـ PNG (مع zlib الخاص به) وKTX2 (أيقونة النافذة / النسيج المضغوط). تُفعّل تلقائيًا حسب ملفات الصور الموجودة فعليًا في المشروع، فاللعبة الخالية من الأنسجة أو ذات الصيغة الواحدة تُسقط فاكّات الترميز التي لا تستخدمها."
"export.cap.sky.help" = "الغلاف الجوي، صندوق السماء، السحب، نجوم الليل، خرائط البيئة. أسقطها للعبة 2D."
"export.cap.particles.help" = "نظام الجسيمات على GPU (bevy_hanabi). ~5 MB — أسقطه إذا لم يكن في لعبتك تأثيرات جسيمات."
"export.cap.postfx.help" = "التوهّج، SSAO، SSR، عمق المجال، تمويه الحركة، الضباب، OIT، إلخ. (يبقى تعيين النغمة.)"
"export.cap.water.help" = "نظام سطح الماء الفرعي."
"export.cap.terrain.help" = "نظام التضاريس الفرعي."
"export.cap.spline.help" = "نظام المنحنيات الفرعي."
"export.cap.navmesh.help" = "توليد شبكة التنقل وإيجاد المسارات (polyanya/vleue)."
"export.cap.physics.help" = "محرك الفيزياء للأجسام الصلبة avian (~6.5 MiB). يُشغّل أيضًا طفو الماء وعوائق مصادمات navmesh، التي تُزال معه. أسقطه للعبة بلا محاكاة فيزيائية."
"export.cap.render_3d.help" = "خط أنابيب 3D بأكمله: bevy_pbr (StandardMaterial، الظلال، المصيّر المؤجل/الأمامي)، تحميل نماذج glTF، ونظام خامات الرسم البياني renzora_shader (~10 MiB). معطّل = لعبة 2D فقط (سبرايتات + UI). لا تزال الأضواء/الغلاف الجوي تعمل (يُحتفظ بـ bevy_light). يتطلب إيقاف الأنظمة الفرعية 3D (التضاريس/الماء/السماء/ما بعد المعالجة) كذلك — فهي مبنية على bevy_pbr."
"export.cap.audio.help" = "نظام الصوت الفرعي. أسقطه للعبة صامتة."
"export.cap.animation.help" = "نظام الحركة الهيكلية/حركة الخصائص الفرعي."
"export.cap.blueprint.help" = "بيئة تشغيل البرمجة المرئية بالرسم البياني للعقد (~0.2 MiB). تُفعّل تلقائيًا عندما يحتوي المشروع على رسوم .blueprint/.bp."
"export.cap.rhai.help" = "خلفية نصوص Rhai (~2.3 MiB). تُضمّن Lua دائمًا؛ تُفعّل Rhai تلقائيًا فقط عندما يحتوي المشروع على نصوص .rhai."
"export.cap.script_http.help" = "أفعال HTTP للنصوص — تجلب حزمة ureq + rustls/ring TLS (~1 MiB). تُفعّل تلقائيًا عندما يستدعي نص http_get/http_post."
"export.cap.game_ui.help" = "نظام واجهة المستخدم داخل اللعبة الفرعي."
