"export.cap.solari.help" = "Аппаратное освещение Bevy Solari с трассировкой лучей — прямое и непрямое (DI + GI). Включается, только когда используется плагин Solari."
"export.cap.meshlets.help" = "Экспериментальный рендеринг meshlets и его обработчик на основе metis. Используется редко; большой."
"export.cap.feathers.help" = "Набор виджетов Bevy — не используется собственным UI Renzora."
"export.cap.remote_assets.help" = "Загрузка ресурсов по http/https во время выполнения — тянет за собой весь TLS-стек rustls/ring/ureq (несколько МБ). Отключено для игры, поставляемой с локальными (rpak) ресурсами."
"export.cap.asset_pipeline.help" = "Офлайн-обработка ресурсов и сохранение сжатых изображений — инструменты редактора/разработки, не нужны в готовой игре."
"export.cap.extra_shader_langs.help" = "Поддержка шейдеров GLSL и SPIR-V. Шейдеры Renzora написаны на WGSL/WESL, поэтому это не используется."
"export.cap.editor_helpers.help" = "Контроллеры свободной/панорамной камеры и диагностика системной информации — только для редактора/разработки."
"export.cap.dev_extras.help" = "Отслеживание файлов для горячей перезагрузки, строки документации рефлексии (подсказки в инспекторе), доступ к буферу обмена, обнаружение системных шрифтов и система настроек bevy — всё только для редактора/разработки, без какого-либо использования в готовой игре. (Бэкенд буфера обмена `arboard` подключается движком отдельно и требует собственного гейта для полного сохранения.)"
"export.cap.gizmos.help" = "bevy_gizmos + bevy_gizmos_render — отрисовка отладочных линий в immediate-режиме (~1.3 МиБ). Только для редактора/отладки; готовая игра редко это использует. (Теперь вырезаемо, поскольку мы владеем явным манифестом bevy — раньше это было встроено в мета-пакеты 2d/3d.) Гизмо трансформации редактора — это отдельный крейт renzora_gizmo, и его это не затрагивает."
"export.cap.image_extra.help" = "Все опциональные декодеры текстур — DDS, JPEG, WebP, basis-universal, EXR/HDR, TIFF, GIF, BMP, TGA, PNM, QOI. PNG (+ его zlib) и KTX2 сохраняются всегда (иконка окна / сжатые текстуры). Включается автоматически по файлам изображений, реально присутствующим в проекте, так что игра без текстур или с одним форматом отбрасывает декодеры, которые никогда не использует."
"export.cap.sky.help" = "Атмосфера, скайбокс, облака, ночные звёзды, карты окружения. Отбросьте для 2D-игры."
"export.cap.particles.help" = "Система частиц на GPU (bevy_hanabi). ~5 МБ — отбросьте, если в вашей игре нет эффектов частиц."
"export.cap.postfx.help" = "Свечение, SSAO, SSR, DoF, размытие движения, туман, OIT и т. д. (Тональная компрессия остаётся.)"
"export.cap.water.help" = "Подсистема поверхности воды."
"export.cap.terrain.help" = "Подсистема ландшафта."
"export.cap.spline.help" = "Подсистема сплайнов."
"export.cap.navmesh.help" = "Генерация навигационной сетки и поиск пути (polyanya/vleue)."
"export.cap.physics.help" = "Движок физики твёрдых тел avian (~6.5 МиБ). Также обеспечивает плавучесть воды и препятствия-коллайдеры navmesh, которые вырезаются вместе с ним. Отбросьте для игры без физического моделирования."
"export.cap.render_3d.help" = "Весь 3D-конвейер: bevy_pbr (StandardMaterial, тени, отложенный/прямой рендерер), загрузка моделей glTF и система графовых материалов renzora_shader (~10 МБ). ВЫКЛ = игра только в 2D (спрайты + UI). Источники света/атмосфера по-прежнему работают (bevy_light сохраняется). Требует, чтобы 3D-подсистемы (Ландшафт/Вода/Небо/Постобработка) тоже были выключены — они построены на bevy_pbr."
"export.cap.audio.help" = "Аудиоподсистема. Отбросьте для игры без звука."
"export.cap.animation.help" = "Подсистема скелетной анимации и анимации свойств."
"export.cap.blueprint.help" = "Среда выполнения визуального скриптинга на графах узлов (~0.2 МиБ). Включается автоматически, когда проект содержит графы .blueprint/.bp."
"export.cap.rhai.help" = "Бэкенд скриптов Rhai (~2.3 МиБ). Lua включён всегда; Rhai включается автоматически, только когда проект содержит скрипты .rhai."
"export.cap.script_http.help" = "HTTP-команды скриптов — тянут TLS-стек ureq + rustls/ring (~1 МБ). Включается автоматически, когда скрипт вызывает http_get/http_post."
"export.cap.game_ui.help" = "Подсистема внутриигрового UI."
