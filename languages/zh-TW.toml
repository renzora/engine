"export.cap.solari.help" = "Bevy Solari 硬體光線追蹤直接 + 間接光照 (DI + GI)。僅在使用 Solari 外掛時啟用。"
"export.cap.meshlets.help" = "實驗性的 meshlets 算繪及其基於 metis 的處理器。鮮少使用；體積龐大。"
"export.cap.feathers.help" = "Bevy 的元件工具組——Renzora 自家的 UI 並未使用。"
"export.cap.remote_assets.help" = "在執行階段透過 http/https 載入資產——會拉入整個 rustls/ring/ureq TLS 堆疊（數 MB）。對於使用本機 (rpak) 資產的遊戲應關閉。"
"export.cap.asset_pipeline.help" = "離線資產處理與壓縮影像儲存——屬於編輯器/開發工具，已發行的遊戲不需要。"
"export.cap.extra_shader_langs.help" = "GLSL 與 SPIR-V 著色器支援。Renzora 的著色器為 WGSL/WESL，因此用不到。"
"export.cap.editor_helpers.help" = "自由/平移攝影機控制器與系統資訊診斷——僅限編輯器/開發。"
"export.cap.dev_extras.help" = "熱重載檔案監看、反射文件字串（檢視器工具提示）、剪貼簿存取、作業系統字型探索，以及 Bevy 的設定系統——全部僅限編輯器/開發，在已發行的遊戲中完全用不到。（剪貼簿的 arboard 後端由引擎另行拉入，需自有的閘門才能完整移除。）"
"export.cap.gizmos.help" = "bevy_gizmos + bevy_gizmos_render——即時模式除錯線繪製（約 1.3 MiB）。僅限編輯器/除錯；已發行的遊戲鮮少使用。（現在可移除，因為我們擁有明確的 bevy 資訊清單——以往它被熔接在 2D/3D meta 中。）編輯器的變換 gizmo 是獨立的 crate renzora_gizmo，不受影響。"
"export.cap.image_extra.help" = "所有選用的紋理解碼器——DDS、JPEG、WebP、basis-universal、EXR/HDR、TIFF、GIF、BMP、TGA、PNM、QOI。PNG（含其 zlib）與 KTX2 一律保留（視窗圖示／壓縮紋理）。會依專案中實際存在的影像檔自動啟用，因此無紋理或單一格式的遊戲會捨棄用不到的解碼器。"
"export.cap.sky.help" = "大氣、天空盒、雲層、夜空繁星、環境貼圖。2D 遊戲可捨棄。"
"export.cap.particles.help" = "GPU 粒子系統 (bevy_hanabi)。約 5 MB——若遊戲沒有粒子特效可捨棄。"
"export.cap.postfx.help" = "泛光、SSAO、SSR、DoF、動態模糊、霧、OIT 等。（色調映射會保留。）"
"export.cap.water.help" = "水面子系統。"
"export.cap.terrain.help" = "地形子系統。"
"export.cap.spline.help" = "曲線子系統。"
"export.cap.navmesh.help" = "導航網格生成與尋路 (polyanya/vleue)。"
"export.cap.physics.help" = "avian 剛體物理引擎（約 6.5 MiB）。同時驅動水體浮力與導航網格碰撞體障礙物，兩者會隨之一併移除。沒有物理模擬的遊戲可捨棄。"
"export.cap.render_3d.help" = "整個 3D 管線：bevy_pbr（StandardMaterial、陰影、Deferred/Forward 算繪器）、glTF 模型載入，以及 renzora_shader 圖形材質系統（約 10 MiB）。關閉 = 純 2D 遊戲（精靈 + UI）。光源/大氣仍可運作（bevy_light 會保留）。需要 3D 子系統（地形/水體/天空/後製）同時關閉——它們建構於 bevy_pbr 之上。"
"export.cap.audio.help" = "音訊子系統。無聲的遊戲可捨棄。"
"export.cap.animation.help" = "骨骼/屬性動畫子系統。"
"export.cap.blueprint.help" = "節點圖視覺化腳本執行階段（約 0.2 MiB）。當專案包含 .blueprint/.bp 圖時自動啟用。"
"export.cap.rhai.help" = "Rhai 腳本後端（約 2.3 MiB）。Lua 一律包含；Rhai 僅在專案包含 .rhai 腳本時自動啟用。"
"export.cap.script_http.help" = "腳本 HTTP 動詞——會拉入 ureq + rustls/ring TLS 堆疊（約 1 MiB）。當腳本呼叫 http_get/http_post 時自動啟用。"
"export.cap.game_ui.help" = "遊戲內 UI 子系統。"
