"export.cap.solari.help" = "Апаратно трасоване пряме та непряме освітлення Bevy Solari (DI + GI). Увімкнено лише коли використовується плагін Solari."
"export.cap.meshlets.help" = "Експериментальний рендеринг meshlets + його обробник на основі metis. Рідко використовується; великий."
"export.cap.feathers.help" = "Набір віджетів Bevy — не використовується власним UI Renzora."
"export.cap.remote_assets.help" = "Завантаження ресурсів через http/https під час виконання — тягне за собою весь TLS-стек rustls/ring/ureq (кілька MB). Вимкнено для гри, що постачає локальні (rpak) ресурси."
"export.cap.asset_pipeline.help" = "Офлайн-обробка ресурсів і збереження стиснених зображень — інструменти редактора/розробки, не потрібні у готовій грі."
"export.cap.extra_shader_langs.help" = "Підтримка шейдерів GLSL і SPIR-V. Шейдери Renzora — WGSL/WESL, тож вони не використовуються."
"export.cap.editor_helpers.help" = "Контролери вільної/панорамної камери та діагностика системної інформації — лише для редактора/розробки."
"export.cap.dev_extras.help" = "Спостереження за файлами для гарячого перезавантаження, рядки документації рефлексії (підказки інспектора), доступ до буфера обміну, виявлення системних шрифтів та система налаштувань bevy — усе лише для редактора/розробки, з нульовим використанням у готовій грі. (Бекенд `arboard` для буфера обміну підтягується рушієм окремо й потребує власного гейту для повної економії.)"
"export.cap.gizmos.help" = "bevy_gizmos + bevy_gizmos_render — малювання налагоджувальних ліній у безпосередньому режимі (~1.3 MiB). Лише для редактора/налагодження; готова гра рідко це використовує. (Тепер можна вирізати, бо ми володіємо явним маніфестом bevy — раніше це було вшито у мета-пакети 2d/3d.) Гізмо трансформації редактора — це окремий крейт, renzora_gizmo, і його це не стосується."
"export.cap.image_extra.help" = "Кожен необов'язковий декодер текстур — DDS, JPEG, WebP, basis-universal, EXR/HDR, TIFF, GIF, BMP, TGA, PNM, QOI. PNG (+ його zlib) і KTX2 зберігаються завжди (іконка вікна / стиснені текстури). Вмикається автоматично за фактичними файлами зображень у проєкті, тож гра без текстур або з одним форматом відкидає декодери, які ніколи не використовує."
"export.cap.sky.help" = "Атмосфера, skybox, хмари, нічні зорі, карти оточення. Вимкніть для 2D-гри."
"export.cap.particles.help" = "GPU-система частинок (bevy_hanabi). ~5 MB — вимкніть, якщо у вашій грі немає ефектів частинок."
"export.cap.postfx.help" = "Bloom, SSAO, SSR, DoF, розмиття руху, туман, OIT тощо. (Тонмапінг залишається.)"
"export.cap.water.help" = "Підсистема водної поверхні."
"export.cap.terrain.help" = "Підсистема ландшафту."
"export.cap.spline.help" = "Підсистема сплайнів."
"export.cap.navmesh.help" = "Генерація навігаційної сітки та пошук шляху (polyanya/vleue)."
"export.cap.physics.help" = "Фізичний рушій твердих тіл avian (~6.5 MiB). Також забезпечує плавучість на воді та перешкоди-колайдери navmesh, які вирізаються разом із ним. Вимкніть для гри без фізичної симуляції."
"export.cap.render_3d.help" = "Увесь 3D-конвеєр: bevy_pbr (StandardMaterial, тіні, deferred/forward рендерер), завантаження моделей glTF та система графових матеріалів renzora_shader (~10 MiB). ВИМК = гра лише з 2D (спрайти + UI). Світло/атмосфера все ще працюють (bevy_light зберігається). Потребує, щоб 3D-підсистеми (Ландшафт/Вода/Небо/Post-FX) також були вимкнені — вони базуються на bevy_pbr."
"export.cap.audio.help" = "Аудіопідсистема. Вимкніть для гри без звуку."
"export.cap.animation.help" = "Підсистема скелетної/властивісної анімації."
"export.cap.blueprint.help" = "Середовище виконання візуального скриптингу на основі графа вузлів (~0.2 MiB). Вмикається автоматично, коли проєкт містить графи .blueprint/.bp."
"export.cap.rhai.help" = "Бекенд скриптів Rhai (~2.3 MiB). Lua включено завжди; Rhai вмикається автоматично лише коли проєкт містить скрипти .rhai."
"export.cap.script_http.help" = "HTTP-дієслова скриптів — тягнуть TLS-стек ureq + rustls/ring (~1 MiB). Вмикається автоматично, коли скрипт викликає http_get/http_post."
"export.cap.game_ui.help" = "Підсистема внутрішньоігрового UI."
