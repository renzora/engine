"export.cap.solari.help" = "Bevy Solari hardware-raytraced direkte + indirekte Beleuchtung (DI + GI). Nur aktiv, wenn das Solari-Plugin verwendet wird."
"export.cap.meshlets.help" = "Experimentelles meshlets-Rendering + sein Metis-basierter Prozessor. Selten genutzt; groß."
"export.cap.feathers.help" = "Bevys Widget-Toolkit — von Renzoras eigener UI nicht genutzt."
"export.cap.remote_assets.help" = "Laden von Assets über http/https zur Laufzeit — zieht den gesamten rustls/ring/ureq-TLS-Stack hinein (mehrere MB). Aus für ein Spiel, das lokale (rpak) Assets ausliefert."
"export.cap.asset_pipeline.help" = "Offline-Asset-Verarbeitung und Speichern komprimierter Bilder — Editor-/Dev-Werkzeuge, in einem ausgelieferten Spiel nicht nötig."
"export.cap.extra_shader_langs.help" = "Unterstützung für GLSL- und SPIR-V-Shader. Renzoras Shader sind WGSL/WESL, daher werden diese nicht genutzt."
"export.cap.editor_helpers.help" = "Frei-/Schwenk-Kamerasteuerungen und Systeminfo-Diagnostik — nur Editor/Dev."
"export.cap.dev_extras.help" = "Hot-Reload-Dateiüberwachung, Reflection-Doc-Strings (Inspector-Tooltips), Zwischenablagezugriff, OS-Schrifterkennung und Bevys Einstellungssystem — alles nur Editor/Dev, ohne jede Nutzung in einem ausgelieferten Spiel. (Das `arboard`-Backend der Zwischenablage wird separat von der Engine eingebunden und benötigt sein eigenes Gate für das vollständige Speichern.)"
"export.cap.gizmos.help" = "bevy_gizmos + bevy_gizmos_render — Debug-Linienzeichnung im Immediate-Mode (~1,3 MiB). Nur Editor/Debug; ein ausgeliefertes Spiel nutzt sie selten. (Jetzt strippbar, weil wir das explizite Bevy-Manifest besitzen — früher war sie in die 2d/3d-Metas eingeschweißt.) Das Transform-Gizmo des Editors ist ein separates Crate, renzora_gizmo, und bleibt davon unberührt."
"export.cap.image_extra.help" = "Jeder optionale Textur-Decoder — DDS, JPEG, WebP, basis-universal, EXR/HDR, TIFF, GIF, BMP, TGA, PNM, QOI. PNG (+ sein zlib) und KTX2 bleiben immer erhalten (Fenstersymbol / komprimierte Texturen). Automatisch aktiviert je nach den tatsächlich im Projekt vorhandenen Bilddateien, sodass ein texturloses oder einformatiges Spiel die nie genutzten Decoder weglässt."
"export.cap.sky.help" = "Atmosphäre, Skybox, Wolken, Nachtsterne, Umgebungskarten. Für ein 2D-Spiel weglassen."
"export.cap.particles.help" = "Das GPU-Partikelsystem (bevy_hanabi). ~5 MB — weglassen, wenn dein Spiel keine Partikeleffekte hat."
"export.cap.postfx.help" = "Bloom, SSAO, SSR, DoF, Bewegungsunschärfe, Nebel, OIT usw. (Tonemapping bleibt.)"
"export.cap.water.help" = "Das Wasseroberflächen-Subsystem."
"export.cap.terrain.help" = "Das Gelände-Subsystem."
"export.cap.spline.help" = "Das Spline-Subsystem."
"export.cap.navmesh.help" = "Navigationsnetz-Generierung und Pfadfindung (polyanya/vleue)."
"export.cap.physics.help" = "Die avian-Starrkörper-Physik-Engine (~6,5 MiB). Treibt auch Wasserauftrieb und NavMesh-Collider-Hindernisse an, die mit ihr entfernt werden. Für ein Spiel ohne Physiksimulation weglassen."
"export.cap.render_3d.help" = "Die gesamte 3D-Pipeline: bevy_pbr (StandardMaterial, Schatten, Deferred-/Forward-Renderer), glTF-Modellladen und das renzora_shader-Graph-Material-System (~10 MiB). AUS = ein reines 2D-Spiel (Sprites + UI). Lichter/Atmosphäre funktionieren weiterhin (bevy_light bleibt erhalten). Erfordert, dass die 3D-Subsysteme (Gelände/Wasser/Himmel/Post-FX) ebenfalls aus sind — sie bauen auf bevy_pbr auf."
"export.cap.audio.help" = "Das Audio-Subsystem. Für ein stummes Spiel weglassen."
"export.cap.animation.help" = "Das Skelett-/Eigenschafts-Animations-Subsystem."
"export.cap.blueprint.help" = "Die Node-Graph-Visual-Scripting-Laufzeit (~0,2 MiB). Automatisch aktiviert, wenn das Projekt .blueprint/.bp-Graphen enthält."
"export.cap.rhai.help" = "Das Rhai-Skript-Backend (~2,3 MiB). Lua ist immer enthalten; Rhai wird nur automatisch aktiviert, wenn das Projekt .rhai-Skripte enthält."
"export.cap.script_http.help" = "Die Skript-HTTP-Verben — ziehen den ureq + rustls/ring TLS-Stack hinein (~1 MB). Automatisch aktiviert, wenn ein Skript http_get/http_post aufruft."
"export.cap.game_ui.help" = "Das In-Game-UI-Subsystem."
