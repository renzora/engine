"export.cap.solari.help" = "Illuminazione diretta + indiretta ray-traced hardware di Bevy Solari (DI + GI). Attiva solo quando si usa il plugin Solari."
"export.cap.meshlets.help" = "Rendering sperimentale dei meshlets + il relativo processore basato su metis. Raramente usato; pesante."
"export.cap.feathers.help" = "Il toolkit di widget di Bevy — non usato dall'UI di Renzora."
"export.cap.remote_assets.help" = "Caricamento di asset via http/https a runtime — include l'intero stack TLS rustls/ring/ureq (diversi MB). Disattivato per un gioco che distribuisce asset locali (rpak)."
"export.cap.asset_pipeline.help" = "Elaborazione offline degli asset e salvataggio di immagini compresse — strumenti editor/dev, non necessari in un gioco distribuito."
"export.cap.extra_shader_langs.help" = "Supporto per shader GLSL e SPIR-V. Gli shader di Renzora sono WGSL/WESL, quindi non vengono usati."
"export.cap.editor_helpers.help" = "Controller di camera free/pan e diagnostica system-info — solo editor/dev."
"export.cap.dev_extras.help" = "Monitoraggio file per hot-reload, doc-string di reflection (tooltip dell'inspector), accesso agli appunti, rilevamento dei font del sistema operativo e il sistema di impostazioni di bevy — tutto solo editor/dev, con zero utilizzo in un gioco distribuito. (Il backend `arboard` degli appunti viene incluso separatamente dal motore e necessita di un proprio gate per il risparmio completo.)"
"export.cap.gizmos.help" = "bevy_gizmos + bevy_gizmos_render — disegno di linee di debug in immediate-mode (~1,3 MiB). Solo editor/debug; un gioco distribuito lo usa raramente. (Ora rimovibile perché gestiamo il manifest bevy esplicito — prima era saldato nei meta 2d/3d.) Il gizmo di trasformazione dell'editor è un crate separato, renzora_gizmo, e non è influenzato."
"export.cap.image_extra.help" = "Ogni decoder di texture opzionale — DDS, JPEG, WebP, basis-universal, EXR/HDR, TIFF, GIF, BMP, TGA, PNM, QOI. PNG (+ il suo zlib) e KTX2 sono sempre mantenuti (icona finestra / texture compresse). Abilitato automaticamente in base ai file immagine effettivamente presenti nel progetto, così un gioco senza texture o a formato singolo elimina i decoder che non usa mai."
"export.cap.sky.help" = "Atmosfera, skybox, nuvole, stelle notturne, mappe ambiente. Rimuovi per un gioco 2D."
"export.cap.particles.help" = "Il sistema di particelle GPU (bevy_hanabi). ~5 MB — rimuovi se il tuo gioco non ha effetti particellari."
"export.cap.postfx.help" = "Bloom, SSAO, SSR, DoF, motion blur, nebbia, OIT, ecc. (Il tonemapping resta.)"
"export.cap.water.help" = "Il sottosistema della superficie d'acqua."
"export.cap.terrain.help" = "Il sottosistema del terreno."
"export.cap.spline.help" = "Il sottosistema delle spline."
"export.cap.navmesh.help" = "Generazione di navigation-mesh e pathfinding (polyanya/vleue)."
"export.cap.physics.help" = "Il motore fisico avian per corpi rigidi (~6,5 MiB). Alimenta anche il galleggiamento dell'acqua e gli ostacoli-collider del navmesh, che vengono rimossi con esso. Rimuovi per un gioco senza simulazione fisica."
"export.cap.render_3d.help" = "L'intera pipeline 3D: bevy_pbr (StandardMaterial, ombre, renderer deferred/forward), caricamento di modelli glTF e il sistema di materiali a grafo renzora_shader (~10 MiB). OFF = un gioco solo 2D (sprite + UI). Luci/atmosfera funzionano comunque (bevy_light è mantenuto). Richiede che anche i sottosistemi 3D (Terreno/Acqua/Cielo/Post-FX) siano disattivati — si basano su bevy_pbr."
"export.cap.audio.help" = "Il sottosistema audio. Rimuovi per un gioco silenzioso."
"export.cap.animation.help" = "Il sottosistema di animazione scheletrica/proprietà."
"export.cap.blueprint.help" = "Il runtime di scripting visuale a grafo di nodi (~0,2 MiB). Abilitato automaticamente quando il progetto contiene grafi .blueprint/.bp."
"export.cap.rhai.help" = "Il backend di script Rhai (~2,3 MiB). Lua è sempre incluso; Rhai viene abilitato automaticamente solo quando il progetto contiene script .rhai."
"export.cap.script_http.help" = "I verbi HTTP per gli script — includono lo stack TLS ureq + rustls/ring (~1 MiB). Abilitato automaticamente quando uno script chiama http_get/http_post."
"export.cap.game_ui.help" = "Il sottosistema UI di gioco."
