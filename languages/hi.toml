"export.cap.solari.help" = "Bevy Solari हार्डवेयर रे-ट्रेस्ड डायरेक्ट + इनडायरेक्ट लाइटिंग (DI + GI)। केवल तभी चालू जब Solari प्लगइन उपयोग में हो।"
"export.cap.meshlets.help" = "प्रायोगिक meshlets रेंडरिंग + इसका metis-आधारित प्रोसेसर। बहुत कम उपयोग; बड़ा।"
"export.cap.feathers.help" = "Bevy की विजेट टूलकिट — Renzora के अपने UI द्वारा अप्रयुक्त।"
"export.cap.remote_assets.help" = "रनटाइम पर http/https से एसेट लोड करना — पूरा rustls/ring/ureq TLS स्टैक (कई MB) खींचता है। लोकल (rpak) एसेट के साथ शिप होने वाले गेम के लिए बंद।"
"export.cap.asset_pipeline.help" = "ऑफ़लाइन एसेट प्रोसेसिंग और कंप्रेस्ड-इमेज सेविंग — एडिटर/डेव टूल, शिप किए गए गेम में आवश्यक नहीं।"
"export.cap.extra_shader_langs.help" = "GLSL और SPIR-V शेडर सपोर्ट। Renzora के शेडर WGSL/WESL हैं, इसलिए ये अप्रयुक्त हैं।"
"export.cap.editor_helpers.help" = "फ़्री/पैन कैमरा कंट्रोलर और सिस्टम-इन्फ़ो डायग्नोस्टिक्स — केवल एडिटर/डेव।"
"export.cap.dev_extras.help" = "हॉट-रीलोड फ़ाइल वॉचिंग, रिफ़्लेक्शन डॉक-स्ट्रिंग (इंस्पेक्टर टूलटिप), क्लिपबोर्ड एक्सेस, OS फ़ॉन्ट डिस्कवरी, और bevy का सेटिंग्स सिस्टम — सभी केवल एडिटर/डेव, शिप किए गए गेम में शून्य उपयोग। (क्लिपबोर्ड का arboard बैकएंड इंजन द्वारा अलग से खींचा जाता है और पूर्ण बचत के लिए अपने स्वयं के गेट की आवश्यकता होती है।)"
"export.cap.gizmos.help" = "bevy_gizmos + bevy_gizmos_render — इमीडिएट-मोड डिबग-लाइन ड्रॉइंग (~1.3 MiB)। केवल एडिटर/डिबग; शिप किया गया गेम इसका शायद ही उपयोग करता है। (अब strippable क्योंकि हम स्पष्ट bevy मैनिफ़ेस्ट के मालिक हैं — यह पहले 2d/3d metas में वेल्ड किया गया था।) एडिटर का ट्रांसफ़ॉर्म gizmo एक अलग crate है, renzora_gizmo, और यह अप्रभावित है।"
"export.cap.image_extra.help" = "हर वैकल्पिक टेक्सचर डिकोडर — DDS, JPEG, WebP, basis-universal, EXR/HDR, TIFF, GIF, BMP, TGA, PNM, QOI। PNG (+ इसका zlib) और KTX2 हमेशा रखे जाते हैं (विंडो आइकन / कंप्रेस्ड टेक्सचर)। प्रोजेक्ट में वास्तव में मौजूद इमेज फ़ाइलों के अनुसार ऑटो-सक्षम, इसलिए टेक्सचर-रहित या सिंगल-फ़ॉर्मेट गेम उन डिकोडर को छोड़ देता है जिनका वह कभी उपयोग नहीं करता।"
"export.cap.sky.help" = "वायुमंडल, स्काईबॉक्स, बादल, रात के तारे, एनवायरनमेंट मैप। 2D गेम के लिए छोड़ें।"
"export.cap.particles.help" = "GPU पार्टिकल सिस्टम (bevy_hanabi)। ~5 MB — यदि आपके गेम में कोई पार्टिकल इफ़ेक्ट नहीं है तो छोड़ें।"
"export.cap.postfx.help" = "ब्लूम, SSAO, SSR, DoF, मोशन ब्लर, कोहरा, OIT, आदि। (टोनमैपिंग बनी रहती है।)"
"export.cap.water.help" = "वॉटर सरफ़ेस सबसिस्टम।"
"export.cap.terrain.help" = "टेरेन सबसिस्टम।"
"export.cap.spline.help" = "स्प्लाइन सबसिस्टम।"
"export.cap.navmesh.help" = "नेविगेशन-मेश जनरेशन और पाथफ़ाइंडिंग (polyanya/vleue)।"
"export.cap.physics.help" = "avian रिजिड-बॉडी फ़िज़िक्स इंजन (~6.5 MiB)। यह वॉटर उत्प्लावकता और navmesh कोलाइडर-ऑब्स्टैकल को भी संचालित करता है, जो इसके साथ strip हो जाते हैं। बिना फ़िज़िक्स सिमुलेशन वाले गेम के लिए छोड़ें।"
"export.cap.render_3d.help" = "संपूर्ण 3D पाइपलाइन: bevy_pbr (StandardMaterial, छायाएँ, deferred/forward रेंडरर), glTF मॉडल लोडिंग, और renzora_shader ग्राफ़-मटीरियल सिस्टम (~10 MiB)। बंद = केवल-2D गेम (स्प्राइट + UI)। लाइट/वायुमंडल अब भी काम करते हैं (bevy_light रखा जाता है)। इसके लिए 3D सबसिस्टम (टेरेन/वॉटर/स्काई/पोस्ट-FX) का भी बंद होना आवश्यक है — वे bevy_pbr पर बने हैं।"
"export.cap.audio.help" = "ऑडियो सबसिस्टम। मूक गेम के लिए छोड़ें।"
"export.cap.animation.help" = "स्केलेटल/प्रॉपर्टी एनिमेशन सबसिस्टम।"
"export.cap.blueprint.help" = "नोड-ग्राफ़ विज़ुअल स्क्रिप्टिंग रनटाइम (~0.2 MiB)। जब प्रोजेक्ट में .blueprint/.bp ग्राफ़ हों तो ऑटो-सक्षम।"
"export.cap.rhai.help" = "Rhai स्क्रिप्ट बैकएंड (~2.3 MiB)। Lua हमेशा शामिल होता है; Rhai केवल तभी ऑटो-सक्षम होता है जब प्रोजेक्ट में .rhai स्क्रिप्ट हों।"
"export.cap.script_http.help" = "स्क्रिप्ट HTTP verbs — ureq + rustls/ring TLS स्टैक (~1 MB) खींचते हैं। जब कोई स्क्रिप्ट http_get/http_post कॉल करती है तो ऑटो-सक्षम।"
"export.cap.game_ui.help" = "इन-गेम UI सबसिस्टम।"
