"export.cap.solari.help" = "Sprzętowo śledzone promienie Bevy Solari dla oświetlenia bezpośredniego i pośredniego (DI + GI). Włączone tylko gdy używana jest wtyczka Solari."
"export.cap.meshlets.help" = "Eksperymentalne renderowanie meshletów wraz z procesorem opartym na metis. Rzadko używane; duże."
"export.cap.feathers.help" = "Zestaw widżetów Bevy — nieużywany przez własne UI Renzory."
"export.cap.remote_assets.help" = "Wczytywanie zasobów przez http/https w czasie działania — pociąga za sobą cały stos TLS rustls/ring/ureq (kilka MB). Wyłączone dla gry dostarczanej z lokalnymi zasobami (rpak)."
"export.cap.asset_pipeline.help" = "Przetwarzanie zasobów offline i zapis skompresowanych obrazów — narzędzia edytora/dewelopera, niepotrzebne w gotowej grze."
"export.cap.extra_shader_langs.help" = "Obsługa shaderów GLSL i SPIR-V. Shadery Renzory są w WGSL/WESL, więc są nieużywane."
"export.cap.editor_helpers.help" = "Kontrolery kamery swobodnej/przesuwnej oraz diagnostyka informacji o systemie — tylko edytor/deweloper."
"export.cap.dev_extras.help" = "Hot-reload z obserwacją plików, opisy refleksji (podpowiedzi inspektora), dostęp do schowka, wykrywanie czcionek systemowych oraz system ustawień Bevy — wszystko tylko dla edytora/dewelopera, bez żadnego użycia w gotowej grze. (Backend schowka `arboard` jest pobierany osobno przez silnik i wymaga własnej bramki dla pełnego zapisu.)"
"export.cap.gizmos.help" = "bevy_gizmos + bevy_gizmos_render — rysowanie linii debugowania w trybie immediate (~1,3 MiB). Tylko edytor/debug; gotowa gra rzadko tego używa. (Teraz można je usunąć, bo posiadamy jawny manifest Bevy — wcześniej były wtopione w meta 2d/3d.) Gizmo transformacji edytora to osobna skrzynka, renzora_gizmo, i nie jest tym objęta."
"export.cap.image_extra.help" = "Wszystkie opcjonalne dekodery tekstur — DDS, JPEG, WebP, basis-universal, EXR/HDR, TIFF, GIF, BMP, TGA, PNM, QOI. PNG (wraz z zlib) oraz KTX2 są zawsze zachowane (ikona okna / skompresowane tekstury). Włączane automatycznie zależnie od plików obrazów faktycznie obecnych w projekcie, więc gra bez tekstur lub z jednym formatem usuwa dekodery, których nigdy nie używa."
"export.cap.sky.help" = "Atmosfera, skybox, chmury, nocne gwiazdy, mapy otoczenia. Usuń dla gry 2D."
"export.cap.particles.help" = "System cząsteczek GPU (bevy_hanabi). ~5 MB — usuń, jeśli gra nie ma efektów cząsteczkowych."
"export.cap.postfx.help" = "Bloom, SSAO, SSR, DoF, rozmycie ruchu, mgła, OIT itd. (Mapowanie tonalne pozostaje.)"
"export.cap.water.help" = "Podsystem powierzchni wody."
"export.cap.terrain.help" = "Podsystem terenu."
"export.cap.spline.help" = "Podsystem splajnów."
"export.cap.navmesh.help" = "Generowanie siatki nawigacyjnej i wyznaczanie ścieżek (polyanya/vleue)."
"export.cap.physics.help" = "Silnik fizyki ciał sztywnych avian (~6,5 MiB). Zasila także pływalność wody i przeszkody-collidery navmesh, które usuwają się razem z nim. Usuń dla gry bez symulacji fizyki."
"export.cap.render_3d.help" = "Cały potok 3D: bevy_pbr (StandardMaterial, cienie, renderer deferred/forward), wczytywanie modeli glTF oraz system materiałów grafowych renzora_shader (~10 MiB). WYŁĄCZONE = gra wyłącznie 2D (sprite'y + UI). Światła/atmosfera nadal działają (bevy_light pozostaje). Wymaga, aby podsystemy 3D (Teren/Woda/Niebo/Post-FX) również były wyłączone — opierają się na bevy_pbr."
"export.cap.audio.help" = "Podsystem audio. Usuń dla cichej gry."
"export.cap.animation.help" = "Podsystem animacji szkieletowej/właściwości."
"export.cap.blueprint.help" = "Środowisko uruchomieniowe wizualnego skryptowania w grafie węzłów (~0,2 MiB). Włączane automatycznie, gdy projekt zawiera grafy .blueprint/.bp."
"export.cap.rhai.help" = "Backend skryptów Rhai (~2,3 MiB). Lua jest zawsze dołączana; Rhai włączane automatycznie tylko wtedy, gdy projekt zawiera skrypty .rhai."
"export.cap.script_http.help" = "Skryptowe metody HTTP — pociągają za sobą stos TLS ureq + rustls/ring (~1 MiB). Włączane automatycznie, gdy skrypt wywoła http_get/http_post."
"export.cap.game_ui.help" = "Podsystem UI w grze."
