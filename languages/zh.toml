"export.cap.solari.help" = "Bevy Solari 硬件光线追踪直接 + 间接光照 (DI + GI)。仅在使用 Solari 插件时开启。"
"export.cap.meshlets.help" = "实验性 meshlets 渲染及其基于 metis 的处理器。很少使用；体积大。"
"export.cap.feathers.help" = "Bevy 的控件工具包——Renzora 自身 UI 未使用。"
"export.cap.remote_assets.help" = "运行时通过 http/https 加载资源——会引入整个 rustls/ring/ureq TLS 栈（数 MB）。对于发布本地 (rpak) 资源的游戏应关闭。"
"export.cap.asset_pipeline.help" = "离线资源处理与压缩图像保存——编辑器/开发工具，发布的游戏中不需要。"
"export.cap.extra_shader_langs.help" = "GLSL 和 SPIR-V 着色器支持。Renzora 的着色器为 WGSL/WESL，因此这些未使用。"
"export.cap.editor_helpers.help" = "自由/平移相机控制器与系统信息诊断——仅编辑器/开发使用。"
"export.cap.dev_extras.help" = "热重载文件监视、反射文档字符串（检查器工具提示）、剪贴板访问、操作系统字体发现以及 Bevy 的设置系统——全部仅编辑器/开发使用，发布的游戏中零使用。（剪贴板的 `arboard` 后端由引擎单独引入，完整保存需要它自己的开关。）"
"export.cap.gizmos.help" = "bevy_gizmos + bevy_gizmos_render——即时模式调试线绘制（约 1.3 MiB）。仅编辑器/调试使用；发布的游戏很少用到。（现在可剥离，因为我们拥有显式的 Bevy 清单——它过去被焊接在 2d/3d 元包中。）编辑器的变换 gizmo 是独立 crate renzora_gizmo，不受影响。"
"export.cap.image_extra.help" = "所有可选纹理解码器——DDS、JPEG、WebP、basis-universal、EXR/HDR、TIFF、GIF、BMP、TGA、PNM、QOI。PNG（及其 zlib）和 KTX2 始终保留（窗口图标 / 压缩纹理）。根据项目中实际存在的图像文件自动启用，因此无纹理或单一格式的游戏会丢弃从不使用的解码器。"
"export.cap.sky.help" = "大气、天空盒、云、夜空星辰、环境贴图。2D 游戏可丢弃。"
"export.cap.particles.help" = "GPU 粒子系统 (bevy_hanabi)。约 5 MB——若游戏无粒子特效可丢弃。"
"export.cap.postfx.help" = "泛光、SSAO、SSR、DoF、运动模糊、雾、OIT 等。（色调映射保留。）"
"export.cap.water.help" = "水面子系统。"
"export.cap.terrain.help" = "地形子系统。"
"export.cap.spline.help" = "样条线子系统。"
"export.cap.navmesh.help" = "导航网格生成与寻路 (polyanya/vleue)。"
"export.cap.physics.help" = "avian 刚体物理引擎（约 6.5 MiB）。同时驱动水体浮力和导航网格碰撞障碍物，它们随之一并剥离。对于无物理模拟的游戏可丢弃。"
"export.cap.render_3d.help" = "整个 3D 管线：bevy_pbr（StandardMaterial、阴影、延迟/前向渲染器）、glTF 模型加载，以及 renzora_shader 图材质系统（约 10 MiB）。关闭 = 纯 2D 游戏（精灵 + UI）。光照/大气仍可工作（bevy_light 保留）。需要 3D 子系统（地形/水体/天空/后期特效）也关闭——它们都基于 bevy_pbr。"
"export.cap.audio.help" = "音频子系统。对于无声游戏可丢弃。"
"export.cap.animation.help" = "骨骼/属性动画子系统。"
"export.cap.blueprint.help" = "节点图可视化脚本运行时（约 0.2 MiB）。当项目包含 .blueprint/.bp 图时自动启用。"
"export.cap.rhai.help" = "Rhai 脚本后端（约 2.3 MiB）。Lua 始终包含；Rhai 仅在项目包含 .rhai 脚本时自动启用。"
"export.cap.script_http.help" = "脚本 HTTP 动词——会引入 ureq + rustls/ring TLS 栈（约 1 MiB）。当脚本调用 http_get/http_post 时自动启用。"
"export.cap.game_ui.help" = "游戏内 UI 子系统。"
