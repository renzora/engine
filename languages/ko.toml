"export.cap.solari.help" = "Bevy Solari 하드웨어 레이트레이싱 직접 + 간접 조명 (DI + GI). Solari 플러그인을 사용할 때만 켜집니다."
"export.cap.meshlets.help" = "실험적 meshlets 렌더링 + metis 기반 프로세서. 거의 사용되지 않으며 용량이 큽니다."
"export.cap.feathers.help" = "Bevy의 위젯 툴킷 — Renzora 자체 UI에서는 사용하지 않습니다."
"export.cap.remote_assets.help" = "런타임에 http/https로 에셋 로드 — rustls/ring/ureq TLS 스택 전체(수 MB)를 끌어옵니다. 로컬(rpak) 에셋으로 출시하는 게임에서는 끕니다."
"export.cap.asset_pipeline.help" = "오프라인 에셋 처리 및 압축 이미지 저장 — 에디터/개발 도구로, 출시 게임에는 필요 없습니다."
"export.cap.extra_shader_langs.help" = "GLSL 및 SPIR-V 셰이더 지원. Renzora의 셰이더는 WGSL/WESL이므로 사용되지 않습니다."
"export.cap.editor_helpers.help" = "자유/팬 카메라 컨트롤러와 시스템 정보 진단 — 에디터/개발 전용입니다."
"export.cap.dev_extras.help" = "핫 리로드 파일 감시, 리플렉션 doc-string(인스펙터 툴팁), 클립보드 접근, OS 폰트 탐색, bevy의 설정 시스템 — 모두 에디터/개발 전용으로, 출시 게임에서는 전혀 쓰이지 않습니다. (클립보드의 `arboard` 백엔드는 엔진이 별도로 끌어오므로 완전한 제거를 위해 자체 게이트가 필요합니다.)"
"export.cap.gizmos.help" = "bevy_gizmos + bevy_gizmos_render — 즉시 모드 디버그 선 그리기(~1.3 MiB). 에디터/디버그 전용이며 출시 게임에서는 거의 쓰지 않습니다. (이제 명시적 bevy 매니페스트를 직접 관리하므로 제거 가능 — 예전에는 2d/3d 메타에 붙박이였습니다.) 에디터의 트랜스폼 기즈모는 별도 크레이트 renzora_gizmo로, 영향을 받지 않습니다."
"export.cap.image_extra.help" = "모든 선택적 텍스처 디코더 — DDS, JPEG, WebP, basis-universal, EXR/HDR, TIFF, GIF, BMP, TGA, PNM, QOI. PNG(+zlib)와 KTX2는 항상 유지됩니다(창 아이콘 / 압축 텍스처). 프로젝트에 실제로 있는 이미지 파일에 따라 자동 활성화되므로, 텍스처가 없거나 단일 포맷인 게임은 쓰지 않는 디코더를 제거합니다."
"export.cap.sky.help" = "대기, 스카이박스, 구름, 밤하늘 별, 환경 맵. 2D 게임에서는 제거하세요."
"export.cap.particles.help" = "GPU 파티클 시스템(bevy_hanabi). ~5 MB — 게임에 파티클 효과가 없으면 제거하세요."
"export.cap.postfx.help" = "블룸, SSAO, SSR, DoF, 모션 블러, 안개, OIT 등. (톤 매핑은 유지됩니다.)"
"export.cap.water.help" = "수면 하위 시스템."
"export.cap.terrain.help" = "지형 하위 시스템."
"export.cap.spline.help" = "스플라인 하위 시스템."
"export.cap.navmesh.help" = "내비게이션 메시 생성 및 경로 탐색(polyanya/vleue)."
"export.cap.physics.help" = "avian 리지드 바디 물리 엔진(~6.5 MiB). 물 부력과 navmesh 콜라이더 장애물도 구동하며, 이들도 함께 제거됩니다. 물리 시뮬레이션이 없는 게임에서는 제거하세요."
"export.cap.render_3d.help" = "전체 3D 파이프라인: bevy_pbr(StandardMaterial, 그림자, 디퍼드/포워드 렌더러), glTF 모델 로딩, renzora_shader 그래프 머티리얼 시스템(~10 MiB). OFF = 2D 전용 게임(스프라이트 + UI). 조명/대기는 여전히 작동합니다(bevy_light 유지). 3D 하위 시스템(지형/물/하늘/후처리)도 함께 꺼야 합니다 — 이들은 bevy_pbr 위에 구축됩니다."
"export.cap.audio.help" = "오디오 하위 시스템. 무음 게임에서는 제거하세요."
"export.cap.animation.help" = "스켈레탈/프로퍼티 애니메이션 하위 시스템."
"export.cap.blueprint.help" = "노드 그래프 비주얼 스크립팅 런타임(~0.2 MiB). 프로젝트에 .blueprint/.bp 그래프가 있으면 자동 활성화됩니다."
"export.cap.rhai.help" = "Rhai 스크립트 백엔드(~2.3 MiB). Lua는 항상 포함되며, Rhai는 프로젝트에 .rhai 스크립트가 있을 때만 자동 활성화됩니다."
"export.cap.script_http.help" = "스크립트 HTTP 동사 — ureq + rustls/ring TLS 스택(~1 MiB)을 끌어옵니다. 스크립트가 http_get/http_post를 호출하면 자동 활성화됩니다."
"export.cap.game_ui.help" = "인게임 UI 하위 시스템."
