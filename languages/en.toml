# ─── export_help ───
"export.cap.solari.help" = "Bevy Solari hardware ray-traced direct + indirect lighting (DI + GI). On only when the Solari plugin is used."
"export.cap.meshlets.help" = "Experimental meshlet rendering + its metis-based processor. Rarely used; large."
"export.cap.feathers.help" = "Bevy's widget toolkit — unused by Renzora's own UI."
"export.cap.remote_assets.help" = "Loading assets over http/https at runtime — pulls in the whole rustls/ring/ureq TLS stack (several MB). Off for a game shipping local (rpak) assets."
"export.cap.asset_pipeline.help" = "Offline asset processing and compressed-image saving — editor/dev tools, not needed in a shipped game."
"export.cap.extra_shader_langs.help" = "GLSL and SPIR-V shader support. Renzora's shaders are WGSL/WESL, so these are unused."
"export.cap.editor_helpers.help" = "Free/pan camera controllers and system-info diagnostics — editor/dev only."
"export.cap.dev_extras.help" = "Hot-reload file watching, reflection doc-strings (inspector tooltips), clipboard access, OS font discovery, and bevy's settings system — all editor/dev only, with zero usage in a shipped game. (Clipboard's `arboard` backend is pulled separately by the engine and needs its own gate for the full saving.)"
"export.cap.gizmos.help" = "bevy_gizmos + bevy_gizmos_render — immediate-mode debug-line drawing (~1.3 MiB). Editor/debug only; a shipped game rarely uses it. (Now strippable because we own the explicit bevy manifest — it used to be welded into the 2d/3d metas.) The editor's transform gizmo is a separate crate, renzora_gizmo, and is unaffected."
"export.cap.image_extra.help" = "Every optional texture decoder — DDS, JPEG, WebP, basis-universal, EXR/HDR, TIFF, GIF, BMP, TGA, PNM, QOI. PNG (+ its zlib) and KTX2 are always kept (window icon / compressed textures). Auto-enabled per the image files actually in the project, so a textureless or single-format game drops the decoders it never uses."
"export.cap.sky.help" = "Atmosphere, skybox, clouds, night stars, environment maps. Drop for a 2D game."
"export.cap.particles.help" = "The GPU particle system (bevy_hanabi). ~5 MB — drop if your game has no particle effects."
"export.cap.postfx.help" = "Bloom, SSAO, SSR, DoF, motion blur, fog, OIT, etc. (Tonemapping stays.)"
"export.cap.water.help" = "The water surface subsystem."
"export.cap.terrain.help" = "The terrain subsystem."
"export.cap.spline.help" = "The spline subsystem."
"export.cap.navmesh.help" = "Navigation-mesh generation and pathfinding (polyanya/vleue)."
"export.cap.physics.help" = "The avian rigid-body physics engine (~6.5 MiB). Also powers water buoyancy and navmesh collider-obstacles, which strip with it. Drop for a game with no physics simulation."
"export.cap.render_3d.help" = "The whole 3D pipeline: bevy_pbr (StandardMaterial, shadows, deferred/forward renderer), glTF model loading, and the renzora_shader graph-material system (~10 MiB). OFF = a 2D-only game (sprites + UI). Lights/atmosphere still work (bevy_light is kept). Requires the 3D subsystems (Terrain/Water/Sky/Post-FX) to also be off — they build on bevy_pbr."
"export.cap.audio.help" = "The audio subsystem. Drop for a silent game."
"export.cap.animation.help" = "The skeletal/property animation subsystem."
"export.cap.blueprint.help" = "The node-graph visual scripting runtime (~0.2 MiB). Auto-enabled when the project contains .blueprint/.bp graphs."
"export.cap.rhai.help" = "The Rhai script backend (~2.3 MiB). Lua is always included; Rhai is auto-enabled only when the project contains .rhai scripts."
"export.cap.script_http.help" = "The script HTTP verbs — pull in the ureq + rustls/ring TLS stack (~1 MiB). Auto-enabled when a script calls http_get/http_post."
"export.cap.game_ui.help" = "The in-game UI subsystem."
