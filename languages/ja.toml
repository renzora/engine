"export.cap.solari.help" = "Bevy Solari のハードウェアレイトレースによる直接 + 間接ライティング (DI + GI)。Solari プラグイン使用時のみ有効。"
"export.cap.meshlets.help" = "実験的な meshlets レンダリングと metis ベースのプロセッサ。ほとんど使われず、サイズが大きい。"
"export.cap.feathers.help" = "Bevy のウィジェットツールキット。Renzora 独自の UI では未使用。"
"export.cap.remote_assets.help" = "実行時に http/https 経由でアセットを読み込む。rustls/ring/ureq の TLS スタック全体（数 MB）を取り込む。ローカル (rpak) アセットで出荷するゲームではオフ。"
"export.cap.asset_pipeline.help" = "オフラインのアセット処理と圧縮画像の保存。エディタ/開発ツールであり、出荷ゲームでは不要。"
"export.cap.extra_shader_langs.help" = "GLSL と SPIR-V シェーダーのサポート。Renzora のシェーダーは WGSL/WESL なので未使用。"
"export.cap.editor_helpers.help" = "フリー/パンカメラコントローラーとシステム情報診断。エディタ/開発専用。"
"export.cap.dev_extras.help" = "ホットリロードのファイル監視、リフレクションのドキュメント文字列（インスペクターのツールチップ）、クリップボードアクセス、OS フォント検出、bevy の設定システム。すべてエディタ/開発専用で、出荷ゲームでは一切使われない。（クリップボードの `arboard` バックエンドはエンジンが別途取り込むため、完全な削減には独自のゲートが必要。）"
"export.cap.gizmos.help" = "bevy_gizmos + bevy_gizmos_render。イミディエイトモードのデバッグライン描画（約 1.3 MiB）。エディタ/デバッグ専用で、出荷ゲームではほぼ使われない。（明示的な bevy マニフェストを自前で持つようになったため削減可能。以前は 2d/3d メタに組み込まれていた。）エディタのトランスフォームギズモは別クレート renzora_gizmo であり、影響を受けない。"
"export.cap.image_extra.help" = "すべてのオプションのテクスチャデコーダー — DDS、JPEG、WebP、basis-universal、EXR/HDR、TIFF、GIF、BMP、TGA、PNM、QOI。PNG（とその zlib）および KTX2 は常に保持（ウィンドウアイコン / 圧縮テクスチャ）。プロジェクト内に実際にある画像ファイルに応じて自動有効化されるため、テクスチャなしや単一形式のゲームでは未使用のデコーダーを削除する。"
"export.cap.sky.help" = "大気、スカイボックス、雲、夜空の星、環境マップ。2D ゲームでは削除。"
"export.cap.particles.help" = "GPU パーティクルシステム (bevy_hanabi)。約 5 MB — パーティクルエフェクトがないゲームでは削除。"
"export.cap.postfx.help" = "ブルーム、SSAO、SSR、DoF、モーションブラー、フォグ、OIT など。（トーンマッピングは残る。）"
"export.cap.water.help" = "水面サブシステム。"
"export.cap.terrain.help" = "地形サブシステム。"
"export.cap.spline.help" = "スプラインサブシステム。"
"export.cap.navmesh.help" = "ナビゲーションメッシュの生成と経路探索 (polyanya/vleue)。"
"export.cap.physics.help" = "avian リジッドボディ物理エンジン（約 6.5 MiB）。水の浮力やナビメッシュのコライダー障害物も駆動し、それらも一緒に削除される。物理シミュレーションのないゲームでは削除。"
"export.cap.render_3d.help" = "3D パイプライン全体: bevy_pbr（StandardMaterial、シャドウ、Deferred/Forward レンダラー）、glTF モデル読み込み、renzora_shader グラフマテリアルシステム（約 10 MiB）。OFF = 2D 専用ゲーム（スプライト + UI）。ライト/大気は引き続き動作（bevy_light は保持）。3D サブシステム（Terrain/Water/Sky/Post-FX）も無効にする必要がある — これらは bevy_pbr の上に構築されているため。"
"export.cap.audio.help" = "オーディオサブシステム。無音のゲームでは削除。"
"export.cap.animation.help" = "スケルタル/プロパティアニメーションサブシステム。"
"export.cap.blueprint.help" = "ノードグラフのビジュアルスクリプティングランタイム（約 0.2 MiB）。プロジェクトに .blueprint/.bp グラフが含まれる場合に自動有効化。"
"export.cap.rhai.help" = "Rhai スクリプトバックエンド（約 2.3 MiB）。Lua は常に含まれる。Rhai はプロジェクトに .rhai スクリプトが含まれる場合のみ自動有効化。"
"export.cap.script_http.help" = "スクリプトの HTTP 操作 — ureq + rustls/ring の TLS スタック（約 1 MiB）を取り込む。スクリプトが http_get/http_post を呼ぶと自動有効化。"
"export.cap.game_ui.help" = "ゲーム内 UI サブシステム。"
