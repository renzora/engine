"export.cap.solari.help" = "Iluminación directa + indirecta con trazado de rayos por hardware Bevy Solari (DI + GI). Activo solo cuando se usa el plugin Solari."
"export.cap.meshlets.help" = "Renderizado experimental de meshlets y su procesador basado en metis. Rara vez se usa; pesado."
"export.cap.feathers.help" = "El conjunto de widgets de Bevy: no lo usa la propia UI de Renzora."
"export.cap.remote_assets.help" = "Carga de recursos por http/https en tiempo de ejecución: incorpora toda la pila TLS rustls/ring/ureq (varios MB). Desactivado para un juego que distribuye recursos locales (rpak)."
"export.cap.asset_pipeline.help" = "Procesamiento de recursos sin conexión y guardado de imágenes comprimidas: herramientas de editor/desarrollo, innecesarias en un juego distribuido."
"export.cap.extra_shader_langs.help" = "Compatibilidad con shaders GLSL y SPIR-V. Los shaders de Renzora son WGSL/WESL, así que no se usan."
"export.cap.editor_helpers.help" = "Controladores de cámara libre/panorámica y diagnósticos de información del sistema: solo editor/desarrollo."
"export.cap.dev_extras.help" = "Vigilancia de archivos para recarga en caliente, doc-strings de reflexión (información sobre herramientas del inspector), acceso al portapapeles, descubrimiento de fuentes del SO y el sistema de ajustes de Bevy: todo solo de editor/desarrollo, sin uso alguno en un juego distribuido. (El backend `arboard` del portapapeles lo incorpora aparte el motor y necesita su propia compuerta para el guardado completo.)"
"export.cap.gizmos.help" = "bevy_gizmos + bevy_gizmos_render: dibujo de líneas de depuración en modo inmediato (~1,3 MiB). Solo editor/depuración; un juego distribuido rara vez lo usa. (Ahora se puede eliminar porque controlamos el manifiesto explícito de Bevy; antes estaba soldado en los metas 2d/3d.) El gizmo de transformación del editor es un crate aparte, renzora_gizmo, y no se ve afectado."
"export.cap.image_extra.help" = "Todos los decodificadores de textura opcionales: DDS, JPEG, WebP, basis-universal, EXR/HDR, TIFF, GIF, BMP, TGA, PNM, QOI. PNG (+ su zlib) y KTX2 se mantienen siempre (icono de ventana / texturas comprimidas). Se activan automáticamente según los archivos de imagen presentes en el proyecto, así que un juego sin texturas o de un solo formato descarta los decodificadores que nunca usa."
"export.cap.sky.help" = "Atmósfera, skybox, nubes, estrellas nocturnas, mapas de entorno. Elimínalo para un juego 2D."
"export.cap.particles.help" = "El sistema de partículas en GPU (bevy_hanabi). ~5 MB: elimínalo si tu juego no tiene efectos de partículas."
"export.cap.postfx.help" = "Bloom, SSAO, SSR, DoF, desenfoque de movimiento, niebla, OIT, etc. (El mapeo de tonos se mantiene.)"
"export.cap.water.help" = "El subsistema de superficie de agua."
"export.cap.terrain.help" = "El subsistema de terreno."
"export.cap.spline.help" = "El subsistema de splines."
"export.cap.navmesh.help" = "Generación de malla de navegación y búsqueda de rutas (polyanya/vleue)."
"export.cap.physics.help" = "El motor de física de cuerpos rígidos avian (~6,5 MiB). También impulsa la flotabilidad del agua y los obstáculos-colisionador de navmesh, que se eliminan con él. Elimínalo para un juego sin simulación física."
"export.cap.render_3d.help" = "Todo el pipeline 3D: bevy_pbr (StandardMaterial, sombras, renderizador deferred/forward), carga de modelos glTF y el sistema de materiales de grafo renzora_shader (~10 MiB). DESACTIVADO = un juego solo 2D (sprites + UI). Las luces/atmósfera siguen funcionando (bevy_light se mantiene). Requiere que los subsistemas 3D (Terreno/Agua/Cielo/Post-FX) también estén desactivados: se basan en bevy_pbr."
"export.cap.audio.help" = "El subsistema de audio. Elimínalo para un juego silencioso."
"export.cap.animation.help" = "El subsistema de animación esquelética/de propiedades."
"export.cap.blueprint.help" = "El runtime de scripting visual por grafo de nodos (~0,2 MiB). Se activa automáticamente cuando el proyecto contiene grafos .blueprint/.bp."
"export.cap.rhai.help" = "El backend de scripts Rhai (~2,3 MiB). Lua siempre se incluye; Rhai se activa automáticamente solo cuando el proyecto contiene scripts .rhai."
"export.cap.script_http.help" = "Los verbos HTTP de scripts: incorporan la pila TLS ureq + rustls/ring (~1 MB). Se activan automáticamente cuando un script llama a http_get/http_post."
"export.cap.game_ui.help" = "El subsistema de UI dentro del juego."
