"export.cap.solari.help" = "Éclairage direct + indirect par lancer de rayons matériel Bevy Solari (DI + GI). Activé uniquement lorsque le plugin Solari est utilisé."
"export.cap.meshlets.help" = "Rendu meshlets expérimental + son processeur basé sur metis. Rarement utilisé ; volumineux."
"export.cap.feathers.help" = "La boîte à outils de widgets de Bevy — inutilisée par l'UI propre à Renzora."
"export.cap.remote_assets.help" = "Chargement de ressources via http/https à l'exécution — entraîne toute la pile TLS rustls/ring/ureq (plusieurs MB). Désactivé pour un jeu livrant des ressources locales (rpak)."
"export.cap.asset_pipeline.help" = "Traitement de ressources hors ligne et enregistrement d'images compressées — outils éditeur/développement, inutiles dans un jeu livré."
"export.cap.extra_shader_langs.help" = "Prise en charge des shaders GLSL et SPIR-V. Les shaders de Renzora sont en WGSL/WESL, donc ceux-ci sont inutilisés."
"export.cap.editor_helpers.help" = "Contrôleurs de caméra libre/panoramique et diagnostics d'infos système — éditeur/développement uniquement."
"export.cap.dev_extras.help" = "Surveillance de fichiers pour le rechargement à chaud, chaînes de documentation par réflexion (infobulles de l'inspecteur), accès au presse-papiers, découverte des polices du système, et le système de paramètres de Bevy — tous réservés à l'éditeur/développement, sans aucune utilité dans un jeu livré. (Le backend `arboard` du presse-papiers est inclus séparément par le moteur et nécessite son propre verrou pour réaliser l'économie complète.)"
"export.cap.gizmos.help" = "bevy_gizmos + bevy_gizmos_render — tracé de lignes de débogage en mode immédiat (~1.3 MiB). Éditeur/débogage uniquement ; un jeu livré l'utilise rarement. (Désormais retirable car nous maîtrisons le manifeste bevy explicite — il était auparavant soudé dans les métas 2D/3D.) Le gizmo de transformation de l'éditeur est un crate distinct, renzora_gizmo, et n'est pas affecté."
"export.cap.image_extra.help" = "Tous les décodeurs de texture optionnels — DDS, JPEG, WebP, basis-universal, EXR/HDR, TIFF, GIF, BMP, TGA, PNM, QOI. PNG (+ son zlib) et KTX2 sont toujours conservés (icône de fenêtre / textures compressées). Activé automatiquement selon les fichiers image réellement présents dans le projet, de sorte qu'un jeu sans texture ou à format unique abandonne les décodeurs qu'il n'utilise jamais."
"export.cap.sky.help" = "Atmosphère, skybox, nuages, étoiles nocturnes, cartes d'environnement. À retirer pour un jeu 2D."
"export.cap.particles.help" = "Le système de particules GPU (bevy_hanabi). ~5 MB — à retirer si votre jeu n'a aucun effet de particules."
"export.cap.postfx.help" = "Bloom, SSAO, SSR, DoF, flou de mouvement, brouillard, OIT, etc. (Le tonemapping reste.)"
"export.cap.water.help" = "Le sous-système de surface d'eau."
"export.cap.terrain.help" = "Le sous-système de terrain."
"export.cap.spline.help" = "Le sous-système de splines."
"export.cap.navmesh.help" = "Génération de maillage de navigation et recherche de chemin (polyanya/vleue)."
"export.cap.physics.help" = "Le moteur physique de corps rigides avian (~6.5 MiB). Alimente aussi la flottabilité de l'eau et les obstacles-collisionneurs du navmesh, qui sont retirés avec lui. À retirer pour un jeu sans simulation physique."
"export.cap.render_3d.help" = "Tout le pipeline 3D : bevy_pbr (StandardMaterial, ombres, moteur de rendu Deferred/Forward), chargement de modèles glTF, et le système de matériaux par graphe renzora_shader (~10 MiB). DÉSACTIVÉ = un jeu uniquement 2D (sprites + UI). Les lumières/l'atmosphère fonctionnent toujours (bevy_light est conservé). Nécessite que les sous-systèmes 3D (Terrain/Eau/Ciel/Post-FX) soient également désactivés — ils reposent sur bevy_pbr."
"export.cap.audio.help" = "Le sous-système audio. À retirer pour un jeu silencieux."
"export.cap.animation.help" = "Le sous-système d'animation squelettique/de propriétés."
"export.cap.blueprint.help" = "Le runtime de scripts visuels par graphe de nœuds (~0.2 MiB). Activé automatiquement lorsque le projet contient des graphes .blueprint/.bp."
"export.cap.rhai.help" = "Le backend de script Rhai (~2.3 MiB). Lua est toujours inclus ; Rhai n'est activé automatiquement que lorsque le projet contient des scripts .rhai."
"export.cap.script_http.help" = "Les verbes HTTP des scripts — entraînent la pile TLS ureq + rustls/ring (~1 MiB). Activé automatiquement lorsqu'un script appelle http_get/http_post."
"export.cap.game_ui.help" = "Le sous-système d'UI en jeu."
