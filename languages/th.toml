"export.cap.solari.help" = "Bevy Solari ให้แสงทางตรง + ทางอ้อมแบบเรย์เทรซด้วยฮาร์ดแวร์ (DI + GI) เปิดเฉพาะเมื่อมีการใช้ปลั๊กอิน Solari"
"export.cap.meshlets.help" = "การเรนเดอร์ meshlets แบบทดลอง พร้อมตัวประมวลผลที่ใช้ metis ใช้งานน้อยมากและขนาดใหญ่"
"export.cap.feathers.help" = "ชุดเครื่องมือวิดเจ็ตของ Bevy — UI ของ Renzora ไม่ได้ใช้"
"export.cap.remote_assets.help" = "โหลดแอสเซตผ่าน http/https ขณะรันไทม์ — ดึงสแตก TLS ของ rustls/ring/ureq ทั้งชุดเข้ามา (หลาย MB) ปิดสำหรับเกมที่ส่งมอบแอสเซตในเครื่อง (rpak)"
"export.cap.asset_pipeline.help" = "การประมวลผลแอสเซตแบบออฟไลน์และการบันทึกภาพแบบบีบอัด — เครื่องมือสำหรับเอดิเตอร์/นักพัฒนา ไม่จำเป็นในเกมที่ส่งมอบ"
"export.cap.extra_shader_langs.help" = "รองรับเชดเดอร์ GLSL และ SPIR-V เชดเดอร์ของ Renzora เป็น WGSL/WESL จึงไม่ได้ใช้สิ่งเหล่านี้"
"export.cap.editor_helpers.help" = "ตัวควบคุมกล้องแบบ Free/pan และการวินิจฉัยข้อมูลระบบ — สำหรับเอดิเตอร์/นักพัฒนาเท่านั้น"
"export.cap.dev_extras.help" = "การเฝ้าดูไฟล์เพื่อฮอตรีโหลด, doc-string ของการสะท้อน (ทูลทิปในอินสเปกเตอร์), การเข้าถึงคลิปบอร์ด, การค้นพบฟอนต์ของ OS และระบบการตั้งค่าของ Bevy — ทั้งหมดสำหรับเอดิเตอร์/นักพัฒนาเท่านั้น และไม่มีการใช้งานในเกมที่ส่งมอบเลย (แบ็กเอนด์ `arboard` ของคลิปบอร์ดถูกดึงแยกต่างหากโดยเอนจิน และต้องมีเกตของตัวเองเพื่อตัดออกทั้งหมด)"
"export.cap.gizmos.help" = "bevy_gizmos + bevy_gizmos_render — การวาดเส้นดีบักแบบ immediate-mode (~1.3 MiB) สำหรับเอดิเตอร์/ดีบักเท่านั้น เกมที่ส่งมอบแทบไม่ใช้ (ตอนนี้ตัดออกได้เพราะเราเป็นเจ้าของไฟล์ manifest ของ bevy โดยตรง — เดิมมันถูกเชื่อมติดอยู่ใน meta ของ 2d/3d) กิซโมทรานส์ฟอร์มของเอดิเตอร์เป็นเครตแยกชื่อ renzora_gizmo และไม่ได้รับผลกระทบ"
"export.cap.image_extra.help" = "ตัวถอดรหัสเท็กซ์เจอร์เสริมทุกตัว — DDS, JPEG, WebP, basis-universal, EXR/HDR, TIFF, GIF, BMP, TGA, PNM, QOI ส่วน PNG (+ zlib ของมัน) และ KTX2 ถูกเก็บไว้เสมอ (ไอคอนหน้าต่าง / เท็กซ์เจอร์แบบบีบอัด) เปิดใช้อัตโนมัติตามไฟล์ภาพที่มีจริงในโปรเจกต์ ดังนั้นเกมที่ไม่มีเท็กซ์เจอร์หรือใช้รูปแบบเดียวจะตัดตัวถอดรหัสที่ไม่เคยใช้ออก"
"export.cap.sky.help" = "บรรยากาศ, สกายบ็อกซ์, เมฆ, ดาวยามค่ำคืน, แผนที่สภาพแวดล้อม ตัดออกสำหรับเกม 2D"
"export.cap.particles.help" = "ระบบอนุภาคบน GPU (bevy_hanabi) ~5 MB — ตัดออกหากเกมของคุณไม่มีเอฟเฟกต์อนุภาค"
"export.cap.postfx.help" = "Bloom, SSAO, SSR, DoF, motion blur, หมอก, OIT ฯลฯ (การปรับโทนสียังคงอยู่)"
"export.cap.water.help" = "ระบบย่อยผิวน้ำ"
"export.cap.terrain.help" = "ระบบย่อยภูมิประเทศ"
"export.cap.spline.help" = "ระบบย่อยสไปลน์"
"export.cap.navmesh.help" = "การสร้างเมชนำทางและการหาเส้นทาง (polyanya/vleue)"
"export.cap.physics.help" = "เอนจินฟิสิกส์วัตถุแข็งเกร็ง avian (~6.5 MiB) ยังขับเคลื่อนการลอยตัวของน้ำและสิ่งกีดขวางคอลไลเดอร์ของ navmesh ซึ่งจะถูกตัดออกไปพร้อมกัน ตัดออกสำหรับเกมที่ไม่มีการจำลองฟิสิกส์"
"export.cap.render_3d.help" = "ไปป์ไลน์ 3D ทั้งหมด: bevy_pbr (StandardMaterial, เงา, เรนเดอเรอร์ deferred/forward), การโหลดโมเดล glTF และระบบกราฟวัสดุ renzora_shader (~10 MiB) ปิด = เกม 2D ล้วน (สไปรต์ + UI) แสง/บรรยากาศยังทำงานได้ (bevy_light ถูกเก็บไว้) ต้องปิดระบบย่อย 3D (ภูมิประเทศ/น้ำ/ท้องฟ้า/Post-FX) ด้วย — เพราะมันสร้างบน bevy_pbr"
"export.cap.audio.help" = "ระบบย่อยเสียง ตัดออกสำหรับเกมที่ไม่มีเสียง"
"export.cap.animation.help" = "ระบบย่อยแอนิเมชันแบบโครงกระดูก/พร็อพเพอร์ตี"
"export.cap.blueprint.help" = "รันไทม์สคริปต์เชิงภาพแบบกราฟโหนด (~0.2 MiB) เปิดใช้อัตโนมัติเมื่อโปรเจกต์มีกราฟ .blueprint/.bp"
"export.cap.rhai.help" = "แบ็กเอนด์สคริปต์ Rhai (~2.3 MiB) Lua รวมอยู่ด้วยเสมอ ส่วน Rhai เปิดใช้อัตโนมัติเฉพาะเมื่อโปรเจกต์มีสคริปต์ .rhai"
"export.cap.script_http.help" = "คำสั่ง HTTP ของสคริปต์ — ดึงสแตก TLS ของ ureq + rustls/ring เข้ามา (~1 MiB) เปิดใช้อัตโนมัติเมื่อสคริปต์เรียก http_get/http_post"
"export.cap.game_ui.help" = "ระบบย่อย UI ในเกม"
