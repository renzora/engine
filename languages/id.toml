"export.cap.solari.help" = "Pencahayaan langsung + tidak langsung ray-traced perangkat keras Bevy Solari (DI + GI). Hanya aktif saat plugin Solari digunakan."
"export.cap.meshlets.help" = "Rendering meshlets eksperimental + prosesornya berbasis metis. Jarang dipakai; besar."
"export.cap.feathers.help" = "Toolkit widget Bevy — tidak dipakai oleh UI Renzora sendiri."
"export.cap.remote_assets.help" = "Memuat aset melalui http/https saat runtime — menarik seluruh stack TLS rustls/ring/ureq (beberapa MB). Mati untuk game yang mengirim aset lokal (rpak)."
"export.cap.asset_pipeline.help" = "Pemrosesan aset offline dan penyimpanan gambar terkompresi — alat editor/dev, tidak diperlukan dalam game yang dirilis."
"export.cap.extra_shader_langs.help" = "Dukungan shader GLSL dan SPIR-V. Shader Renzora adalah WGSL/WESL, jadi ini tidak dipakai."
"export.cap.editor_helpers.help" = "Kontroler kamera bebas/pan dan diagnostik info-sistem — hanya editor/dev."
"export.cap.dev_extras.help" = "Pemantauan berkas hot-reload, doc-string refleksi (tooltip inspektur), akses clipboard, penemuan font OS, dan sistem pengaturan bevy — semua hanya editor/dev, tanpa penggunaan dalam game yang dirilis. (Backend `arboard` clipboard ditarik terpisah oleh engine dan memerlukan gate-nya sendiri untuk penghematan penuh.)"
"export.cap.gizmos.help" = "bevy_gizmos + bevy_gizmos_render — penggambaran garis-debug mode-langsung (~1.3 MiB). Hanya editor/debug; game yang dirilis jarang memakainya. (Kini dapat dilepas karena kami memiliki manifes bevy eksplisit — dulu menyatu ke dalam meta 2d/3d.) Gizmo transform editor adalah crate terpisah, renzora_gizmo, dan tidak terpengaruh."
"export.cap.image_extra.help" = "Setiap dekoder tekstur opsional — DDS, JPEG, WebP, basis-universal, EXR/HDR, TIFF, GIF, BMP, TGA, PNM, QOI. PNG (+ zlib-nya) dan KTX2 selalu disimpan (ikon jendela / tekstur terkompresi). Diaktifkan otomatis sesuai berkas gambar yang benar-benar ada di proyek, jadi game tanpa tekstur atau satu format melepas dekoder yang tak pernah dipakai."
"export.cap.sky.help" = "Atmosfer, skybox, awan, bintang malam, peta lingkungan. Lepas untuk game 2D."
"export.cap.particles.help" = "Sistem partikel GPU (bevy_hanabi). ~5 MB — lepas jika game Anda tidak punya efek partikel."
"export.cap.postfx.help" = "Bloom, SSAO, SSR, DoF, motion blur, kabut, OIT, dll. (Tonemapping tetap.)"
"export.cap.water.help" = "Subsistem permukaan air."
"export.cap.terrain.help" = "Subsistem medan."
"export.cap.spline.help" = "Subsistem spline."
"export.cap.navmesh.help" = "Pembuatan navigation-mesh dan pathfinding (polyanya/vleue)."
"export.cap.physics.help" = "Engine fisika rigid-body avian (~6.5 MiB). Juga menggerakkan daya apung air dan rintangan-collider navmesh, yang ikut terlepas bersamanya. Lepas untuk game tanpa simulasi fisika."
"export.cap.render_3d.help" = "Seluruh pipeline 3D: bevy_pbr (StandardMaterial, bayangan, renderer Deferred/Forward), pemuatan model glTF, dan sistem graph-material renzora_shader (~10 MiB). MATI = game 2D-saja (sprite + UI). Cahaya/atmosfer tetap bekerja (bevy_light disimpan). Memerlukan subsistem 3D (Medan/Air/Langit/Post-FX) juga mati — mereka dibangun di atas bevy_pbr."
"export.cap.audio.help" = "Subsistem audio. Lepas untuk game tanpa suara."
"export.cap.animation.help" = "Subsistem animasi skeletal/properti."
"export.cap.blueprint.help" = "Runtime skrip visual node-graph (~0.2 MiB). Diaktifkan otomatis saat proyek berisi graph .blueprint/.bp."
"export.cap.rhai.help" = "Backend skrip Rhai (~2.3 MiB). Lua selalu disertakan; Rhai diaktifkan otomatis hanya saat proyek berisi skrip .rhai."
"export.cap.script_http.help" = "Verb HTTP skrip — menarik stack TLS ureq + rustls/ring (~1 MiB). Diaktifkan otomatis saat skrip memanggil http_get/http_post."
"export.cap.game_ui.help" = "Subsistem UI dalam-game."
