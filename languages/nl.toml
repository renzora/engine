"export.cap.solari.help" = "Bevy Solari hardwarematige ray-traced directe + indirecte belichting (DI + GI). Alleen aan wanneer de Solari-plugin wordt gebruikt."
"export.cap.meshlets.help" = "Experimentele meshlet-rendering + de bijbehorende metis-gebaseerde processor. Zelden gebruikt; groot."
"export.cap.feathers.help" = "Bevy's widget-toolkit — niet gebruikt door Renzora's eigen UI."
"export.cap.remote_assets.help" = "Assets laden via http/https tijdens runtime — haalt de volledige rustls/ring/ureq TLS-stack binnen (enkele MB). Uit voor een game die lokale (rpak) assets meelevert."
"export.cap.asset_pipeline.help" = "Offline assetverwerking en opslaan van gecomprimeerde afbeeldingen — editor/dev-tools, niet nodig in een uitgeleverde game."
"export.cap.extra_shader_langs.help" = "Ondersteuning voor GLSL- en SPIR-V-shaders. Renzora's shaders zijn WGSL/WESL, dus deze worden niet gebruikt."
"export.cap.editor_helpers.help" = "Vrije/pan-camerabesturingen en systeeminfo-diagnostiek — alleen editor/dev."
"export.cap.dev_extras.help" = "Hot-reload bestandsbewaking, reflectie-docstrings (inspector-tooltips), klembordtoegang, OS-lettertypedetectie en bevy's instellingensysteem — allemaal alleen editor/dev, met nul gebruik in een uitgeleverde game. (De `arboard`-backend van het klembord wordt apart door de engine binnengehaald en heeft een eigen gate nodig voor de volledige besparing.)"
"export.cap.gizmos.help" = "bevy_gizmos + bevy_gizmos_render — immediate-mode debug-lijntekening (~1,3 MiB). Alleen editor/debug; een uitgeleverde game gebruikt het zelden. (Nu strippbaar omdat we het expliciete bevy-manifest beheren — het zat voorheen vastgelast in de 2d/3d-meta's.) De transform-gizmo van de editor is een aparte crate, renzora_gizmo, en blijft onaangetast."
"export.cap.image_extra.help" = "Elke optionele textuurdecoder — DDS, JPEG, WebP, basis-universal, EXR/HDR, TIFF, GIF, BMP, TGA, PNM, QOI. PNG (+ de bijbehorende zlib) en KTX2 blijven altijd behouden (vensterpictogram / gecomprimeerde texturen). Automatisch ingeschakeld op basis van de afbeeldingsbestanden die daadwerkelijk in het project zitten, zodat een game zonder texturen of met één formaat de decoders weglaat die het nooit gebruikt."
"export.cap.sky.help" = "Atmosfeer, skybox, wolken, nachtsterren, omgevingsmappen. Weglaten voor een 2D-game."
"export.cap.particles.help" = "Het GPU-deeltjessysteem (bevy_hanabi). ~5 MB — weglaten als je game geen deeltjeseffecten heeft."
"export.cap.postfx.help" = "Bloom, SSAO, SSR, DoF, bewegingsonscherpte, mist, OIT, enz. (Tonemapping blijft.)"
"export.cap.water.help" = "Het wateroppervlak-subsysteem."
"export.cap.terrain.help" = "Het terrein-subsysteem."
"export.cap.spline.help" = "Het spline-subsysteem."
"export.cap.navmesh.help" = "Generatie van navigatie-mesh en pathfinding (polyanya/vleue)."
"export.cap.physics.help" = "De avian rigid-body fysica-engine (~6,5 MiB). Drijft ook waterdrijfvermogen en navmesh-collider-obstakels aan, die er samen mee worden gestript. Weglaten voor een game zonder fysicasimulatie."
"export.cap.render_3d.help" = "De volledige 3D-pipeline: bevy_pbr (StandardMaterial, schaduwen, deferred/forward renderer), glTF-modelladen en het renzora_shader graph-materiaalsysteem (~10 MiB). UIT = een game met alleen 2D (sprites + UI). Lichten/atmosfeer werken nog (bevy_light blijft behouden). Vereist dat de 3D-subsystemen (Terrein/Water/Sky/Post-FX) ook uit staan — die bouwen voort op bevy_pbr."
"export.cap.audio.help" = "Het audio-subsysteem. Weglaten voor een stille game."
"export.cap.animation.help" = "Het subsysteem voor skelet-/eigenschapanimatie."
"export.cap.blueprint.help" = "De node-graph visual-scripting runtime (~0,2 MiB). Automatisch ingeschakeld wanneer het project .blueprint/.bp-graphs bevat."
"export.cap.rhai.help" = "De Rhai-scriptbackend (~2,3 MiB). Lua is altijd inbegrepen; Rhai wordt alleen automatisch ingeschakeld wanneer het project .rhai-scripts bevat."
"export.cap.script_http.help" = "De HTTP-werkwoorden voor scripts — halen de ureq + rustls/ring TLS-stack binnen (~1 MiB). Automatisch ingeschakeld wanneer een script http_get/http_post aanroept."
"export.cap.game_ui.help" = "Het in-game UI-subsysteem."
