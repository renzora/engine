"export.cap.solari.help" = "Chiếu sáng trực tiếp + gián tiếp dò tia phần cứng Bevy Solari (DI + GI). Chỉ bật khi plugin Solari được dùng."
"export.cap.meshlets.help" = "Kết xuất meshlets thử nghiệm + bộ xử lý dựa trên metis. Hiếm dùng; dung lượng lớn."
"export.cap.feathers.help" = "Bộ công cụ widget của Bevy — không được UI riêng của Renzora sử dụng."
"export.cap.remote_assets.help" = "Tải tài nguyên qua http/https lúc chạy — kéo theo toàn bộ ngăn xếp TLS rustls/ring/ureq (vài MB). Tắt cho game phát hành với tài nguyên cục bộ (rpak)."
"export.cap.asset_pipeline.help" = "Xử lý tài nguyên ngoại tuyến và lưu ảnh nén — công cụ trình biên tập/phát triển, không cần trong game phát hành."
"export.cap.extra_shader_langs.help" = "Hỗ trợ shader GLSL và SPIR-V. Shader của Renzora là WGSL/WESL nên không dùng đến."
"export.cap.editor_helpers.help" = "Bộ điều khiển máy ảnh tự do/lia và chẩn đoán thông tin hệ thống — chỉ dành cho trình biên tập/phát triển."
"export.cap.dev_extras.help" = "Theo dõi tệp để nạp nóng, chuỗi tài liệu phản chiếu (chú giải trong inspector), truy cập clipboard, dò phông chữ OS và hệ thống cài đặt của bevy — tất cả chỉ dành cho trình biên tập/phát triển, không dùng trong game phát hành. (Backend `arboard` của clipboard được engine kéo riêng và cần cổng riêng để tiết kiệm trọn vẹn.)"
"export.cap.gizmos.help" = "bevy_gizmos + bevy_gizmos_render — vẽ đường gỡ lỗi chế độ tức thời (~1.3 MiB). Chỉ dành cho trình biên tập/gỡ lỗi; game phát hành hiếm khi dùng. (Giờ có thể loại bỏ vì ta sở hữu manifest bevy tường minh — trước đây nó bị hàn cứng vào meta 2D/3D.) Gizmo biến đổi của trình biên tập là một crate riêng, renzora_gizmo, và không bị ảnh hưởng."
"export.cap.image_extra.help" = "Mọi bộ giải mã texture tùy chọn — DDS, JPEG, WebP, basis-universal, EXR/HDR, TIFF, GIF, BMP, TGA, PNM, QOI. PNG (+ zlib của nó) và KTX2 luôn được giữ (biểu tượng cửa sổ / texture nén). Tự bật theo các tệp ảnh thực có trong dự án, nên game không có texture hoặc chỉ một định dạng sẽ loại bỏ các bộ giải mã không bao giờ dùng."
"export.cap.sky.help" = "Khí quyển, skybox, mây, sao đêm, bản đồ môi trường. Loại bỏ cho game 2D."
"export.cap.particles.help" = "Hệ thống hạt GPU (bevy_hanabi). ~5 MB — loại bỏ nếu game không có hiệu ứng hạt."
"export.cap.postfx.help" = "Bloom, SSAO, SSR, DoF, mờ chuyển động, sương mù, OIT, v.v. (Tonemapping vẫn giữ.)"
"export.cap.water.help" = "Hệ thống con mặt nước."
"export.cap.terrain.help" = "Hệ thống con địa hình."
"export.cap.spline.help" = "Hệ thống con spline."
"export.cap.navmesh.help" = "Tạo lưới điều hướng và tìm đường (polyanya/vleue)."
"export.cap.physics.help" = "Engine vật lý thân cứng avian (~6.5 MiB). Cũng cung cấp lực nổi của nước và vật cản collider navmesh, vốn bị loại bỏ cùng nó. Loại bỏ cho game không mô phỏng vật lý."
"export.cap.render_3d.help" = "Toàn bộ pipeline 3D: bevy_pbr (StandardMaterial, bóng đổ, bộ kết xuất Deferred/Forward), nạp mô hình glTF, và hệ thống vật liệu đồ thị renzora_shader (~10 MiB). TẮT = game chỉ 2D (sprite + UI). Đèn/khí quyển vẫn hoạt động (bevy_light được giữ). Yêu cầu các hệ thống con 3D (Địa hình/Nước/Bầu trời/Post-FX) cũng phải tắt — chúng dựa trên bevy_pbr."
"export.cap.audio.help" = "Hệ thống con âm thanh. Loại bỏ cho game không tiếng."
"export.cap.animation.help" = "Hệ thống con hoạt ảnh xương/thuộc tính."
"export.cap.blueprint.help" = "Runtime lập trình trực quan đồ thị nút (~0.2 MiB). Tự bật khi dự án chứa đồ thị .blueprint/.bp."
"export.cap.rhai.help" = "Backend script Rhai (~2.3 MiB). Lua luôn được bao gồm; Rhai chỉ tự bật khi dự án chứa tập lệnh .rhai."
"export.cap.script_http.help" = "Các động từ HTTP của script — kéo theo ngăn xếp TLS ureq + rustls/ring (~1 MiB). Tự bật khi một tập lệnh gọi http_get/http_post."
"export.cap.game_ui.help" = "Hệ thống con UI trong game."
