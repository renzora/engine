"export.cap.solari.help" = "Iluminação direta + indireta por ray-tracing de hardware do Bevy Solari (DI + GI). Ativo apenas quando o plugin Solari é usado."
"export.cap.meshlets.help" = "Renderização experimental de meshlets + seu processador baseado em metis. Raramente usado; grande."
"export.cap.feathers.help" = "O kit de widgets do Bevy — não usado pela própria UI do Renzora."
"export.cap.remote_assets.help" = "Carregamento de recursos via http/https em tempo de execução — traz toda a pilha TLS rustls/ring/ureq (vários MB). Desativado para um jogo que distribui recursos locais (rpak)."
"export.cap.asset_pipeline.help" = "Processamento de recursos offline e salvamento de imagens comprimidas — ferramentas de editor/dev, desnecessárias em um jogo distribuído."
"export.cap.extra_shader_langs.help" = "Suporte a shaders GLSL e SPIR-V. Os shaders do Renzora são WGSL/WESL, então estes não são usados."
"export.cap.editor_helpers.help" = "Controladores de câmera livre/pan e diagnósticos de informações do sistema — apenas editor/dev."
"export.cap.dev_extras.help" = "Monitoramento de arquivos para recarga a quente, doc-strings de reflexão (dicas do inspetor), acesso à área de transferência, descoberta de fontes do SO e o sistema de configurações do Bevy — todos apenas de editor/dev, sem uso em um jogo distribuído. (O backend `arboard` da área de transferência é trazido separadamente pelo engine e precisa de sua própria gate para o salvamento completo.)"
"export.cap.gizmos.help" = "bevy_gizmos + bevy_gizmos_render — desenho de linhas de depuração em modo imediato (~1,3 MiB). Apenas editor/depuração; um jogo distribuído raramente o usa. (Agora removível porque controlamos o manifesto explícito do bevy — antes era soldado nos metas 2d/3d.) O gizmo de transformação do editor é uma crate separada, renzora_gizmo, e não é afetado."
"export.cap.image_extra.help" = "Todo decodificador de textura opcional — DDS, JPEG, WebP, basis-universal, EXR/HDR, TIFF, GIF, BMP, TGA, PNM, QOI. PNG (+ seu zlib) e KTX2 são sempre mantidos (ícone da janela / texturas comprimidas). Ativado automaticamente conforme os arquivos de imagem realmente no projeto, então um jogo sem texturas ou de formato único descarta os decodificadores que nunca usa."
"export.cap.sky.help" = "Atmosfera, skybox, nuvens, estrelas noturnas, mapas de ambiente. Descarte para um jogo 2D."
"export.cap.particles.help" = "O sistema de partículas em GPU (bevy_hanabi). ~5 MB — descarte se o seu jogo não tem efeitos de partículas."
"export.cap.postfx.help" = "Bloom, SSAO, SSR, DoF, desfoque de movimento, névoa, OIT, etc. (O mapeamento de tons permanece.)"
"export.cap.water.help" = "O subsistema de superfície de água."
"export.cap.terrain.help" = "O subsistema de terreno."
"export.cap.spline.help" = "O subsistema de spline."
"export.cap.navmesh.help" = "Geração de malha de navegação e busca de caminho (polyanya/vleue)."
"export.cap.physics.help" = "O motor de física de corpos rígidos avian (~6,5 MiB). Também alimenta a flutuabilidade na água e os obstáculos-colisores de navmesh, que são removidos junto. Descarte para um jogo sem simulação física."
"export.cap.render_3d.help" = "Todo o pipeline 3D: bevy_pbr (StandardMaterial, sombras, renderizador deferred/forward), carregamento de modelos glTF e o sistema de materiais-grafo renzora_shader (~10 MiB). DESLIGADO = um jogo apenas 2D (sprites + UI). Luzes/atmosfera continuam funcionando (bevy_light é mantido). Requer que os subsistemas 3D (Terreno/Água/Céu/Pós-FX) também estejam desligados — eles se baseiam no bevy_pbr."
"export.cap.audio.help" = "O subsistema de áudio. Descarte para um jogo silencioso."
"export.cap.animation.help" = "O subsistema de animação esquelética/de propriedades."
"export.cap.blueprint.help" = "O runtime de scripting visual por grafo de nós (~0,2 MiB). Ativado automaticamente quando o projeto contém grafos .blueprint/.bp."
"export.cap.rhai.help" = "O backend de script Rhai (~2,3 MiB). Lua é sempre incluído; Rhai é ativado automaticamente apenas quando o projeto contém scripts .rhai."
"export.cap.script_http.help" = "Os verbos HTTP de script — trazem a pilha TLS ureq + rustls/ring (~1 MB). Ativado automaticamente quando um script chama http_get/http_post."
"export.cap.game_ui.help" = "O subsistema de UI dentro do jogo."
