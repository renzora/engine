"export.cap.solari.help" = "Bevy Solari donanım ışın izlemeli doğrudan + dolaylı aydınlatma (DI + GI). Yalnızca Solari eklentisi kullanıldığında açık."
"export.cap.meshlets.help" = "Deneysel meshlet render alma + metis tabanlı işleyicisi. Nadiren kullanılır; büyük."
"export.cap.feathers.help" = "Bevy'nin bileşen araç seti — Renzora'nın kendi UI'sında kullanılmaz."
"export.cap.remote_assets.help" = "Çalışma zamanında http/https üzerinden varlık yükleme — tüm rustls/ring/ureq TLS yığınını çeker (birkaç MB). Yerel (rpak) varlıklarla dağıtılan bir oyun için kapalı."
"export.cap.asset_pipeline.help" = "Çevrimdışı varlık işleme ve sıkıştırılmış görüntü kaydetme — editör/geliştirme araçları, dağıtılan bir oyunda gerekmez."
"export.cap.extra_shader_langs.help" = "GLSL ve SPIR-V shader desteği. Renzora'nın shader'ları WGSL/WESL'dir, bu yüzden bunlar kullanılmaz."
"export.cap.editor_helpers.help" = "Serbest/kaydırma kamera denetleyicileri ve sistem bilgisi tanılaması — yalnızca editör/geliştirme."
"export.cap.dev_extras.help" = "Anlık yeniden yükleme için dosya izleme, yansıma açıklama metinleri (denetleyici ipuçları), pano erişimi, OS yazı tipi keşfi ve bevy'nin ayarlar sistemi — tümü yalnızca editör/geliştirme amaçlı, dağıtılan bir oyunda sıfır kullanım. (Pano'nun `arboard` arka ucu motor tarafından ayrıca çekilir ve tam kaydetme için kendi geçidine ihtiyaç duyar.)"
"export.cap.gizmos.help" = "bevy_gizmos + bevy_gizmos_render — anlık modlu hata ayıklama çizgisi çizimi (~1.3 MiB). Yalnızca editör/hata ayıklama; dağıtılan bir oyun nadiren kullanır. (Açık bevy manifestosuna sahip olduğumuz için artık çıkarılabilir — eskiden 2d/3d meta'larına kaynaklanmıştı.) Editörün dönüşüm gizmosu ayrı bir crate olan renzora_gizmo'dur ve etkilenmez."
"export.cap.image_extra.help" = "Her isteğe bağlı doku kod çözücü — DDS, JPEG, WebP, basis-universal, EXR/HDR, TIFF, GIF, BMP, TGA, PNM, QOI. PNG (+ zlib'i) ve KTX2 her zaman tutulur (pencere simgesi / sıkıştırılmış dokular). Projedeki gerçek görüntü dosyalarına göre otomatik etkinleştirilir, böylece dokusuz veya tek formatlı bir oyun hiç kullanmadığı kod çözücüleri atar."
"export.cap.sky.help" = "Atmosfer, gökyüzü kutusu, bulutlar, gece yıldızları, ortam haritaları. 2D oyun için bırakın."
"export.cap.particles.help" = "GPU parçacık sistemi (bevy_hanabi). ~5 MB — oyununuzda parçacık efekti yoksa bırakın."
"export.cap.postfx.help" = "Bloom, SSAO, SSR, DoF, hareket bulanıklığı, sis, OIT vb. (Ton eşleme kalır.)"
"export.cap.water.help" = "Su yüzeyi alt sistemi."
"export.cap.terrain.help" = "Arazi alt sistemi."
"export.cap.spline.help" = "Spline alt sistemi."
"export.cap.navmesh.help" = "Navigasyon ağı oluşturma ve yol bulma (polyanya/vleue)."
"export.cap.physics.help" = "avian katı gövde fizik motoru (~6.5 MiB). Ayrıca su yüzdürmesini ve onunla birlikte çıkarılan navmesh çarpıştırıcı-engellerini de besler. Fizik simülasyonu olmayan bir oyun için bırakın."
"export.cap.render_3d.help" = "Tüm 3D pipeline'ı: bevy_pbr (StandardMaterial, gölgeler, deferred/forward renderleyici), glTF model yükleme ve renzora_shader graf-malzeme sistemi (~10 MiB). KAPALI = yalnızca 2D oyun (sprite'lar + UI). Işıklar/atmosfer hâlâ çalışır (bevy_light tutulur). 3D alt sistemlerinin (Arazi/Su/Gökyüzü/Son İşlem) de kapalı olmasını gerektirir — bunlar bevy_pbr üzerine kuruludur."
"export.cap.audio.help" = "Ses alt sistemi. Sessiz bir oyun için bırakın."
"export.cap.animation.help" = "İskelet/özellik animasyon alt sistemi."
"export.cap.blueprint.help" = "Düğüm grafiği görsel betik çalışma zamanı (~0.2 MiB). Proje .blueprint/.bp grafikleri içerdiğinde otomatik etkinleştirilir."
"export.cap.rhai.help" = "Rhai betik arka ucu (~2.3 MiB). Lua her zaman dahildir; Rhai yalnızca proje .rhai betikleri içerdiğinde otomatik etkinleştirilir."
"export.cap.script_http.help" = "Betik HTTP fiilleri — ureq + rustls/ring TLS yığınını çeker (~1 MiB). Bir betik http_get/http_post çağırdığında otomatik etkinleştirilir."
"export.cap.game_ui.help" = "Oyun içi UI alt sistemi."
