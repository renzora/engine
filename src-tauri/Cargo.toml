[package]
name = "renzora-engine"
version = "1.0.0"
description = "A cross-platform Javascript game engine"
authors = ["PianoJames"]
license = ""
repository = ""
default-run = "renzora-engine"
edition = "2021"

[[bin]]
name = "renzora-engine"
path = "src/main.rs"

[build-dependencies]
tauri-build = { version = "2.0", features = [] }

[dependencies]
serde_json = "1.0"
serde = { version = "1.0", features = ["derive"] }
tauri = { version = "2.0", features = [] }
tauri-plugin-shell = "2.0"

[lib]
name = "renzora_engine_lib"
crate-type = ["staticlib", "cdylib", "rlib"]
