<!-- lab_037_settings_panel: centered settings panel with tab row + rows of toggles -->
<template>
    <node position="absolute" left="0px" top="0px" width="100%" height="100%" background="#0B0E13E6" justify_content="center" align_items="center">
        <node width="640px" background="#12161E" border="1px" border_color="#2C3340" border_radius="12px" flex_direction="column">
            <node padding="18px" flex_direction="row" justify_content="space_between" align_items="center" border_color="#2C3340">
                <text font_size="20" font_color="#FFFFFF">Settings</text>
                <button padding="6px 10px" background="#1B1F27" border_radius="6px" hover:background="#222A36" on_press="close_settings" justify_content="center">
                    <text font_size="13" font_color="#A8B2C0">Close</text>
                </button>
            </node>
            <node padding="0px 18px" flex_direction="row" column_gap="6px">
                <button padding="9px 16px" background="#4C8BF5" border_radius="6px" hover:background="#6BA1F8" on_press="tab_general" justify_content="center">
                    <text font_size="13" font_color="#FFFFFF">General</text>
                </button>
                <button padding="9px 16px" background="#1B1F27" border_radius="6px" hover:background="#222A36" on_press="tab_video" justify_content="center">
                    <text font_size="13" font_color="#A8B2C0">Video</text>
                </button>
                <button padding="9px 16px" background="#1B1F27" border_radius="6px" hover:background="#222A36" on_press="tab_gameplay" justify_content="center">
                    <text font_size="13" font_color="#A8B2C0">Gameplay</text>
                </button>
            </node>
            <node padding="18px" flex_direction="column" row_gap="12px">
                <node flex_direction="row" justify_content="space_between" align_items="center" padding="10px 12px" background="#171B23" border_radius="8px">
                    <text font_size="14" font_color="#E6EAF0">Language</text>
                    <text font_size="13" font_color="#7C8694">English</text>
                </node>
                <node flex_direction="row" justify_content="space_between" align_items="center" padding="10px 12px" background="#171B23" border_radius="8px">
                    <text font_size="14" font_color="#E6EAF0">Subtitles</text>
                    <button padding="5px 14px" background="#2E7D5B" border_radius="999px" hover:background="#379268" on_press="toggle_subtitles" justify_content="center">
                        <text font_size="12" font_color="#FFFFFF">On</text>
                    </button>
                </node>
                <node flex_direction="row" justify_content="space_between" align_items="center" padding="10px 12px" background="#171B23" border_radius="8px">
                    <text font_size="14" font_color="#E6EAF0">Auto-Save</text>
                    <button padding="5px 14px" background="#2E7D5B" border_radius="999px" hover:background="#379268" on_press="toggle_autosave" justify_content="center">
                        <text font_size="12" font_color="#FFFFFF">On</text>
                    </button>
                </node>
                <node flex_direction="row" justify_content="space_between" align_items="center" padding="10px 12px" background="#171B23" border_radius="8px">
                    <text font_size="14" font_color="#E6EAF0">Telemetry</text>
                    <button padding="5px 14px" background="#3A2630" border_radius="999px" hover:background="#4A303C" on_press="toggle_telemetry" justify_content="center">
                        <text font_size="12" font_color="#E06C75">Off</text>
                    </button>
                </node>
            </node>
            <node padding="16px 18px" flex_direction="row" justify_content="flex_end" column_gap="10px">
                <button padding="10px 18px" background="#1B1F27" border="1px" border_color="#2C3340" border_radius="8px" hover:background="#222A36" on_press="reset_defaults" justify_content="center">
                    <text font_size="13" font_color="#A8B2C0">Defaults</text>
                </button>
                <button padding="10px 18px" background="#4C8BF5" border_radius="8px" hover:background="#6BA1F8" on_press="apply_settings" justify_content="center">
                    <text font_size="13" font_color="#FFFFFF">Apply</text>
                </button>
            </node>
        </node>
    </node>
</template>
