<!-- lab_035_main_menu: full-screen main menu with title, primary actions, footer build tag -->
<template>
    <property name="title">RENZORA</property>
    <property name="build">r1-alpha6</property>
    <node position="absolute" left="0px" top="0px" width="100%" height="100%" background="#0B0E13F2" flex_direction="column" justify_content="center" align_items="center" row_gap="40px">
        <node flex_direction="column" align_items="center" row_gap="8px">
            <text font_size="68" font_color="#FFFFFF">{title}</text>
            <text font_size="14" font_color="#7C8694">FORGE YOUR WORLD</text>
        </node>
        <node flex_direction="column" row_gap="10px" width="340px">
            <button padding="15px" background="#4C8BF5" border_radius="8px" hover:background="#6BA1F8" on_press="continue_game" justify_content="center">
                <text font_size="15" font_color="#FFFFFF">Continue</text>
            </button>
            <button padding="15px" background="#1B1F27" border="1px" border_color="#2C3340" border_radius="8px" hover:background="#222A36" on_press="new_game" justify_content="center">
                <text font_size="15" font_color="#FFFFFF">New Game</text>
            </button>
            <button padding="15px" background="#1B1F27" border="1px" border_color="#2C3340" border_radius="8px" hover:background="#222A36" on_press="load_game" justify_content="center">
                <text font_size="15" font_color="#FFFFFF">Load Game</text>
            </button>
            <button padding="15px" background="#1B1F27" border="1px" border_color="#2C3340" border_radius="8px" hover:background="#222A36" on_press="open_settings" justify_content="center">
                <text font_size="15" font_color="#FFFFFF">Settings</text>
            </button>
            <button padding="15px" background="#1B1F27" border="1px" border_color="#3A2630" border_radius="8px" hover:background="#2A1E24" on_press="quit_game" justify_content="center">
                <text font_size="15" font_color="#E06C75">Quit</text>
            </button>
        </node>
        <node position="absolute" bottom="20px" right="24px">
            <text font_size="12" font_color="#5A6370">build {build}</text>
        </node>
    </node>
</template>
