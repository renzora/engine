<!-- Left-side quest log — multiple `card` components in a flex column with
     status chips and progress bars. -->
<template>
    <node
        position="absolute"
        left="32px"
        top="32px"
        width="380px"
        background="#0D0F14"
        border="1px"
        border_color="#222B38"
        border_radius="12px"
        padding="16px"
        flex_direction="column"
        row_gap="12px"
    >
        <node flex_direction="row" justify_content="space_between" align_items="center">
            <text font_size="18" font_color="#FFFFFF">Quests</text>
            <node template="ui/components/chip.html" text="3 active" color="#4C8BF5" />
        </node>

        <node template="ui/components/card.html" title="Ashen Lighthouse" subtitle="Main story · Chapter 2">
            <node flex_direction="column" row_gap="8px">
                <text font_size="12" font_color="#AEB6C2">
                    Reach the lighthouse before sundown and light the beacon.
                </text>
                <node template="ui/components/progress.html" fill="45%" color="#4C8BF5" height="6px" />
                <node flex_direction="row" justify_content="space_between">
                    <text font_size="11" font_color="#8A93A2">2 / 4 objectives</text>
                    <text font_size="11" font_color="#F1C40F">+ 350 XP</text>
                </node>
            </node>
        </node>

        <node template="ui/components/card.html" title="Hunter's Bounty" subtitle="Side · Cinderwood">
            <node flex_direction="column" row_gap="8px">
                <text font_size="12" font_color="#AEB6C2">
                    Slay 7 dire wolves to prove your worth to the hunters' guild.
                </text>
                <node template="ui/components/progress.html" fill="71%" color="#E74C3C" height="6px" />
                <node flex_direction="row" justify_content="space_between">
                    <text font_size="11" font_color="#8A93A2">5 / 7 slain</text>
                    <text font_size="11" font_color="#F1C40F">+ 180 XP</text>
                </node>
            </node>
        </node>

        <node template="ui/components/card.html" title="Whispers in the Mist" subtitle="Side · Hollow Glade">
            <node flex_direction="row" justify_content="space_between" align_items="center">
                <node template="ui/components/chip.html" text="Tracked" color="#2ECC71" />
                <text font_size="11" font_color="#5A6678">No progress yet</text>
            </node>
        </node>
    </node>
</template>
