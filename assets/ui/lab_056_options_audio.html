<!-- lab_056_options_audio: audio options with slider-track rows (filled bar = level) + mute toggles -->
<template>
    <node position="absolute" left="0px" top="0px" width="100%" height="100%" background="#0B0E13E6" justify_content="center" align_items="center">
        <node width="560px" background="#12161E" border="1px" border_color="#2C3340" border_radius="12px" flex_direction="column" padding="20px" row_gap="16px">
            <text font_size="20" font_color="#FFFFFF">Audio</text>
            <node flex_direction="column" row_gap="14px">
                <node flex_direction="column" row_gap="8px">
                    <node flex_direction="row" justify_content="space_between"><text font_size="13" font_color="#E6EAF0">Master</text><text font_size="12" font_color="#7C8694">80%</text></node>
                    <button width="100%" height="10px" background="#1B1F27" border_radius="999px" on_press="set_master_volume" justify_content="flex_start"><node width="80%" height="10px" background="#4C8BF5" border_radius="999px"></node></button>
                </node>
                <node flex_direction="column" row_gap="8px">
                    <node flex_direction="row" justify_content="space_between"><text font_size="13" font_color="#E6EAF0">Music</text><text font_size="12" font_color="#7C8694">55%</text></node>
                    <button width="100%" height="10px" background="#1B1F27" border_radius="999px" on_press="set_music_volume" justify_content="flex_start"><node width="55%" height="10px" background="#4C8BF5" border_radius="999px"></node></button>
                </node>
                <node flex_direction="column" row_gap="8px">
                    <node flex_direction="row" justify_content="space_between"><text font_size="13" font_color="#E6EAF0">SFX</text><text font_size="12" font_color="#7C8694">90%</text></node>
                    <button width="100%" height="10px" background="#1B1F27" border_radius="999px" on_press="set_sfx_volume" justify_content="flex_start"><node width="90%" height="10px" background="#4C8BF5" border_radius="999px"></node></button>
                </node>
                <node flex_direction="column" row_gap="8px">
                    <node flex_direction="row" justify_content="space_between"><text font_size="13" font_color="#E6EAF0">Voice</text><text font_size="12" font_color="#7C8694">70%</text></node>
                    <button width="100%" height="10px" background="#1B1F27" border_radius="999px" on_press="set_voice_volume" justify_content="flex_start"><node width="70%" height="10px" background="#4C8BF5" border_radius="999px"></node></button>
                </node>
            </node>
            <node flex_direction="row" justify_content="space_between" align_items="center" padding="10px 12px" background="#171B23" border_radius="8px"><text font_size="13" font_color="#E6EAF0">Mute when minimized</text><button padding="5px 14px" background="#2E7D5B" border_radius="999px" hover:background="#379268" on_press="toggle_mute_minimized" justify_content="center"><text font_size="12" font_color="#FFFFFF">On</text></button></node>
            <node flex_direction="row" justify_content="flex_end">
                <button padding="10px 18px" background="#4C8BF5" border_radius="8px" hover:background="#6BA1F8" on_press="apply_audio" justify_content="center"><text font_size="13" font_color="#FFFFFF">Apply</text></button>
            </node>
        </node>
    </node>
</template>
