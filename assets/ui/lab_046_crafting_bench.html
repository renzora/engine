<!-- lab_046_crafting_bench: recipe list + ingredient requirements + craft button with output preview -->
<template>
    <node position="absolute" left="0px" top="0px" width="100%" height="100%" background="#0B0E13E6" justify_content="center" align_items="center">
        <node width="720px" background="#12161E" border="1px" border_color="#2C3340" border_radius="12px" flex_direction="column" padding="20px" row_gap="16px">
            <text font_size="20" font_color="#FFFFFF">Crafting Bench</text>
            <node flex_direction="row" column_gap="16px">
                <node width="220px" flex_direction="column" row_gap="8px">
                    <button padding="11px 12px" background="#222A36" border="1px" border_color="#4C8BF5" border_radius="8px" hover:background="#28323F" on_press="recipe_steel_blade" justify_content="flex_start"><text font_size="13" font_color="#FFFFFF">Steel Blade</text></button>
                    <button padding="11px 12px" background="#171B23" border_radius="8px" hover:background="#1F2530" on_press="recipe_health_tonic" justify_content="flex_start"><text font_size="13" font_color="#A8B2C0">Health Tonic</text></button>
                    <button padding="11px 12px" background="#171B23" border_radius="8px" hover:background="#1F2530" on_press="recipe_iron_shield" justify_content="flex_start"><text font_size="13" font_color="#A8B2C0">Iron Shield</text></button>
                </node>
                <node flex_grow="1" flex_direction="column" row_gap="12px" padding="14px" background="#171B23" border_radius="10px">
                    <node flex_direction="row" align_items="center" column_gap="12px">
                        <node width="64px" height="64px" background="#1B1F27" border="1px" border_color="#3A4250" border_radius="8px" flex_shrink="0"></node>
                        <node flex_direction="column" row_gap="4px"><text font_size="15" font_color="#FFFFFF">Steel Blade</text><text font_size="12" font_color="#8A93A2">+18 attack</text></node>
                    </node>
                    <text font_size="13" font_color="#A8B2C0">Requires</text>
                    <node flex_direction="row" justify_content="space_between" padding="8px 10px" background="#12161E" border_radius="6px"><text font_size="12" font_color="#E6EAF0">Steel Ingot</text><text font_size="12" font_color="#2E7D5B">3 / 3</text></node>
                    <node flex_direction="row" justify_content="space_between" padding="8px 10px" background="#12161E" border_radius="6px"><text font_size="12" font_color="#E6EAF0">Leather Strap</text><text font_size="12" font_color="#E06C75">1 / 2</text></node>
                    <button padding="12px" background="#4C8BF5" border_radius="8px" hover:background="#6BA1F8" on_press="craft_item" justify_content="center"><text font_size="13" font_color="#FFFFFF">Craft</text></button>
                </node>
            </node>
            <node flex_direction="row" justify_content="flex_end">
                <button padding="10px 18px" background="#1B1F27" border="1px" border_color="#2C3340" border_radius="8px" hover:background="#222A36" on_press="close_bench" justify_content="center"><text font_size="13" font_color="#A8B2C0">Close</text></button>
            </node>
        </node>
    </node>
</template>
