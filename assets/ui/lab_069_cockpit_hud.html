<!-- Sci-fi cockpit HUD: flight instruments + horizon -->
<template>
    <node position="absolute" left="0px" top="0px" width="100%" height="100%" background="#02050A">
        <node position="absolute" left="0px" top="0px" width="100%" height="100%" flex_direction="column" align_items="center" justify_content="center">
            <node width="380px" height="380px" border="2px" border_color="#19E0C455" border_radius="190px" background="#06140F33" />
        </node>
        <node position="absolute" left="40px" top="50%" width="120px" height="240px" flex_direction="column" justify_content="center" row_gap="6px">
            <text font_size="13" font_color="#19E0C4">ALT</text>
            <node vector="gauge" width="120px" height="120px" min_width="120px" flex_shrink="0" value="84" min="0" max="100" start="90" sweep="270" color="#19E0C4" track="#0C2620" thickness="10" readout="8420" unit="M" readsize="20" />
        </node>
        <node position="absolute" right="40px" top="50%" width="120px" height="240px" flex_direction="column" justify_content="center" row_gap="6px">
            <text font_size="13" font_color="#FFC857">SPD</text>
            <node vector="gauge" width="120px" height="120px" min_width="120px" flex_shrink="0" value="62" min="0" max="100" start="90" sweep="270" color="#FFC857" track="#2A2410" thickness="10" readout="620" unit="KTS" readsize="20" />
        </node>
        <node position="absolute" left="50%" top="30px" flex_direction="row" column_gap="20px">
            <text font_size="14" font_color="#19E0C4">HDG 087</text>
            <text font_size="14" font_color="#19E0C4">PITCH +04</text>
            <text font_size="14" font_color="#FF6B6B">FUEL 38%</text>
        </node>
        <node position="absolute" left="50%" top="50%" width="220px" height="2px" background="#19E0C4" />
        <node position="absolute" left="40px" bottom="40px" flex_direction="column" row_gap="4px">
            <text font_size="12" font_color="#5BD3C0">WPN: ARMED</text>
            <text font_size="12" font_color="#5BD3C0">RDR: SCAN</text>
            <text font_size="12" font_color="#FF6B6B">LOCK: NONE</text>
        </node>
    </node>
</template>
