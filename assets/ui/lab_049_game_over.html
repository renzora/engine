<!-- lab_049_game_over: somber full-screen death screen with run stats + retry/quit -->
<template>
    <node position="absolute" left="0px" top="0px" width="100%" height="100%" background="#08060899" flex_direction="column" justify_content="center" align_items="center" row_gap="30px">
        <text font_size="60" font_color="#E06C75">YOU DIED</text>
        <node width="340px" flex_direction="column" row_gap="8px">
            <node flex_direction="row" justify_content="space_between" padding="9px 12px" background="#171B2399" border_radius="8px"><text font_size="13" font_color="#8A93A2">Time Survived</text><text font_size="13" font_color="#E6EAF0">42:17</text></node>
            <node flex_direction="row" justify_content="space_between" padding="9px 12px" background="#171B2399" border_radius="8px"><text font_size="13" font_color="#8A93A2">Enemies Slain</text><text font_size="13" font_color="#E6EAF0">318</text></node>
            <node flex_direction="row" justify_content="space_between" padding="9px 12px" background="#171B2399" border_radius="8px"><text font_size="13" font_color="#8A93A2">Depth Reached</text><text font_size="13" font_color="#E6EAF0">Floor 7</text></node>
        </node>
        <node width="340px" flex_direction="column" row_gap="10px">
            <button padding="14px" background="#4C8BF5" border_radius="8px" hover:background="#6BA1F8" on_press="retry_run" justify_content="center"><text font_size="14" font_color="#FFFFFF">Retry</text></button>
            <button padding="14px" background="#1B1F27" border="1px" border_color="#2C3340" border_radius="8px" hover:background="#222A36" on_press="load_last_save" justify_content="center"><text font_size="14" font_color="#A8B2C0">Load Last Save</text></button>
            <button padding="14px" background="#1B1F27" border="1px" border_color="#3A2630" border_radius="8px" hover:background="#2A1E24" on_press="quit_to_title" justify_content="center"><text font_size="14" font_color="#E06C75">Quit to Title</text></button>
        </node>
    </node>
</template>
