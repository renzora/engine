<!-- Fuel gauge: bottom-right vertical-feel meter with a labeled fill and low marker -->
<template>
    <property name="color">#37C871</property>
    <node position="absolute" bottom="24px" right="28px" flex_direction="column" align_items="center" row_gap="6px">
        <text font_size="11" font_color="#8C97A6">FUEL</text>
        <node width="22px" height="120px" background="#15211A" border="1px" border_color="#214030" border_radius="6px" padding="2px" flex_direction="column" justify_content="flex_end">
            <node width="100%" height="64%" background="{color}" border_radius="4px" />
        </node>
        <text font_size="12" font_color="#FFFFFF">{{ Vehicle.fuel }}%</text>
    </node>
</template>
