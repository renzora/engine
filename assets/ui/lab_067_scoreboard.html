<!-- lab_067_scoreboard: end-of-match team scoreboard, two team tables with K/D/A columns + MVP -->
<template>
    <node position="absolute" left="0px" top="0px" width="100%" height="100%" background="#0B0E13F2" justify_content="center" align_items="center">
        <node width="780px" background="#12161E" border="1px" border_color="#2C3340" border_radius="12px" flex_direction="column" padding="20px" row_gap="16px">
            <node flex_direction="row" justify_content="space_between" align_items="center">
                <text font_size="22" font_color="#2E7D5B">VICTORY — Blue Team</text>
                <text font_size="14" font_color="#7C8694">Score 50 — 42</text>
            </node>
            <node flex_direction="column" row_gap="6px">
                <node flex_direction="row" justify_content="space_between" padding="8px 12px" background="#0F151C" border_radius="8px"><text font_size="12" font_color="#4C8BF5">Blue Team</text><text font_size="12" font_color="#7C8694">K / D / A</text></node>
                <node flex_direction="row" justify_content="space_between" align_items="center" padding="9px 12px" background="#171B23" border="1px" border_color="#E5B567" border_radius="8px"><text font_size="13" font_color="#E5B567">Valkyrjr (MVP)</text><text font_size="13" font_color="#E6EAF0">24 / 6 / 11</text></node>
                <node flex_direction="row" justify_content="space_between" align_items="center" padding="9px 12px" background="#171B23" border_radius="8px"><text font_size="13" font_color="#E6EAF0">Ironclad</text><text font_size="13" font_color="#A8B2C0">12 / 9 / 18</text></node>
                <node flex_direction="row" justify_content="space_between" align_items="center" padding="9px 12px" background="#171B23" border_radius="8px"><text font_size="13" font_color="#E6EAF0">Stormwind</text><text font_size="13" font_color="#A8B2C0">8 / 11 / 22</text></node>
            </node>
            <node flex_direction="column" row_gap="6px">
                <node flex_direction="row" justify_content="space_between" padding="8px 12px" background="#0F151C" border_radius="8px"><text font_size="12" font_color="#E06C75">Red Team</text><text font_size="12" font_color="#7C8694">K / D / A</text></node>
                <node flex_direction="row" justify_content="space_between" align_items="center" padding="9px 12px" background="#171B23" border_radius="8px"><text font_size="13" font_color="#E6EAF0">Nightshade</text><text font_size="13" font_color="#A8B2C0">18 / 14 / 7</text></node>
                <node flex_direction="row" justify_content="space_between" align_items="center" padding="9px 12px" background="#171B23" border_radius="8px"><text font_size="13" font_color="#E6EAF0">Ravenhart</text><text font_size="13" font_color="#A8B2C0">10 / 16 / 12</text></node>
                <node flex_direction="row" justify_content="space_between" align_items="center" padding="9px 12px" background="#171B23" border_radius="8px"><text font_size="13" font_color="#E6EAF0">Ashfall</text><text font_size="13" font_color="#A8B2C0">6 / 18 / 9</text></node>
            </node>
            <node flex_direction="row" justify_content="flex_end" column_gap="10px">
                <button padding="11px 18px" background="#1B1F27" border="1px" border_color="#2C3340" border_radius="8px" hover:background="#222A36" on_press="leave_match" justify_content="center"><text font_size="13" font_color="#A8B2C0">Leave</text></button>
                <button padding="11px 18px" background="#4C8BF5" border_radius="8px" hover:background="#6BA1F8" on_press="play_again" justify_content="center"><text font_size="13" font_color="#FFFFFF">Play Again</text></button>
            </node>
        </node>
    </node>
</template>
