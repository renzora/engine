<!-- FPS readout: tiny top-left-corner debug chip showing live frames per second -->
<template>
    <node position="absolute" top="6px" left="6px" flex_direction="row" align_items="center" column_gap="5px" padding="3px 8px 3px 8px" background="#000000A0" border_radius="4px">
        <text font_size="11" font_color="#37C871">{{ Debug.fps }}</text>
        <text font_size="11" font_color="#6B7480">FPS</text>
    </node>
</template>
