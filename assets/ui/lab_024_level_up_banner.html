<!-- Level-up banner: centered celebratory card with big level number and subtitle -->
<template>
    <property name="level">14</property>
    <node position="absolute" top="34%" left="50%" margin="0px 0px 0px -150px" width="300px" flex_direction="column" align_items="center" row_gap="6px" padding="22px" background="#15110AF2" border="2px" border_color="#FFD24A" border_radius="14px">
        <text font_size="13" font_color="#FFD24A">LEVEL UP</text>
        <text font_size="48" font_color="#FFFFFF">{level}</text>
        <text font_size="12" font_color="#AEB6C2">New skill point available</text>
    </node>
</template>
