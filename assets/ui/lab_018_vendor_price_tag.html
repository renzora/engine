<!-- Vendor price tag: small pill with a gold coin dot and a buy price -->
<template>
    <property name="price">240</property>
    <node flex_direction="row" align_items="center" column_gap="6px" padding="4px 10px 4px 8px" background="#1A1606" border="1px" border_color="#5A4A12" border_radius="999px">
        <node width="12px" height="12px" background="#FFD24A" border_radius="999px" flex_shrink="0" />
        <text font_size="13" font_color="#FFD24A">{price}</text>
    </node>
</template>
