<!-- Bundled custom-cursor component.

     Use:
         <cursor />
         <cursor size="20px" color="#F1C40F" />
         <cursor src="cursors/arrow.png" />

     With no `src`, renders as a styled colored dot (the background/border
     properties below). Drop a PNG/JPG onto the inspector's "UI Image" Source
     slot when this entity is selected, and writeback turns this template's
     `<image>` into an image cursor.

     Behind the scenes: any markup entity named "cursor_follow" is repositioned
     by `renzora_hui::cursor` each frame to the window's cursor position, and
     the OS cursor is auto-hidden while any such entity exists.
-->
<template>
    <property name="size">14px</property>
    <property name="src"></property>
    <property name="color">#FFFFFF</property>
    <property name="border">#0D0F14</property>

    <image
        name="cursor_follow"
        src="{src}"
        position="absolute"
        width="{size}"
        height="{size}"
        background="{color}"
        border="2px"
        border_color="{border}"
        border_radius="999px"
    />
</template>
