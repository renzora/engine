<!-- lab_048_level_up: celebratory level-up card with stat gains + allocate-point row -->
<template>
    <node position="absolute" left="0px" top="0px" width="100%" height="100%" background="#0B0E13E6" justify_content="center" align_items="center">
        <node width="400px" background="#12161E" border="1px" border_color="#E5B567" border_radius="14px" flex_direction="column" padding="24px" row_gap="18px" align_items="center">
            <text font_size="16" font_color="#E5B567">LEVEL UP</text>
            <text font_size="56" font_color="#FFFFFF">19</text>
            <node width="100%" flex_direction="column" row_gap="8px">
                <node flex_direction="row" justify_content="space_between" padding="9px 12px" background="#171B23" border_radius="8px"><text font_size="13" font_color="#A8B2C0">Max HP</text><text font_size="13" font_color="#2E7D5B">+24</text></node>
                <node flex_direction="row" justify_content="space_between" padding="9px 12px" background="#171B23" border_radius="8px"><text font_size="13" font_color="#A8B2C0">Max MP</text><text font_size="13" font_color="#2E7D5B">+12</text></node>
                <node flex_direction="row" justify_content="space_between" padding="9px 12px" background="#171B23" border_radius="8px"><text font_size="13" font_color="#A8B2C0">Skill Points</text><text font_size="13" font_color="#2E7D5B">+1</text></node>
            </node>
            <node width="100%" flex_direction="row" column_gap="10px">
                <button flex_grow="1" padding="12px" background="#1B1F27" border="1px" border_color="#2C3340" border_radius="8px" hover:background="#222A36" on_press="allocate_points" justify_content="center"><text font_size="13" font_color="#A8B2C0">Allocate</text></button>
                <button flex_grow="1" padding="12px" background="#4C8BF5" border_radius="8px" hover:background="#6BA1F8" on_press="continue_after_levelup" justify_content="center"><text font_size="13" font_color="#FFFFFF">Continue</text></button>
            </node>
        </node>
    </node>
</template>
