services:
  nginx:
    build:
      context: .
      dockerfile: ./Dockerfile-nginx
    ports:
      - "80:80"
    volumes:
      - ../../web:/var/www/html
      - ./config/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
      - mongodb
    networks:
      - php-network
  php:
    build:
      context: .
      dockerfile: ./Dockerfile-php
    ports:
      - "9000:9000"
    environment:
      MONGO_HOST: mongodb
      MONGO_PORT: 27017
      MONGO_DATABASE: renzora
      MONGO_USERNAME: admin
      MONGO_PASSWORD: password
      JWT_KEY: key
    volumes:
      - ../../web:/var/www/html
    networks:
      - php-network
  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - db-data:/data/db
      - ./db:/docker-entrypoint-initdb.d
    networks:
      - php-network
networks:
  php-network:
    driver: bridge
volumes:
  db-data:
