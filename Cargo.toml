[package]
name = "renzora"
version = "0.2.0"
edition = "2021"
default-run = "renzora"

[lib]
name = "renzora"
path = "src/runtime.rs"

[[bin]]
name = "renzora"
path = "src/editor.rs"

[[bin]]
name = "renzora-runtime"
path = "src/editor.rs"

[[bin]]
name = "renzora-server"
path = "src/server.rs"

[features]
default = ["editor", "dynamic", "native", "lua"]
dynamic = ["bevy/dynamic_linking"]
native = ["bevy/default_platform"]
lua = ["renzora_gauges/lua"]
server = []
wasm = [
    "bevy/webgpu",
    "bevy/bevy_asset",
    "bevy/bevy_window",
    "bevy/bevy_winit",
    "bevy/bevy_state",
    "bevy/bevy_log",
    "bevy/bevy_input_focus",
    "bevy/bevy_render",
    "bevy/bevy_core_pipeline",
    "bevy/bevy_pbr",
    "bevy/bevy_gltf",
    "bevy/bevy_scene",
    "bevy/bevy_ui",
    "bevy/bevy_ui_render",
    "bevy/bevy_text",
    "bevy/bevy_picking",
    "bevy/jpeg",
    "bevy/multi_threaded",
    "bevy/async_executor",
]
editor = [
    "dep:renzora_editor",
    "dep:renzora_splash",
    "dep:renzora_viewport",
    "dep:renzora_hierarchy",
    "dep:renzora_widget_gallery",
    "dep:renzora_asset_browser",
    "dep:renzora_inspector",
    "dep:renzora_test_component",
    "dep:renzora_grid",
    "dep:renzora_camera",
    "dep:renzora_keybindings",
    "dep:renzora_scene",
    "dep:renzora_export",
    "dep:renzora_import_ui",
    "dep:renzora_mixer",
    "dep:renzora_console",
    "dep:renzora_debugger",
    "dep:renzora_physics_playground",
    "dep:renzora_gamepad",
    "dep:renzora_gizmo",
    "dep:renzora_settings",
    "renzora_runtime/editor",
    "renzora_physics/editor",
    "renzora_shape_library/editor",
    "renzora_vignette/editor",
    "renzora_film_grain/editor",
    "renzora_pixelation/editor",
    "renzora_crt/editor",
    "renzora_god_rays/editor",
    "renzora_gaussian_blur/editor",
    "renzora_palette_quantization/editor",
    "renzora_distortion/editor",
    "renzora_underwater/editor",
    "renzora_chromatic_aberration/editor",
    "renzora_sharpen/editor",
    "renzora_color_grading/editor",
    "renzora_scanlines/editor",
    "renzora_grayscale/editor",
    "renzora_posterize/editor",
    "renzora_emboss/editor",
    "renzora_oil_painting/editor",
    "renzora_edge_glow/editor",
    "renzora_matrix/editor",
    "renzora_outline/editor",
    "renzora_toon/editor",
    "renzora_sepia/editor",
    "renzora_invert/editor",
    "renzora_pillowbox/editor",
    "renzora_letterbox/editor",
    "renzora_night_vision/editor",
    "renzora_glitch/editor",
    "renzora_radial_blur/editor",
    "renzora_halftone/editor",
    "renzora_hex_pixelate/editor",
    "renzora_dithering/editor",
    "renzora_frosted_glass/editor",
