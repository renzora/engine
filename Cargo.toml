[workspace]
members = [
    ".",
    "crates/renzora",
    "crates/renzora_runtime",
    "crates/renzora_editor",
    "crates/renzora_record",
]

[workspace.dependencies]
bevy = { version = "0.18", features = ["dynamic_linking", "bluenoise_texture", "experimental_pbr_pcss", "jpeg"] }
# Shared external deps. Plugins opt in by name (`bevy_egui = { workspace = true }`)
# so versions stay locked across the workspace.
bevy_egui = "0.39"
# Pin egui to the version bevy_egui 0.39 ships with. Any third-party crate that
# imports `egui::*` directly (e.g. `egui_code_editor`) must consume this same
# version, otherwise their `egui::Ui` and bevy_egui's `egui::Ui` are different
# types and won't unify at the call boundary.
egui = "0.33"
egui-phosphor = { version = "0.11", features = ["regular"] }
egui_code_editor = "0.2"
log = "0.4"

[package]
name = "renzora_app"
version = "0.2.0"
edition = "2021"
default-run = "renzora"

[[bin]]
name = "renzora"
path = "src/main.rs"

[features]
default = ["editor"]
editor = [
    "dep:renzora_runtime",
    "renzora_runtime/lua",
    "renzora_runtime/editor",
]
runtime = ["dep:renzora_runtime", "renzora_runtime/lua"]
server = ["dep:renzora_runtime"]
wasm = [
    "runtime",
    "bevy/webgpu",
    "bevy/bevy_asset",
    "bevy/bevy_window",
    "bevy/bevy_winit",
    "bevy/bevy_state",
    "bevy/bevy_log",
    "bevy/bevy_input_focus",
    "bevy/bevy_render",
    "bevy/bevy_core_pipeline",
    "bevy/bevy_pbr",
    "bevy/bevy_gltf",
    "bevy/bevy_scene",
    "bevy/bevy_ui",
    "bevy/bevy_ui_render",
    "bevy/bevy_text",
    "bevy/bevy_picking",
    "bevy/jpeg",
    "bevy/multi_threaded",
    "bevy/async_executor",
]

[dependencies]
bevy = { workspace = true }

# Single shared library — `editor` feature on this crate adds editor extras.
renzora_runtime = { path = "crates/renzora_runtime", optional = true }
uuid = "1"

# Misc
dynamic_plugin_loader = { path = "crates/dynamic_plugin_loader" }
toml = "0.8"
log = { version = "*", features = ["max_level_debug", "release_max_level_warn"] }

# WASM support: getrandom needs JS backend on wasm32 targets
[target.'cfg(target_arch = "wasm32")'.dependencies]
getrandom_02 = { package = "getrandom", version = "0.2", features = ["js"] }
getrandom_03 = { package = "getrandom", version = "0.3", features = ["wasm_js"] }
wasm-bindgen = "0.2.108"

[build-dependencies]
winres = "0.1"

# Bevy recommended optimizations

[profile.dev]
opt-level = 1

# Enable high optimizations for dependencies (including Bevy), even in debug mode
[profile.dev.package."*"]
opt-level = 3

[profile.dist]
inherits = "release"
opt-level = 2
strip = "symbols"

