toml = "0.8"
log = { version = "*", features = ["max_level_debug", "release_max_level_warn"] }

# WASM support: getrandom needs JS backend on wasm32 targets
[target.'cfg(target_arch = "wasm32")'.dependencies]
getrandom_02 = { package = "getrandom", version = "0.2", features = ["js"] }
getrandom_03 = { package = "getrandom", version = "0.3", features = ["wasm_js"] }
wasm-bindgen = "0.2.108"

# Bevy recommended optimizations

[profile.dev]
opt-level = 1

[profile.dev.package."*"]
opt-level = 3

[profile.release]
lto = "thin"
strip = true

[profile.dist]
inherits = "release"
lto = "fat"
strip = true
codegen-units = 1
opt-level = "z"
panic = "abort"

# Patch bevy_gauge to not pull in bevy's default features (breaks WASM)
[patch.crates-io.bevy_gauge]
path = "crates/third_party/bevy_gauge"
