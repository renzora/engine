# Note: crates/renzora_editor produces the editor SDK

[workspace.dependencies]
bevy = { version = "0.18", features = ["dynamic_linking", "bluenoise_texture", "experimental_pbr_pcss", "jpeg", "meshlet"] }

[package]
name = "renzora_app"
version = "0.2.0"
edition = "2021"
default-run = "renzora"

[lib]
name = "renzora_app"
path = "src/runtime.rs"

[[bin]]
name = "renzora"
path = "src/editor.rs"

[[bin]]
name = "renzora-runtime"
path = "src/editor.rs"

[[bin]]
name = "renzora-server"
path = "src/server.rs"

[features]
default = ["editor"]
editor = [
    "dep:renzora_editor",
    "renzora_editor/lua",
    "renzora_editor/editor",
]
runtime = ["dep:renzora_runtime", "renzora_runtime/lua"]
server = ["dep:renzora_runtime"]
wasm = [
    "runtime",
    "bevy/webgpu",
    "bevy/bevy_asset",
    "bevy/bevy_window",
    "bevy/bevy_winit",
    "bevy/bevy_state",
    "bevy/bevy_log",
    "bevy/bevy_input_focus",
    "bevy/bevy_render",
    "bevy/bevy_core_pipeline",
    "bevy/bevy_pbr",
    "bevy/bevy_gltf",
    "bevy/bevy_scene",
    "bevy/bevy_ui",
    "bevy/bevy_ui_render",
    "bevy/bevy_text",
    "bevy/bevy_picking",
    "bevy/jpeg",
    "bevy/multi_threaded",
    "bevy/async_executor",
]

[dependencies]
bevy = { workspace = true }

# Shared libraries — only ONE is linked per build (editor OR runtime, never both)
renzora_runtime = { path = "crates/renzora_runtime", optional = true }
renzora_editor = { path = "crates/renzora_editor", optional = true }
uuid = "1"

# Misc
dynamic_plugin_loader = { path = "crates/plugins/dynamic_plugin_loader" }
toml = "0.8"
log = { version = "*", features = ["max_level_debug", "release_max_level_warn"] }

# WASM support: getrandom needs JS backend on wasm32 targets
[target.'cfg(target_arch = "wasm32")'.dependencies]
getrandom_02 = { package = "getrandom", version = "0.2", features = ["js"] }
getrandom_03 = { package = "getrandom", version = "0.3", features = ["wasm_js"] }
wasm-bindgen = "0.2.108"

[build-dependencies]
winres = "0.1"

# Bevy recommended optimizations

[profile.dev]
opt-level = 1

# Enable high optimizations for dependencies (including Bevy), even in debug mode
[profile.dev.package."*"]
opt-level = 3

[profile.dist]
inherits = "release"
opt-level = 2

