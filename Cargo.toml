[package]
name = "renzora"
version = "0.2.0"
edition = "2021"

[features]
dynamic = ["bevy/dynamic_linking"]

[[bin]]
name = "renzora"
path = "src/main.rs"

[[bin]]
name = "renzora-runtime"
path = "src/bin/runtime.rs"

[dependencies]
bevy = { version = "0.18", features = ["jpeg"] }
renzora_runtime = { path = "crates/renzora_runtime" }
renzora_editor = { path = "crates/renzora_editor" }
renzora_viewport = { path = "crates/renzora_viewport" }
renzora_hierarchy = { path = "crates/renzora_hierarchy" }
renzora_widget_gallery = { path = "crates/renzora_widget_gallery" }
renzora_asset_browser = { path = "crates/renzora_asset_browser" }

# Bevy recommended optimizations

[profile.dev]
opt-level = 1

[profile.dev.package."*"]
opt-level = 3

[profile.release]
lto = "thin"
strip = true

[profile.dist]
inherits = "release"
lto = "fat"
strip = true
codegen-units = 1
