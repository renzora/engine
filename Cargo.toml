[workspace]
members = [
    ".",
    "crates/renzora_runtime",
    "crates/renzora_editor",
    "crates/renzora",
    # Standalone editor plugins (loaded dynamically from plugins/)
    "crates/renzora_debugger",
    "crates/renzora_gamepad",
    "crates/renzora_widget_gallery",
    "crates/renzora_tutorial",
    "crates/renzora_inspector",
    "crates/renzora_test_component",
    "crates/renzora_mesh_draw",
    "crates/renzora_mesh_edit",
    "crates/renzora_command_palette",
    "crates/renzora_context_menu",
    "crates/renzora_viewport",
    "crates/renzora_hierarchy",
    "crates/renzora_asset_browser",
    "crates/renzora_grid",
    "crates/renzora_camera",
    "crates/renzora_keybindings",
    "crates/renzora_scene",
    "crates/renzora_export",
    "crates/renzora_import_ui",
    "crates/renzora_mixer",
    "crates/renzora_console",
    "crates/renzora_physics_playground",
    "crates/renzora_gizmo",
    "crates/renzora_settings",
    "crates/renzora_particle_editor",
    "crates/renzora_material_editor",
    "crates/renzora_terrain_editor",
    "crates/renzora_foliage_editor",
    "crates/renzora_code_editor",
    "crates/renzora_script_variables",
    "crates/renzora_blueprint_editor",
    "crates/renzora_network_editor",
    "crates/renzora_daw",
    "crates/renzora_level_presets",
    "crates/renzora_shader_editor",
    "crates/renzora_animation_editor",
    "crates/renzora_hub",
    "crates/renzora_auth",
    "crates/renzora_shape_library",
    "crates/renzora_system_monitor",
    "crates/renzora_history",
    "crates/renzora_theme_status",
]
# Note: crates/renzora_editor produces the editor SDK

[workspace.dependencies]
bevy = { version = "0.18", features = ["dynamic_linking", "bluenoise_texture", "experimental_pbr_pcss", "jpeg"] }
# Shared external deps. Plugins opt in by name (`bevy_egui = { workspace = true }`)
# so versions stay locked across the workspace.
bevy_egui = "0.39"
egui-phosphor = { version = "0.11", features = ["regular"] }
log = "0.4"

[package]
name = "renzora_app"
version = "0.2.0"
edition = "2021"
default-run = "renzora"

[lib]
name = "renzora_app"
path = "src/runtime.rs"

[[bin]]
name = "renzora"
path = "src/main.rs"

[features]
default = ["editor"]
editor = [
    "dep:renzora_editor",
    "renzora_editor/lua",
    "renzora_editor/editor",
]
runtime = ["dep:renzora_runtime", "renzora_runtime/lua"]
server = ["dep:renzora_runtime"]
wasm = [
    "runtime",
    "bevy/webgpu",
    "bevy/bevy_asset",
    "bevy/bevy_window",
    "bevy/bevy_winit",
    "bevy/bevy_state",
    "bevy/bevy_log",
    "bevy/bevy_input_focus",
    "bevy/bevy_render",
    "bevy/bevy_core_pipeline",
    "bevy/bevy_pbr",
    "bevy/bevy_gltf",
    "bevy/bevy_scene",
    "bevy/bevy_ui",
    "bevy/bevy_ui_render",
    "bevy/bevy_text",
    "bevy/bevy_picking",
    "bevy/jpeg",
    "bevy/multi_threaded",
    "bevy/async_executor",
]

[dependencies]
bevy = { workspace = true }

# Shared libraries — only ONE is linked per build (editor OR runtime, never both)
renzora_runtime = { path = "crates/renzora_runtime", optional = true }
renzora_editor = { path = "crates/renzora_editor", optional = true }
uuid = "1"

# Misc
dynamic_plugin_loader = { path = "crates/dynamic_plugin_loader" }
toml = "0.8"
log = { version = "*", features = ["max_level_debug", "release_max_level_warn"] }

# WASM support: getrandom needs JS backend on wasm32 targets
[target.'cfg(target_arch = "wasm32")'.dependencies]
getrandom_02 = { package = "getrandom", version = "0.2", features = ["js"] }
getrandom_03 = { package = "getrandom", version = "0.3", features = ["wasm_js"] }
wasm-bindgen = "0.2.108"

[build-dependencies]
winres = "0.1"

# Bevy recommended optimizations

[profile.dev]
opt-level = 1

# Enable high optimizations for dependencies (including Bevy), even in debug mode
[profile.dev.package."*"]
opt-level = 3

[profile.dist]
inherits = "release"
opt-level = 2
strip = "symbols"

