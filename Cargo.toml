[dependencies]
# default-features = false to exclude bevy_audio (we use Kira instead).
# These features are equivalent to Bevy's "3d" preset minus "audio".
bevy = { version = "0.18", default-features = false, features = [
    "default_app",
    "3d_bevy_render",
    "scene",
    "picking",
    "jpeg",
    "bevy_ui",
] }

renzora_runtime = { path = "crates/core/renzora_runtime" }
renzora_physics = { path = "crates/core/renzora_physics" }
renzora_audio = { path = "crates/core/renzora_audio" }
renzora_core = { path = "crates/core/renzora_core" }
renzora_hanabi = { path = "crates/core/renzora_hanabi" }
renzora_material = { path = "crates/core/renzora_material" }
renzora_shader = { path = "crates/core/renzora_shader" }
