# Cargo aliases
[alias]
# Dev: run
renzora = "run --bin renzora"
runtime = "run --bin renzora-runtime --no-default-features"

# Dev: build only
build-editor = "build --bin renzora"
build-runtime = "build --bin renzora-runtime --no-default-features"

# Release builds (static linking, separate target dir)
release-editor = "build --release --bin renzora --target-dir app"
release-editor-solari = "build --release --no-default-features --features editor,solari --target-dir app"
release-runtime = "build --release --bin renzora-runtime --no-default-features --target-dir app"

# WASM: build editor for browser
build-web = "build --features editor --target wasm32-unknown-unknown"

# Dist builds (max optimization for export templates)
dist-runtime = "build --profile dist --bin renzora-runtime --no-default-features --target-dir app"

# Static link the MSVC runtime (eliminates VCRUNTIME140.dll dependency)
[target.x86_64-pc-windows-msvc]
rustflags = ["-C", "target-feature=+crt-static"]

# DLSS SDK include path for bindgen (only used when building with --features solari)
# Update this path if your DLSS SDK is installed elsewhere
[env]
BINDGEN_EXTRA_CLANG_ARGS = "-IC:\\DLSS_SDK\\include"

# Note: rust-lld doesn't work with Bevy dynamic linking on Windows nightly
# linker = "rust-lld.exe"

# Faster linking for Linux (uses lld via clang)
[target.x86_64-unknown-linux-gnu]
linker = "clang"
rustflags = ["-C", "link-arg=-fuse-ld=lld"]
