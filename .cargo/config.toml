# Cargo aliases — everything uses dist profile for consistent plugin hashes
[alias]
# Run
renzora = "run --profile dist --bin renzora --no-default-features --features editor,runtime,server"
runtime = "run --profile dist --bin renzora-runtime --no-default-features --features editor,runtime,server"
server = "run --profile dist --bin renzora-server --no-default-features --features editor,runtime,server"

# Build
build-editor = "build --profile dist --bin renzora --no-default-features --features editor,runtime,server"
build-runtime = "build --profile dist --bin renzora-runtime --no-default-features --features editor,runtime,server"
build-server = "build --profile dist --bin renzora-server --no-default-features --features editor,runtime,server"
build-all = "build --profile dist --workspace"
build-plugins = "build --profile dist --workspace --no-default-features --features editor,runtime,server"

# WASM
build-web = "build --profile dist --bin renzora-runtime --no-default-features --features wasm,runtime --target wasm32-unknown-unknown"
dist-web-editor = "build --profile dist --bin renzora --no-default-features --features editor,wasm --target wasm32-unknown-unknown"
dist-web-runtime = "build --profile dist --bin renzora-runtime --no-default-features --features wasm,runtime --target wasm32-unknown-unknown"

# Android
build-android = "build --profile dist --no-default-features --target aarch64-linux-android"

# iOS
build-ios = "build --profile dist --target aarch64-apple-ios -p renzora-ios"
build-ios-sim = "build --profile dist --target aarch64-apple-ios-sim -p renzora-ios"

# tvOS
build-tvos = "build --profile dist --target aarch64-apple-tvos -p renzora-ios"
build-tvos-sim = "build --profile dist --target aarch64-apple-tvos-sim -p renzora-ios"

# Static link the MSVC runtime (eliminates VCRUNTIME140.dll dependency)
# NOTE: Disabled — crt-static changes crate disambiguators, breaking TypeId
# across dylib boundaries (required for dynamic plugin system).
# [target.x86_64-pc-windows-msvc]
# rustflags = ["-C", "target-feature=+crt-static"]

# macOS: embed @loader_path so binaries find dylibs next to themselves
[target.aarch64-apple-darwin]
rustflags = ["-C", "link-arg=-Wl,-rpath,@loader_path"]

[target.x86_64-apple-darwin]
rustflags = ["-C", "link-arg=-Wl,-rpath,@loader_path"]

# Faster linking for Linux (uses mold, 5x faster than lld)
[target.x86_64-unknown-linux-gnu]
linker = "clang"
rustflags = ["-C", "link-arg=-fuse-ld=/usr/bin/mold"]
