[config]
default_to_workspace = false

# =============================================================================
# Core commands — what devs use daily
# =============================================================================

# Clean stale build outputs (keeps deps/build/incremental cache)
[tasks.clean-outputs]
description = "Remove final artifacts from target/dist/ (keeps dep cache)"
[tasks.clean-outputs.windows]
script_runner = "powershell.exe"
script_runner_args = ["-ExecutionPolicy", "Bypass", "-File"]
script_extension = "ps1"
script = '''
Get-ChildItem target/dist -File -ErrorAction SilentlyContinue | Remove-Item -Force
'''
[tasks.clean-outputs.linux]
script = 'find target/dist -maxdepth 1 -type f ! -name ".cargo-lock" -delete 2>/dev/null; true'
[tasks.clean-outputs.mac]
script = 'find target/dist -maxdepth 1 -type f ! -name ".cargo-lock" -delete 2>/dev/null; true'

# makers build-editor — compile editor + plugins
[tasks.build-editor]
description = "Build editor and sync to dist/"
dependencies = ["build-editor-cargo", "sync-dist-editor"]

[tasks.build-editor-cargo]
description = "Compile workspace (editor)"
command = "cargo"
args = ["build", "--profile", "dist", "--workspace", "--no-default-features", "--features", "editor", "--target-dir", "target/editor"]

# makers build-runtime — compile runtime + plugins (export template)
[tasks.build-runtime]
description = "Build runtime and sync to dist/"
dependencies = ["build-runtime-cargo", "sync-dist-runtime"]

[tasks.build-runtime-cargo]
description = "Compile workspace (runtime, excluding editor plugins)"
[tasks.build-runtime-cargo.windows]
script_runner = "powershell.exe"
script_runner_args = ["-ExecutionPolicy", "Bypass", "-File"]
script_extension = "ps1"
script = '''
$excludes = Get-ChildItem crates/editor/*/Cargo.toml -ErrorAction SilentlyContinue | ForEach-Object {
    (Select-String -Path $_.FullName -Pattern '^name\s*=\s*"(.+)"' | Select-Object -First 1).Matches.Groups[1].Value
} | ForEach-Object { "--exclude"; $_ }
cargo build --profile dist --workspace --no-default-features --features runtime --target-dir target/runtime @excludes
'''
[tasks.build-runtime-cargo.linux]
script = '''
EXCLUDES=$(grep -h '^name' crates/editor/*/Cargo.toml | sed 's/name = "\(.*\)"/--exclude \1/')
cargo build --profile dist --workspace --no-default-features --features runtime --target-dir target/runtime $EXCLUDES
'''
[tasks.build-runtime-cargo.mac]
script = '''
EXCLUDES=$(grep -h '^name' crates/editor/*/Cargo.toml | sed 's/name = "\(.*\)"/--exclude \1/')
cargo build --profile dist --workspace --no-default-features --features runtime --target-dir target/runtime $EXCLUDES
'''

# makers build-server — compile server + plugins
[tasks.build-server]
description = "Build server and sync to dist/"
dependencies = ["build-server-cargo", "sync-dist-server"]

[tasks.build-server-cargo]
description = "Compile workspace (server, excluding editor plugins)"
[tasks.build-server-cargo.windows]
script_runner = "powershell.exe"
script_runner_args = ["-ExecutionPolicy", "Bypass", "-File"]
script_extension = "ps1"
script = '''
$excludes = Get-ChildItem crates/editor/*/Cargo.toml -ErrorAction SilentlyContinue | ForEach-Object {
    (Select-String -Path $_.FullName -Pattern '^name\s*=\s*"(.+)"' | Select-Object -First 1).Matches.Groups[1].Value
} | ForEach-Object { "--exclude"; $_ }
cargo build --profile dist --workspace --no-default-features --features server --target-dir target/server @excludes
'''
[tasks.build-server-cargo.linux]
script = '''
EXCLUDES=$(grep -h '^name' crates/editor/*/Cargo.toml | sed 's/name = "\(.*\)"/--exclude \1/')
cargo build --profile dist --workspace --no-default-features --features server --target-dir target/server $EXCLUDES
'''
[tasks.build-server-cargo.mac]
script = '''
EXCLUDES=$(grep -h '^name' crates/editor/*/Cargo.toml | sed 's/name = "\(.*\)"/--exclude \1/')
cargo build --profile dist --workspace --no-default-features --features server --target-dir target/server $EXCLUDES
'''

# makers run — build + run the editor from dist/
[tasks.run]
description = "Build and run the editor"
dependencies = ["build-editor"]
[tasks.run.windows]
command = "dist\\windows-x64\\editor\\renzora.exe"
[tasks.run.linux]
command = "./dist/linux-x64/editor/renzora"
[tasks.run.mac]
script = '''
ARCH=$(uname -m | sed 's/arm64/arm64/;s/x86_64/x64/')
./dist/macos-$ARCH/editor/renzora
'''

# =============================================================================
# Docker — cross-platform release builds
# =============================================================================

[tasks.docker-build]
description = "Build the Docker image"
command = "docker"
args = ["build", "-f", "docker/engine-builder/Dockerfile", "-t", "renzora/engine", "."]

[tasks.docker-create]
description = "Create a persistent build container (first time only)"
[tasks.docker-create.windows]
script_runner = "powershell.exe"
script_runner_args = ["-ExecutionPolicy", "Bypass", "-File"]
script_extension = "ps1"
script = '''
$hash = (Get-FileHash -InputStream ([System.IO.MemoryStream]::new([System.Text.Encoding]::UTF8.GetBytes((Get-Location).Path))) -Algorithm MD5).Hash.Substring(0,8).ToLower()
$name = "renzora-$hash"
docker create --name $name -v "${PWD}:/app/src" -v "${PWD}/dist:/output" -w /app/src renzora/engine sleep infinity
Write-Output "Created container: $name"
'''
[tasks.docker-create.linux]
script = '''
NAME="renzora-$(echo -n "$PWD" | md5sum | cut -c1-8)"
docker create --name "$NAME" -v "$PWD:/app/src" -v "$PWD/dist:/output" -w /app/src renzora/engine sleep infinity
echo "Created container: $NAME"
'''
[tasks.docker-create.mac]
script = '''
NAME="renzora-$(echo -n "$PWD" | md5sum | cut -c1-8)"
docker create --name "$NAME" -v "$PWD:/app/src" -v "$PWD/dist:/output" -w /app/src renzora/engine sleep infinity
echo "Created container: $NAME"
'''

[tasks.docker-start]
description = "Start the build container"
[tasks.docker-start.windows]
script_runner = "powershell.exe"
script_runner_args = ["-ExecutionPolicy", "Bypass", "-File"]
script_extension = "ps1"
script = 'docker start "renzora-$((Get-FileHash -InputStream ([System.IO.MemoryStream]::new([System.Text.Encoding]::UTF8.GetBytes((Get-Location).Path))) -Algorithm MD5).Hash.Substring(0,8).ToLower())"'
[tasks.docker-start.linux]
script = 'docker start "renzora-$(echo -n "$PWD" | md5sum | cut -c1-8)"'
[tasks.docker-start.mac]
script = 'docker start "renzora-$(echo -n "$PWD" | md5sum | cut -c1-8)"'

[tasks.docker-run]
description = "Build all platforms via persistent container"
dependencies = ["docker-start"]
[tasks.docker-run.windows]
script_runner = "powershell.exe"
script_runner_args = ["-ExecutionPolicy", "Bypass", "-File"]
script_extension = "ps1"
script = 'docker exec "renzora-$((Get-FileHash -InputStream ([System.IO.MemoryStream]::new([System.Text.Encoding]::UTF8.GetBytes((Get-Location).Path))) -Algorithm MD5).Hash.Substring(0,8).ToLower())" /app/src/scripts/build-all.sh /output'
[tasks.docker-run.linux]
script = 'docker exec "renzora-$(echo -n "$PWD" | md5sum | cut -c1-8)" /app/src/scripts/build-all.sh /output'
[tasks.docker-run.mac]
script = 'docker exec "renzora-$(echo -n "$PWD" | md5sum | cut -c1-8)" /app/src/scripts/build-all.sh /output'

[tasks.docker-clean]
description = "Clean the container's build cache"
[tasks.docker-clean.windows]
script_runner = "powershell.exe"
script_runner_args = ["-ExecutionPolicy", "Bypass", "-File"]
script_extension = "ps1"
script = 'docker exec "renzora-$((Get-FileHash -InputStream ([System.IO.MemoryStream]::new([System.Text.Encoding]::UTF8.GetBytes((Get-Location).Path))) -Algorithm MD5).Hash.Substring(0,8).ToLower())" rm -rf target'
[tasks.docker-clean.linux]
script = 'docker exec "renzora-$(echo -n "$PWD" | md5sum | cut -c1-8)" rm -rf target'
[tasks.docker-clean.mac]
script = 'docker exec "renzora-$(echo -n "$PWD" | md5sum | cut -c1-8)" rm -rf target'

[tasks.docker-destroy]
description = "Remove the persistent build container"
[tasks.docker-destroy.windows]
script_runner = "powershell.exe"
script_runner_args = ["-ExecutionPolicy", "Bypass", "-File"]
script_extension = "ps1"
script = 'docker rm -f "renzora-$((Get-FileHash -InputStream ([System.IO.MemoryStream]::new([System.Text.Encoding]::UTF8.GetBytes((Get-Location).Path))) -Algorithm MD5).Hash.Substring(0,8).ToLower())"'
[tasks.docker-destroy.linux]
script = 'docker rm -f "renzora-$(echo -n "$PWD" | md5sum | cut -c1-8)"'
[tasks.docker-destroy.mac]
script = 'docker rm -f "renzora-$(echo -n "$PWD" | md5sum | cut -c1-8)"'

# =============================================================================
# Sync dist/ — copy build outputs to a clean distributable folder
# Each target (editor/runtime/server) gets its own subfolder per platform
# =============================================================================

[tasks.sync-dist-editor]
description = "Sync editor build to dist/"
env = { SYNC_TARGET = "editor" }
run_task = "sync-dist"

[tasks.sync-dist-runtime]
description = "Sync runtime build to dist/"
env = { SYNC_TARGET = "runtime" }
run_task = "sync-dist"

[tasks.sync-dist-server]
description = "Sync server build to dist/"
env = { SYNC_TARGET = "server" }
run_task = "sync-dist"

[tasks.sync-dist]
description = "Copy build output from target/dist/ to dist/{platform}/{target}"
private = true

[tasks.sync-dist.windows]
script_runner = "powershell.exe"
script_runner_args = ["-ExecutionPolicy", "Bypass", "-File"]
script_extension = "ps1"
script = '''
$ErrorActionPreference = "Stop"
$target = $env:SYNC_TARGET
$platform = "windows-x64"
$src = "target/$target/dist"
$dir = "dist/$platform/$target"

New-Item -ItemType Directory -Force -Path $dir | Out-Null
New-Item -ItemType Directory -Force -Path $dir/plugins | Out-Null

# Clean
Get-ChildItem $dir/*.exe, $dir/*.dll -ErrorAction SilentlyContinue | Remove-Item -Force
Get-ChildItem $dir/plugins/*.dll -ErrorAction SilentlyContinue | Remove-Item -Force

# Binary (rename based on target)
$srcBin = "$src/renzora.exe"
switch ($target) {
    "editor"  { $destBin = "renzora.exe" }
    "runtime" { $destBin = "renzora-runtime.exe" }
    "server"  { $destBin = "renzora-server.exe" }
}
if (Test-Path $srcBin) { Copy-Item $srcBin "$dir/$destBin" -Force }

# bevy_dylib (newest only)
Get-ChildItem $src/deps/bevy_dylib-*.dll -ErrorAction SilentlyContinue | Sort-Object LastWriteTime -Descending | Select-Object -First 1 | ForEach-Object { Copy-Item $_.FullName $dir/ -Force }

# Rust std
$sysroot = (rustc --print sysroot)
Copy-Item (Join-Path $sysroot "bin/std-*.dll") $dir/ -Force -ErrorAction SilentlyContinue

# SDK DLL
if (Test-Path "$src/renzora.dll") { Copy-Item "$src/renzora.dll" "$dir/renzora.dll" -Force }

# Plugins — everything else
$skip = @("renzora.dll", "bevy_dylib.dll", "renzora_macros.dll")
Get-ChildItem $src/*.dll -ErrorAction SilentlyContinue | ForEach-Object {
    if ($skip -notcontains $_.Name) { Copy-Item $_.FullName "$dir/plugins/$($_.Name)" -Force }
}

$root = (Get-ChildItem $dir/*.exe, $dir/*.dll -ErrorAction SilentlyContinue).Count
$plugins = (Get-ChildItem $dir/plugins/*.dll -ErrorAction SilentlyContinue).Count
Write-Output "Synced to dist/$platform/$target - $root root files, $plugins plugins"
'''

[tasks.sync-dist.linux]
script = '''
TARGET="${SYNC_TARGET}"
PLATFORM="linux-x64"
SRC="target/$TARGET/dist"
DIR="dist/$PLATFORM/$TARGET"
mkdir -p "$DIR" "$DIR/plugins"
rm -f "$DIR"/*.so "$DIR"/renzora "$DIR"/renzora-runtime "$DIR"/renzora-server
rm -f "$DIR"/plugins/*.so

# Binary (rename based on target)
case "$TARGET" in
    editor)  DEST="renzora" ;;
    runtime) DEST="renzora-runtime" ;;
    server)  DEST="renzora-server" ;;
esac
[ -f "$SRC/renzora" ] && cp "$SRC/renzora" "$DIR/$DEST"

# SDK
[ -f "$SRC/librenzora.so" ] && cp "$SRC/librenzora.so" "$DIR/"

# bevy_dylib (newest only)
ls -t $SRC/deps/libbevy_dylib-*.so 2>/dev/null | head -1 | xargs -I{} cp {} "$DIR/"

SYSROOT=$(rustc --print sysroot)
for f in "$SYSROOT"/lib/rustlib/x86_64-unknown-linux-gnu/lib/libstd-*.so; do
    [ -f "$f" ] && cp "$f" "$DIR/"
done

for f in $SRC/*.so; do
    name=$(basename "$f")
    [ "$name" = "librenzora.so" ] && continue
    cp "$f" "$DIR/plugins/"
done

echo "Synced to dist/$PLATFORM/$TARGET"
'''

[tasks.sync-dist.mac]
script = '''
TARGET="${SYNC_TARGET}"
ARCH=$(uname -m | sed 's/arm64/arm64/;s/x86_64/x64/')
PLATFORM="macos-$ARCH"
BASE="dist/$PLATFORM/$TARGET"

# App name and binary name per target
case "$TARGET" in
    editor)  APP_NAME="Renzora.app";         BIN_NAME="renzora";         DISPLAY_NAME="Renzora" ;;
    runtime) APP_NAME="Renzora Runtime.app";  BIN_NAME="renzora-runtime"; DISPLAY_NAME="Renzora Runtime" ;;
    server)  APP_NAME="Renzora Server.app";   BIN_NAME="renzora-server";  DISPLAY_NAME="Renzora Server" ;;
esac

APP="$BASE/$APP_NAME"
MACOS="$APP/Contents/MacOS"
RES="$APP/Contents/Resources"

# Clean and create .app structure
rm -rf "$APP"
mkdir -p "$MACOS" "$MACOS/plugins" "$RES"

# Info.plist
VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
cat > "$APP/Contents/Info.plist" << PLIST
<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0">
<dict>
    <key>CFBundleName</key>
    <string>$DISPLAY_NAME</string>
    <key>CFBundleDisplayName</key>
    <string>$DISPLAY_NAME</string>
    <key>CFBundleIdentifier</key>
    <string>com.renzora.$TARGET</string>
    <key>CFBundleVersion</key>
    <string>$VERSION</string>
    <key>CFBundleShortVersionString</key>
    <string>$VERSION</string>
    <key>CFBundleExecutable</key>
    <string>$BIN_NAME</string>
    <key>CFBundleIconFile</key>
    <string>icon</string>
    <key>CFBundlePackageType</key>
    <string>APPL</string>
    <key>NSHighResolutionCapable</key>
    <true/>
    <key>NSSupportsAutomaticGraphicsSwitching</key>
    <true/>
</dict>
</plist>
PLIST

# Binary
SRC="target/$TARGET/dist"
[ -f "$SRC/renzora" ] && cp "$SRC/renzora" "$MACOS/$BIN_NAME"
chmod +x "$MACOS/$BIN_NAME"

# SDK
[ -f "$SRC/librenzora.dylib" ] && cp "$SRC/librenzora.dylib" "$MACOS/"

# bevy_dylib (newest only)
ls -t $SRC/deps/libbevy_dylib-*.dylib 2>/dev/null | head -1 | xargs -I{} cp {} "$MACOS/"

# Rust std
SYSROOT=$(rustc --print sysroot)
RUST_ARCH=$(uname -m | sed 's/arm64/aarch64/;s/x86_64/x86_64/')
for f in "$SYSROOT"/lib/rustlib/${RUST_ARCH}-apple-darwin/lib/libstd-*.dylib; do
    [ -f "$f" ] && cp "$f" "$MACOS/"
done

# Plugins
for f in $SRC/*.dylib; do
    name=$(basename "$f")
    [ "$name" = "librenzora.dylib" ] && continue
    cp "$f" "$MACOS/plugins/"
done

# Icon (if exists)
[ -f "assets/icon.icns" ] && cp "assets/icon.icns" "$RES/icon.icns"

# Fix dylib rpaths to look in the same directory
install_name_tool -add_rpath @executable_path "$MACOS/$BIN_NAME" 2>/dev/null || true

echo "Synced to $APP"
'''

# =============================================================================
# WASM
# =============================================================================

[tasks.ensure-wasm-tools]
description = "Install wasm-bindgen and wasm-opt if missing"
script_runner = "@shell"
script = '''
command -v wasm-bindgen >/dev/null 2>&1 || cargo install wasm-bindgen-cli --version 0.2.108 --locked
command -v wasm-opt >/dev/null 2>&1 || cargo install wasm-opt
'''

[tasks.dist-web]
description = "Build WASM editor + optimize + generate JS bindings"
dependencies = ["ensure-wasm-tools"]

[tasks.dist-web.windows]
script_runner = "@shell"
script = '''
cargo dist-web-editor
wasm-bindgen --out-dir templates/web --out-name renzora --target web target/wasm32-unknown-unknown/dist/renzora.wasm
wasm-opt -Oz --enable-bulk-memory --enable-nontrapping-float-to-int --enable-sign-ext --enable-mutable-globals -o templates/web/renzora_bg.wasm templates/web/renzora_bg.wasm
brotli -k -q 11 -f templates/web/renzora_bg.wasm
echo Output: templates/web/
'''

[tasks.dist-web.linux]
script = '''
cargo dist-web-editor
wasm-bindgen --out-dir templates/web --out-name renzora --target web target/wasm32-unknown-unknown/dist/renzora.wasm
wasm-opt -Oz --enable-bulk-memory --enable-nontrapping-float-to-int --enable-sign-ext --enable-mutable-globals -o templates/web/renzora_bg.wasm templates/web/renzora_bg.wasm
brotli -k -q 11 -f templates/web/renzora_bg.wasm
echo "Output: templates/web/"
'''

[tasks.dist-web.mac]
script = '''
cargo dist-web-editor
wasm-bindgen --out-dir templates/web --out-name renzora --target web target/wasm32-unknown-unknown/dist/renzora.wasm
wasm-opt -Oz --enable-bulk-memory --enable-nontrapping-float-to-int --enable-sign-ext --enable-mutable-globals -o templates/web/renzora_bg.wasm templates/web/renzora_bg.wasm
brotli -k -q 11 -f templates/web/renzora_bg.wasm
echo "Output: templates/web/"
'''

[tasks.dist-web-runtime]
description = "Build WASM runtime export template (.zip)"
dependencies = ["ensure-wasm-tools"]

[tasks.dist-web-runtime.windows]
command = "powershell"
args = ["-ExecutionPolicy", "Bypass", "-File", "scripts\\build-web-runtime.ps1"]

[tasks.dist-web-runtime.linux]
script = '''
cargo dist-web-runtime
wasm-bindgen --out-dir target/dist/web --out-name renzora-runtime --target web target/wasm32-unknown-unknown/dist/renzora-runtime.wasm
wasm-opt -Oz --enable-bulk-memory --enable-nontrapping-float-to-int --enable-sign-ext --enable-mutable-globals -o target/dist/web/renzora-runtime_bg.wasm target/dist/web/renzora-runtime_bg.wasm
brotli -k -q 11 -f target/dist/web/renzora-runtime_bg.wasm
cd target/dist/web && zip ../renzora-runtime-web-wasm32.zip renzora-runtime.js renzora-runtime_bg.wasm renzora-runtime_bg.wasm.br
echo "Template: target/dist/renzora-runtime-web-wasm32.zip"
'''

[tasks.dist-web-runtime.mac]
script = '''
cargo dist-web-runtime
wasm-bindgen --out-dir target/dist/web --out-name renzora-runtime --target web target/wasm32-unknown-unknown/dist/renzora-runtime.wasm
wasm-opt -Oz --enable-bulk-memory --enable-nontrapping-float-to-int --enable-sign-ext --enable-mutable-globals -o target/dist/web/renzora-runtime_bg.wasm target/dist/web/renzora-runtime_bg.wasm
brotli -k -q 11 -f target/dist/web/renzora-runtime_bg.wasm
cd target/dist/web && zip ../renzora-runtime-web-wasm32.zip renzora-runtime.js renzora-runtime_bg.wasm renzora-runtime_bg.wasm.br
echo "Template: target/dist/renzora-runtime-web-wasm32.zip"
'''

# =============================================================================
# Mobile / TV templates
# =============================================================================

[tasks.dist-android-arm64]
description = "Build Android ARM64 template APK"
[tasks.dist-android-arm64.windows]
command = "powershell"
args = ["-ExecutionPolicy", "Bypass", "-File", "templates\\android\\build-template.ps1", "-arm64"]
[tasks.dist-android-arm64.linux]
command = "./templates/android/build-template.sh"
args = ["--arm64"]
[tasks.dist-android-arm64.mac]
command = "./templates/android/build-template.sh"
args = ["--arm64"]

[tasks.dist-android-all]
description = "Build all Android template APKs"
[tasks.dist-android-all.windows]
command = "powershell"
args = ["-ExecutionPolicy", "Bypass", "-File", "templates\\android\\build-template.ps1", "-all"]
[tasks.dist-android-all.linux]
command = "./templates/android/build-template.sh"
args = ["--all"]
[tasks.dist-android-all.mac]
command = "./templates/android/build-template.sh"
args = ["--all"]

[tasks.dist-ios]
description = "Build iOS ARM64 template (requires macOS + Xcode)"
[tasks.dist-ios.mac]
command = "./templates/ios/build-template.sh"
[tasks.dist-ios.windows]
script_runner = "@shell"
script = 'echo "Error: iOS builds require macOS with Xcode." && exit 1'
[tasks.dist-ios.linux]
script = 'echo "Error: iOS builds require macOS with Xcode." && exit 1'
