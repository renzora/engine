[tasks.dist-android-arm64]
description = "Build Android ARM64 template APK"
[tasks.dist-android-arm64.windows]
command = "powershell"
args = ["-ExecutionPolicy", "Bypass", "-File", "templates\\android\\build-template.ps1", "-arm64"]
[tasks.dist-android-arm64.linux]
command = "./templates/android/build-template.sh"
args = ["--arm64"]
[tasks.dist-android-arm64.mac]
command = "./templates/android/build-template.sh"
args = ["--arm64"]

[tasks.dist-android-all]
description = "Build all Android template APKs"
[tasks.dist-android-all.windows]
command = "powershell"
args = ["-ExecutionPolicy", "Bypass", "-File", "templates\\android\\build-template.ps1", "-all"]
[tasks.dist-android-all.linux]
command = "./templates/android/build-template.sh"
args = ["--all"]
[tasks.dist-android-all.mac]
command = "./templates/android/build-template.sh"
args = ["--all"]

[tasks.dist-ios]
description = "Build iOS ARM64 template (requires macOS + Xcode)"
[tasks.dist-ios.mac]
command = "./templates/ios/build-template.sh"
[tasks.dist-ios.windows]
script_runner = "@shell"
script = 'echo "Error: iOS builds require macOS with Xcode." && exit 1'
[tasks.dist-ios.linux]
script = 'echo "Error: iOS builds require macOS with Xcode." && exit 1'
