[package]
name = "renzora-android"
version = "0.2.0"
edition = "2021"
publish = false

[lib]
name = "main"
crate-type = ["cdylib"]

[dependencies]
renzora = { path = "../../..", default-features = false }
bevy = { version = "0.18", features = ["jpeg"] }

[profile.release]
lto = "thin"
strip = true

[profile.dist]
inherits = "release"
lto = "fat"
strip = true
codegen-units = 1
