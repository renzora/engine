[package]
name = "renzora_hub"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["dylib"]

[dependencies]
bevy = { workspace = true }
renzora = { path = "../renzora", default-features = false, features = ["editor"] }
renzora_auth = { path = "../renzora_auth" }
renzora_splash = { path = "../renzora_splash" }
renzora_shader = { path = "../renzora_shader" }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
zip = { version = "2", default-features = false, features = ["deflate"] }
ureq = "3"
image = { version = "0.25", default-features = false, features = ["png", "jpeg", "webp"] }
kira = { version = "0.12", features = ["cpal", "ogg", "mp3", "wav", "flac"] }
