[package]
name = "avian3d"
version = "0.7.0-dev"
edition = "2024"
license = "MIT OR Apache-2.0"
authors = ["Joona Aalto <jondolf.dev@gmail.com>"]
description = "An ECS-driven physics engine for the Bevy game engine"
documentation = "https://docs.rs/avian3d"
repository = "https://github.com/avianphysics/avian"
readme = "README.md"
keywords = ["gamedev", "physics", "simulation", "bevy"]
categories = ["game-development", "science", "simulation"]

[features]
default = [
    "3d",
    "f32",
    "parry-f32",
    "debug-plugin",
    "xpbd_joints",
    "parallel",
    "collider-from-mesh",
    # "bevy_scene" dropped from defaults: Bevy 0.19 removed the runtime-scene API
    # (SceneRoot/SceneSpawner/SceneInstance/SceneInstanceReady) in the BSN rework,
    # so avian's scene-collider path no longer compiles. renzora consumes avian
    # with default-features=false anyway and never enabled it. Re-add once the
    # scene-collider integration is rewritten against 0.19 BSN.
    "bevy_picking",
]
3d = []
f32 = []
f64 = []

debug-plugin = ["bevy/bevy_gizmos", "bevy/bevy_render"]
simd = ["parry3d?/simd-stable", "parry3d-f64?/simd-stable"]
parallel = ["bevy/multi_threaded", "parry3d?/parallel", "parry3d-f64?/parallel"]
enhanced-determinism = [
    "dep:libm",
    "bevy_math/libm",
    "bevy_heavy/libm",
    "parry3d?/enhanced-determinism",
    "parry3d-f64?/enhanced-determinism",
]

default-collider = []
# We unfortunately can't reuse the f32 and f64 features for this,
# because Parry uses separate crates for f32 and f64.
parry-f32 = ["f32", "dep:parry3d", "default-collider"]
parry-f64 = ["f64", "dep:parry3d-f64", "default-collider"]

# Enables the XPBD constraint solver for joints.
xpbd_joints = []

collider-from-mesh = ["bevy/bevy_mesh", "bevy/bevy_mikktspace", "3d"]
bevy_scene = ["bevy/bevy_scene"]
bevy_picking = ["bevy/bevy_picking"]
serialize = [
    "dep:serde",
    "bevy/serialize",
    "glam_matrix_extras/serde",
    "bevy_heavy/serialize",
    "bevy_transform_interpolation/serialize",
    "parry3d?/serde-serialize",
    "parry3d-f64?/serde-serialize",
    "smallvec/serde",
    "bitflags/serde",
]

# Enables writing timer and counter information to the `DiagnosticsStore` in `bevy_diagnostic`.
bevy_diagnostic = []

# Enables the `PhysicsDiagnosticsUiPlugin` for visualizing physics diagnostics data with a debug UI.
diagnostic_ui = ["bevy_diagnostic", "bevy/bevy_ui"]

# Enables additional correctness checks and validation at the cost of worse performance.
validate = []

[lib]
name = "avian3d"
path = "../../src/lib.rs"
required-features = ["3d"]
bench = false

[dependencies]
avian_derive = { path = "../avian_derive", version = "0.2" }
bevy = { version = "0.19", default-features = false, features = ["std", "bevy_log"] }
bevy_math = { version = "0.19", default-features = false, features = ["approx"] }
glam_matrix_extras = { path = "../../../glam_matrix_extras", features = ["bevy_reflect"] }
bevy_heavy = { path = "../../../bevy_heavy" }
bevy_transform_interpolation = { path = "../../../bevy_transform_interpolation" }
libm = { version = "0.2", optional = true }
approx = "0.5"
parry3d = { version = "0.27", optional = true }
parry3d-f64 = { version = "0.27", optional = true }
obvhs = { version = "0.3" }
serde = { version = "1", features = ["derive"], optional = true }
derive_more = "2"
thiserror = "2"
smallvec = "1.15"
itertools = "0.14"
bitflags = "2.5.0"
thread_local = { version = "1.1" }
disqualified = { version = "1.0" }

[dev-dependencies]
# Trimmed for vendoring: dropped examples_common_3d + bevy_mod_debugdump (both
# pull a crates.io Bevy 0.18 that conflicts with the workspace git 0.19). Avian's
# examples/benches aren't built here — we consume it purely as a library.
bevy = { version = "0.19" }
bevy_heavy = { path = "../../../bevy_heavy", features = ["approx"] }
criterion = { version = "0.8", features = ["html_reports"] }
rand = "0.9"

[lints]
workspace = true

[package.metadata.docs.rs]
# Enable features when building the docs on docs.rs
features = ["diagnostic_ui"]

[[example]]
name = "bvh"
required-features = ["3d", "default-collider"]

[[example]]
name = "dynamic_character_3d"
required-features = ["3d", "default-collider", "bevy_scene"]

