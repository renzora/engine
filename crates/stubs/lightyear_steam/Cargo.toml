# Stub replacing the `lightyear_steam` registry crate via `[patch.crates-io]`
# in the workspace root. The engine never enables lightyear's `steam` feature,
# but Cargo locks every optional dependency regardless — which kept the
# vulnerable `steamworks 0.12` chain (RUSTSEC-2026-0121, no semver-compatible
# fix: aeronet_steam 0.19 pins `steamworks ^0.12`) in Cargo.lock and on the
# Dependabot alert list. Patching the unused crate away removes the whole
# subtree from the lockfile.
#
# If Steam networking is ever actually wanted: delete this stub + the patch
# entry, and bump lightyear to a version whose lightyear_steam pulls
# aeronet_steam >= 0.20 (steamworks >= 0.13).

[package]
name = "lightyear_steam"
version = "0.26.4"
edition = "2021"
publish = false

# Detach from the parent workspace (path patches can't be glob members).
[workspace]

[features]
# Empty mirrors of the features the `lightyear` facade references with
# `lightyear_steam?/...` so feature resolution stays valid.
client = []
server = []
std = []
