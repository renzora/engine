[package]
name = "renzora_lighting"
version = "0.1.0"
edition = "2021"

[features]
default = []
editor = ["dep:renzora_editor", "dep:egui-phosphor", "dep:bevy_egui", "dep:renzora_theme"]

[dependencies]
bevy = { workspace = true }
bevy_egui = { version = "0.39", optional = true }
egui-phosphor = { version = "0.11", features = ["regular"], optional = true }
renzora_editor = { path = "../renzora_editor", optional = true }
renzora_theme = { path = "../renzora_theme", optional = true }
serde = { version = "1", features = ["derive"] }
renzora = { path = "../renzora", default-features = false }
