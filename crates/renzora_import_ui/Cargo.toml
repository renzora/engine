[package]
name = "renzora_import_ui"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["dylib"]

[dependencies]
renzora_theme = { path = "../renzora_theme" }
egui-phosphor = { workspace = true }
bevy_egui = { workspace = true }
bevy = { workspace = true }
renzora = { path = "../renzora", default-features = false, features = ["editor"] }
renzora_import = { path = "../renzora_import" }
renzora_material = { path = "../renzora_material" }
log = "0.4"

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
rfd = "0.15"
