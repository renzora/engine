[package]
name = "renzora_oit"
version = "0.1.0"
edition = "2021"

[features]
default = []
editor = ["dep:renzora_editor", "dep:egui-phosphor", "dep:bevy_egui", "dep:renzora_theme"]

[dependencies]
bevy = { version = "0.18" }
serde = { version = "1", features = ["derive"] }
egui-phosphor = { version = "0.11", features = ["regular"], optional = true }
bevy_egui = { version = "0.39", optional = true }
renzora_editor = { path = "../../editor/renzora_editor", optional = true }
renzora_theme = { path = "../../ui/renzora_theme", optional = true }
