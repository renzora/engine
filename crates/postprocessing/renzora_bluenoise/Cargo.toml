[package]
name = "renzora_bluenoise"
version = "0.1.0"
edition = "2021"

[features]
default = []
editor = ["dep:renzora_editor_framework", "dep:egui-phosphor"]

[dependencies]
bevy = { workspace = true }
bevy_light = "0.18"
serde = { version = "1", features = ["derive"] }
egui-phosphor = { version = "0.11", features = ["regular"], optional = true }
renzora_editor_framework = { path = "../../editor/renzora_editor", optional = true }
renzora_core = { path = "../../core/renzora_core" }
