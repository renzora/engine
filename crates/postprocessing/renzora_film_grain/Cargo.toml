[package]
name = "renzora_film_grain"
version = "0.1.0"
edition = "2021"

[features]
default = []
editor = ["dep:renzora_editor", "dep:egui-phosphor"]

[dependencies]
bevy = { version = "0.18", default-features = false }
serde = { version = "1", features = ["derive"] }
egui-phosphor = { version = "0.11", features = ["regular"], optional = true }
renzora_editor = { path = "../../editor/renzora_editor", optional = true }
renzora_macros = { path = "../../macros/renzora_macros" }
renzora_postprocess = { path = "../renzora_postprocess" }
