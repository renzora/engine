[package]
name = "renzora_lumen"
version = "0.1.0"
edition = "2021"
description = "Lumen-inspired global illumination for Renzora. Phase 1 scaffold; ScreenSpace tier delegates to renzora_rt."

[dependencies]
bevy = { workspace = true }
renzora = { path = "../renzora" }
renzora_rt = { path = "../renzora_rt" }
renzora_shader = { path = "../renzora_shader" }
renzora_editor = { path = "../renzora_editor", optional = true }
egui-phosphor = { workspace = true, optional = true }
serde = { version = "1.0", features = ["derive"] }
bytemuck = { version = "1.5", features = ["derive"] }

[features]
editor = ["dep:renzora_editor", "dep:egui-phosphor", "renzora_rt/editor"]

[lints]
workspace = true
