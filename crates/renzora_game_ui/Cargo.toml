[package]
name = "renzora_game_ui"
version = "0.1.0"
edition = "2021"

[features]
editor = [
    "dep:egui-phosphor",
    "dep:renzora_editor",
    "dep:image",
]

[dependencies]
bevy = { workspace = true }
serde = { version = "1", features = ["derive"] }
renzora = { path = "../renzora", default-features = false }

# Editor-only dependencies
egui-phosphor = { version = "0.11", features = ["regular"], optional = true }
renzora_editor = { path = "../renzora_editor", optional = true }
image = { version = "0.25", default-features = false, optional = true }

[lints]
workspace = true
