[package]
name = "renzora_import_ui"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["dylib"]
description = "Import overlay UI for 3D model import in the Renzora editor"

[dependencies]
bevy = { workspace = true }
renzora = { path = "../../renzora", default-features = false, features = ["editor"] }
renzora_import = { path = "../../core/renzora_import" }
renzora_material = { path = "../../core/renzora_material" }
log = "0.4"

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
rfd = "0.15"
