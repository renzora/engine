[package]
name = "renzora_terrain_editor"
version = "0.1.0"
edition = "2021"

[dependencies]
bevy = { version = "0.18", default-features = false }
bevy_egui = "0.39"
egui-phosphor = { version = "0.11", features = ["regular"] }
renzora_editor = { path = "../renzora_editor" }
renzora_theme = { path = "../../ui/renzora_theme" }
renzora_ui = { path = "../../ui/renzora_ui" }
renzora_terrain = { path = "../../core/renzora_terrain" }
renzora_core = { path = "../../core/renzora_core" }
renzora_material = { path = "../../core/renzora_material" }
serde_json = "1"
renzora_viewport = { path = "../renzora_viewport" }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
rfd = "0.15"
