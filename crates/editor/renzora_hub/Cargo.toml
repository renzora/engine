[package]
name = "renzora_hub"
version = "0.1.0"
edition = "2021"

[dependencies]
bevy = { version = "0.18", default-features = false }
bevy_egui = "0.39"
egui-phosphor = { version = "0.11", features = ["regular"] }
renzora_core = { path = "../../core/renzora_core" }
renzora_editor = { path = "../renzora_editor" }
renzora_auth = { path = "../renzora_auth" }
renzora_theme = { path = "../../ui/renzora_theme" }
renzora_splash = { path = "../../ui/renzora_splash" }
renzora_shader = { path = "../../core/renzora_shader" }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
zip = { version = "2", default-features = false, features = ["deflate"] }
ureq = "3"
image = { version = "0.25", default-features = false, features = ["png", "jpeg", "webp"] }
kira = { version = "0.12", features = ["cpal", "ogg", "mp3", "wav", "flac"] }
