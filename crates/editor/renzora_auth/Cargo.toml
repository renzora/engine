[package]
name = "renzora_auth"
version = "0.1.0"
edition = "2021"

[dependencies]
bevy = { version = "0.18", default-features = false }
bevy_egui = "0.39"
egui-phosphor = { version = "0.11", features = ["regular"] }
renzora_theme = { path = "../../ui/renzora_theme" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
ureq = "3"
dirs = "6"
