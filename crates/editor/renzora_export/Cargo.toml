[package]
name = "renzora_export"
version = "0.1.0"
edition = "2021"
description = "Export overlay for packaging Renzora projects"

[dependencies]
bevy = { version = "0.18" }
bevy_egui = "0.39"
egui-phosphor = "0.11"
renzora_core = { path = "../../core/renzora_core" }
renzora_rpak = { path = "../../core/renzora_rpak" }
renzora_theme = { path = "../../ui/renzora_theme" }
rfd = "0.15"
serde = { version = "1", features = ["derive"] }
toml = "0.8"
