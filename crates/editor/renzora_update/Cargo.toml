[package]
name = "renzora_update"
version = "0.1.0"
edition = "2021"

[dependencies]
bevy = { version = "0.18" }
bevy_egui = "0.39"
egui-phosphor = { version = "0.11", features = ["regular"] }
renzora_splash = { path = "../../ui/renzora_splash" }
renzora_theme = { path = "../../ui/renzora_theme" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
ureq = "3"
dirs = "6"
open = "5"
