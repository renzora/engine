[package]
name = "renzora_viewport"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["dylib"]

[dependencies]
bevy = { workspace = true }
renzora = { path = "../../renzora", default-features = false, features = ["editor"] }
renzora_console = { path = "../renzora_console" }
renzora_ui = { path = "../../ui/renzora_ui" }
renzora_keybindings = { path = "../renzora_keybindings" }
renzora_animation = { path = "../../core/renzora_animation" }
