[package]
name = "renzora_editor_framework"
version = "0.1.0"
edition = "2021"

[dependencies]
bevy = { workspace = true }
bevy_egui = "0.39"
egui-phosphor = { version = "0.11", features = ["regular"] }
renzora_ui = { path = "../renzora_ui" }
renzora_theme = { path = "../renzora_theme" }
renzora_splash = { path = "../renzora_splash" }
renzora_core = { path = "../renzora_core" }
renzora_postprocess = { path = "../renzora_postprocess" }
renzora_macros = { path = "../renzora_macros" }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
rfd = "0.15"
