[package]
name = "renzora_clouds"
version = "0.1.0"
edition = "2021"

# No `editor` feature: lean runtime crate. The inspector moved to the nested
# renzora_clouds_editor crate (crates/renzora_clouds/editor).

[dependencies]
bevy = { workspace = true }
renzora = { path = "../renzora", default-features = false }
renzora_lighting = { path = "../renzora_lighting" }
serde = { version = "1", features = ["derive"] }

[lints]
workspace = true
