[package]
name = "renzora_tracy"
version = "0.1.0"
edition = "2021"
description = "Tracy profiler plugin for Renzora. Always linked; dormant until a Tracy GUI connects."

[features]
default = []
# Kept (empty bar the core cascade) so `renzora_tracy/editor` references still
# resolve; the egui status panel was removed in the egui purge.
editor = ["renzora/editor"]

[dependencies]
# Always pull in `trace_tracy` on bevy. Feature unification propagates
# this to every other crate's bevy dep across the workspace, so the
# whole engine emits Tracy zones — no per-crate opt-in needed.
bevy = { workspace = true, features = ["trace_tracy"] }
renzora = { path = "../renzora", default-features = false }
# `ondemand` keeps the Tracy client fully dormant — no thread, no
# ring-buffer allocation, no event capture — until a Tracy GUI
# connects. Without this, the heavier tracing-tracy defaults (sampling,
# system-tracing, context-switch-tracing) accumulate events into a
# bounded buffer at idle, which was likely the cause of past 1GB/s
# idle memory growth.
tracy-client = { version = "0.18.3", features = ["ondemand"] }

[lints]
workspace = true
