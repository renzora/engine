[package]
name = "renzora_shell"
version = "0.1.0"
edition = "2021"
description = "bevy_ui-native editor shell (dock host + chrome). The egui → bevy_ui/HUI migration target for the editor layout."

[dependencies]
bevy = { workspace = true }
renzora = { path = "../renzora", default-features = false, features = ["editor"] }
# The bevy_ui UI framework. The dock model lives here; the reconciler +
# interactions migrate over next.
renzora_ember = { path = "../renzora_ember" }
# Editor settings + undo/redo hooks + project handlers for the top-bar menus.
renzora_editor_framework = { path = "../renzora_editor_framework" }
# Native file picker for "File → Install Plugin…".
rfd = "0.15"
# Persist the per-workspace dock layout to ~/.renzora/layout.json across sessions.
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
# Document-tab + workspace-layout model (DocumentTabState etc.), shared with the
# egui editor so both render the same open documents.
renzora_ui = { path = "../renzora_ui" }
# Phosphor icon system (`Icon` component + `apply_icons`) — same icons the egui
# editor uses, rendered into bevy_ui. HuiPlugin runs the resolver globally.
# Theme source: maps the active ThemeManager theme into ember's runtime palette.
renzora_theme = { path = "../renzora_theme" }

[lints]
workspace = true
