[package]
name = "renzora_bluenoise"
version = "0.1.0"
edition = "2021"

[features]
default = []
editor = ["dep:renzora_editor_framework"]

[dependencies]
bevy = { workspace = true }
bevy_light = { workspace = true }
serde = { version = "1", features = ["derive"] }
renzora_editor_framework = { path = "../renzora_editor_framework", optional = true }
renzora = { path = "../renzora", default-features = false }

[lints]
workspace = true
