[package]
name = "renzora_bluenoise"
version = "0.1.0"
edition = "2021"

[features]
default = []
editor = ["dep:renzora_editor"]

[dependencies]
egui-phosphor = { workspace = true }
bevy = { workspace = true }
bevy_light = "0.18"
serde = { version = "1", features = ["derive"] }
renzora_editor = { path = "../renzora_editor", optional = true }
renzora = { path = "../renzora", default-features = false }
