[package]
name = "renzora_splash"
version = "0.1.0"
edition = "2021"

[dependencies]
bevy = { version = "0.18" }
bevy_egui = "0.39"
renzora_theme = { path = "../renzora_theme" }
renzora_core = { path = "../../core/renzora_core" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
dirs = "6"
rfd = "0.15"

[target.'cfg(target_arch = "wasm32")'.dependencies]
web-sys = { version = "0.3", features = ["Window", "Storage", "console"] }
