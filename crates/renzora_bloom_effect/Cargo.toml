[package]
name = "renzora_bloom_effect"
version = "0.1.0"
edition = "2021"

[features]
default = []
editor = ["dep:renzora_editor_framework", "dep:egui-phosphor"]

[dependencies]
renzora_macros = { path = "../renzora_macros" }
bevy = { workspace = true }
serde = { version = "1", features = ["derive"] }
egui-phosphor = { version = "0.11", features = ["regular"], optional = true }
renzora_editor_framework = { path = "../renzora_editor_framework", optional = true }
renzora = { path = "../renzora", default-features = false }
