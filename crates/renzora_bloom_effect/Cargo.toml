[package]
name = "renzora_bloom_effect"
version = "0.1.0"
edition = "2021"

[features]
default = []
editor = ["dep:renzora_editor"]

[dependencies]
renzora_macros = { path = "../renzora_macros" }
egui-phosphor = { workspace = true }
bevy = { workspace = true }
serde = { version = "1", features = ["derive"] }
renzora_editor = { path = "../renzora_editor", optional = true }
renzora = { path = "../renzora", default-features = false }
