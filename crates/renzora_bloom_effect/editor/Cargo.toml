[package]
name = "renzora_bloom_effect_editor"
version = "0.1.0"
edition = "2021"
description = "Editor-only inspector for renzora_bloom_effect. Registered via renzora::add!(.., Editor) and linked only by the editor bundle."

[dependencies]
bevy = { workspace = true }
renzora = { path = "../../renzora", default-features = false, features = ["editor"] }
renzora_bloom_effect = { path = ".." }
egui-phosphor = { workspace = true }

[lints]
workspace = true
