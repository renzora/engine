[package]
name = "renzora_daw"
version = "0.1.0"
edition = "2021"

[dependencies]
renzora_theme = { path = "../renzora_theme" }
egui-phosphor = { workspace = true }
bevy_egui = { workspace = true }
renzora_editor = { path = "../renzora_editor" }
bevy = { workspace = true }
renzora = { path = "../renzora", default-features = false, features = ["editor"] }
renzora_audio = { path = "../renzora_audio" }
renzora_ui = { path = "../renzora_ui" }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
kira = { version = "0.12", features = ["cpal", "ogg", "mp3", "wav", "flac"] }
