[package]
name = "renzora_level_presets"
version = "0.1.0"
edition = "2021"

[dependencies]
renzora_ember = { path = "../renzora_ember" }
bevy = { workspace = true }
renzora = { path = "../renzora", default-features = false, features = ["editor"] }
renzora_lighting = { path = "../renzora_lighting" }
# Effects bundled into the "World Environment" spawn preset. Most use
# the EffectRouting pattern; the GI channel uses the `LumenLighting` /
# `RtLighting` contract components (the GI plugin renders them; Lumen
# takes precedence when both are present); SSR is included disabled
# (forward renderer, no DeferredPrepass).
renzora_bloom_effect = { path = "../renzora_bloom_effect" }
renzora_atmosphere = { path = "../renzora_atmosphere" }
renzora_clouds = { path = "../renzora_clouds" }
renzora_distance_fog = { path = "../renzora_distance_fog" }
renzora_volumetric_fog = { path = "../renzora_volumetric_fog" }
renzora_environment_map = { path = "../renzora_environment_map" }
renzora_auto_exposure = { path = "../renzora_auto_exposure" }
renzora_tonemapping = { path = "../renzora_tonemapping" }
renzora_ssao = { path = "../renzora_ssao" }
renzora_ssr = { path = "../renzora_ssr" }
renzora_antialiasing = { path = "../renzora_antialiasing" }
renzora_motion_blur = { path = "../renzora_motion_blur" }
renzora_dof = { path = "../renzora_dof" }
# renzora_vignette intentionally NOT depended on -- it's a cdylib
# distribution plugin and linking it as an rlib triggers a duplicate
# `App::add_plugins` panic (registered twice: once from the rlib link,
# once when `dynamic_plugin_loader` dlopens the cdylib). Users add
# Vignette via the inspector's "Add Component" overlay.
renzora_night_stars = { path = "../renzora_night_stars" }
renzora_terrain = { path = "../renzora_terrain" }

[lints]
workspace = true
