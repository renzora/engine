[package]
name = "renzora_skybox"
version = "0.1.0"
edition = "2021"

[features]
default = []
editor = ["dep:renzora_editor", "dep:egui-phosphor", "dep:renzora_ui", "dep:rfd", "dep:renzora_ember", "dep:renzora_inspector"]

[dependencies]
bevy = { workspace = true }
egui-phosphor = { version = "0.11", features = ["regular"], optional = true }
renzora_editor = { path = "../renzora_editor", optional = true }
renzora = { path = "../renzora", default-features = false }
renzora_ui = { path = "../renzora_ui", optional = true }
serde = { version = "1", features = ["derive"] }
rfd = { version = "0.15", optional = true }
renzora_ember = { path = "../renzora_ember", optional = true }
renzora_inspector = { path = "../renzora_inspector", optional = true }

[lints]
workspace = true
