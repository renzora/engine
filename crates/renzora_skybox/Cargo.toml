[package]
name = "renzora_skybox"
version = "0.1.0"
edition = "2021"

# No `editor` feature: lean runtime crate. The Skybox inspector entry + native
# (ember) mode-specific inspector drawer + panorama file browser moved to the
# nested renzora_skybox_editor crate (crates/renzora_skybox/editor).

[dependencies]
bevy = { workspace = true }
renzora = { path = "../renzora", default-features = false }
serde = { version = "1", features = ["derive"] }

[lints]
workspace = true
