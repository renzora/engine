[package]
name = "renzora_procedural_tree_editor"
version = "0.1.0"
edition = "2021"
description = "Editor-only half of renzora_procedural_tree: the Add-Entity preset + Tree inspector. Registered via renzora::add!(.., Editor) and linked only by the editor bundle."

[dependencies]
bevy = { workspace = true }
renzora = { path = "../../renzora", default-features = false, features = ["editor"] }
bevy_procedural_tree = { path = "../../bevy_procedural_tree" }

[lints]
workspace = true
