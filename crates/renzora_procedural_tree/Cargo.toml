[package]
name = "renzora_procedural_tree"
version = "0.1.0"
edition = "2021"
description = "Procedural 3D tree generation distribution plugin. Wraps the vendored bevy_procedural_tree generator and ships as a dlopen plugin in plugins/, like the cloth/postprocess effects."

# Distribution plugin: ships as a standalone .dll/.so/.dylib that
# `dynamic_plugin_loader` picks up from the engine's `plugins/` directory at
# startup. cdylib keeps the export surface to the unmangled `extern "C"`
# symbols emitted by `renzora::add!` under the `dlopen` feature.
[lib]
crate-type = ["cdylib"]

[features]
default = ["dlopen"]
dlopen = []

[dependencies]
bevy = { workspace = true }
# The vendored procedural-tree generator this plugin exposes to the runtime.
bevy_procedural_tree = { path = "../bevy_procedural_tree" }
renzora = { path = "../renzora", default-features = false }

[lints]
workspace = true
