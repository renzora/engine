[package]
name = "renzora_gauges_editor"
version = "0.1.0"
edition = "2021"
description = "Editor-only half of renzora_gauges: the Gauges inspector entry + native (ember) attribute debug panel. Registered via renzora::add!(.., Editor) and linked only by the editor bundle."

[dependencies]
bevy = { workspace = true }
renzora = { path = "../../renzora", default-features = false, features = ["editor"] }
renzora_gauges = { path = ".." }
renzora_ember = { path = "../../renzora_ember" }

[lints]
workspace = true
