[package]
name = "renzora_gauges"
version = "0.1.0"
edition = "2021"

[features]
default = []
editor = ["dep:renzora_editor_framework", "dep:renzora_theme", "dep:egui-phosphor", "dep:bevy_egui"]

[dependencies]
bevy = { workspace = true }
bevy_gauge = "0.4"
renzora_core = { path = "../renzora_core" }

# Editor (optional)
renzora_editor_framework = { path = "../renzora_editor_framework", optional = true }
renzora_theme = { path = "../renzora_theme", optional = true }
bevy_egui = { version = "0.39", optional = true }
egui-phosphor = { version = "0.11", features = ["regular"], optional = true }
