[package]
name = "renzora_terrain"
version = "0.1.0"
edition = "2021"

[dependencies]
bevy = { workspace = true }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
png = "0.17"
renzora = { path = "../renzora", default-features = false }
# `default-features = false`: terrain only tags chunks with the avian-free
# collider DATA types (`PhysicsBodyData`/`CollisionShapeData`) — it never needs
# the avian backend. `renzora_runtime`'s `physics` feature turns the backend on
# (via `renzora_physics/avian`); a no-physics export keeps the data, drops avian.
renzora_physics = { path = "../renzora_physics", default-features = false }

[lints]
workspace = true
