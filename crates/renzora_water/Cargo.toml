[package]
name = "renzora_water"
version = "0.1.0"
edition = "2021"

# No `editor` feature: lean runtime crate. The WaterSurface / WaterInteractor /
# Buoyant inspector entries (egui-phosphor icons, renzora editor contract) and
# the dormant shore-particle module moved to the nested renzora_water_editor
# crate (crates/renzora_water/editor).

[dependencies]
bevy = { workspace = true }
renzora = { path = "../renzora", default-features = false }
serde = { version = "1", features = ["derive"] }
avian3d = { version = "0.5", default-features = false, features = ["3d", "f32"] }

[lints]
workspace = true
