[package]
name = "renzora_water"
version = "0.1.0"
edition = "2021"

[features]
editor = ["renzora/editor"]

[dependencies]
egui-phosphor = { workspace = true }
bevy = { workspace = true }
renzora = { path = "../renzora", default-features = false }
serde = { version = "1", features = ["derive"] }
avian3d = { version = "0.5", default-features = false, features = ["3d", "f32"] }

[lints]
workspace = true
