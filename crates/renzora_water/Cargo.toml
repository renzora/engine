[package]
name = "renzora_water"
version = "0.1.0"
edition = "2021"

[features]
editor = ["dep:renzora_editor_framework"]

[dependencies]
egui-phosphor = { workspace = true }
bevy = { workspace = true }
serde = { version = "1", features = ["derive"] }
avian3d = { version = "0.5", default-features = false, features = ["3d", "f32"] }
renzora_editor_framework = { path = "../renzora_editor_framework", optional = true }
