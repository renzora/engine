[package]
name = "renzora_hanabi"
version = "0.1.0"
edition = "2021"

[features]
editor = ["dep:renzora_editor_framework", "dep:renzora_theme", "dep:bevy_egui", "dep:egui-phosphor"]

[dependencies]
bevy = { workspace = true }
bevy_hanabi = { path = "../bevy_hanabi" }
renzora = { path = "../renzora", default-features = false }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
ron = "0.8"

# Editor-only deps
renzora_editor_framework = { path = "../renzora_editor_framework", optional = true }
renzora_theme = { path = "../renzora_theme", optional = true }
bevy_egui = { version = "0.39", optional = true }
egui-phosphor = { version = "0.11", features = ["regular"], optional = true }
