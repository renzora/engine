[package]
name = "renzora_atmosphere_editor"
version = "0.1.0"
edition = "2021"
description = "Editor-only inspector for renzora_atmosphere. Registered via renzora::add!(.., Editor) and linked only by the editor bundle."

[dependencies]
bevy = { workspace = true }
renzora = { path = "../../renzora", default-features = false, features = ["editor"] }
renzora_atmosphere = { path = ".." }

[lints]
workspace = true
