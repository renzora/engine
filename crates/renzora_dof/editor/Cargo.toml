[package]
name = "renzora_dof_editor"
version = "0.1.0"
edition = "2021"
description = "Editor-only inspector for renzora_dof. Registered via renzora::add!(.., Editor) and linked only by the editor bundle."

[dependencies]
bevy = { workspace = true }
renzora = { path = "../../renzora", default-features = false, features = ["editor"] }
renzora_dof = { path = ".." }
egui-phosphor = { workspace = true }

[lints]
workspace = true
