[package]
name = "renzora_dof"
version = "0.1.0"
edition = "2021"

# No `editor` feature: lean runtime crate. The inspector moved to the nested
# renzora_dof_editor crate (crates/renzora_dof/editor).

[dependencies]
renzora_macros = { path = "../renzora_macros" }
bevy = { workspace = true }
serde = { version = "1", features = ["derive"] }
renzora = { path = "../renzora", default-features = false }

[lints]
workspace = true
