[package]
name = "renzora_settings"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["dylib"]

[dependencies]
renzora_theme = { path = "../renzora_theme" }
egui-phosphor = { workspace = true }
bevy_egui = { workspace = true }
renzora_editor_framework = { path = "../renzora_editor_framework" }
bevy = { workspace = true }
renzora = { path = "../renzora", default-features = false, features = ["editor"] }
renzora_keybindings = { path = "../renzora_keybindings" }
renzora_viewport = { path = "../renzora_viewport" }
renzora_splash = { path = "../renzora_splash" }
renzora_input = { path = "../renzora_input" }
rfd = "0.15"
