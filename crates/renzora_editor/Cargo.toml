renzora_viewport           = { path = "../renzora_viewport", optional = true }
renzora_camera             = { path = "../renzora_camera", optional = true }
renzora_gizmo              = { path = "../renzora_gizmo", optional = true }
renzora_grid               = { path = "../renzora_grid", optional = true }
renzora_scene              = { path = "../renzora_scene", optional = true }
renzora_keybindings        = { path = "../renzora_keybindings", optional = true }
renzora_console            = { path = "../renzora_console", optional = true }
renzora_shell              = { path = "../renzora_shell", optional = true }
renzora_animation_editor   = { path = "../renzora_animation_editor", optional = true }
renzora_asset_browser      = { path = "../renzora_asset_browser", optional = true }
renzora_auth               = { path = "../renzora_auth", optional = true }
