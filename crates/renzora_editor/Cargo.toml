renzora_debugger           = { path = "../renzora_debugger", optional = true }
renzora_export             = { path = "../renzora_export", optional = true }
renzora_foliage_editor     = { path = "../renzora_foliage_editor", optional = true }
renzora_gamepad            = { path = "../renzora_gamepad", optional = true }
renzora_hierarchy          = { path = "../renzora_hierarchy", optional = true }
renzora_history            = { path = "../renzora_history", optional = true }
renzora_hub                = { path = "../renzora_hub", optional = true }
renzora_import_ui          = { path = "../renzora_import_ui", optional = true }
renzora_inspector          = { path = "../renzora_inspector", optional = true }
renzora_level_presets      = { path = "../renzora_level_presets", optional = true }
renzora_material_editor    = { path = "../renzora_material_editor", optional = true }
renzora_mesh_draw          = { path = "../renzora_mesh_draw", optional = true }
renzora_mesh_edit          = { path = "../renzora_mesh_edit", optional = true }
renzora_mixer              = { path = "../renzora_mixer", optional = true }
renzora_network_editor     = { path = "../renzora_network_editor", optional = true }
renzora_particle_editor    = { path = "../renzora_particle_editor", optional = true }
renzora_script_variables   = { path = "../renzora_script_variables", optional = true }
renzora_sequencer          = { path = "../renzora_sequencer", optional = true }
renzora_settings           = { path = "../renzora_settings", optional = true }
