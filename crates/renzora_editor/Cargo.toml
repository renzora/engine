[package]
name = "renzora_editor"
version = "0.1.0"
edition = "2021"
description = "Shared editor library for the Renzora engine (superset of renzora_runtime)"

# No longer a dylib — renzora.dll is the only SDK dylib.
# This crate is statically linked into the editor binary.

[features]
default = []
lua = []
editor = [
    "renzora_engine/editor",
    "renzora_physics/editor",
    "renzora_scripting/editor",
    "renzora_lighting/editor",
    "renzora_hanabi/editor",
    "renzora_tonemapping/editor",
    "renzora_bloom_effect/editor",
    "renzora_dof/editor",
    "renzora_motion_blur/editor",
    "renzora_antialiasing/editor",
    "renzora_distance_fog/editor",
    "renzora_atmosphere/editor",
    "renzora_ssao/editor",
    "renzora_ssr/editor",
    "renzora_auto_exposure/editor",
    "renzora_oit/editor",
    "renzora_skybox/editor",
    "renzora_night_stars/editor",
    "renzora_clouds/editor",
    "renzora_network/editor",
    "renzora_animation/editor",
    "renzora_water/editor",
    "renzora_game_ui/editor",
    "renzora_gauges/editor",
]

[dependencies]
bevy = { workspace = true }

# Core (same as renzora_runtime)
renzora_engine = { path = "../core/renzora_engine" }
renzora_core = { path = "../core/renzora_core" }
renzora_scripting = { path = "../core/renzora_scripting" }
renzora_blueprint = { path = "../core/renzora_blueprint" }
renzora_input = { path = "../core/renzora_input" }
renzora_physics = { path = "../core/renzora_physics" }
renzora_lifecycle = { path = "../core/renzora_lifecycle" }
renzora_terrain = { path = "../core/renzora_terrain" }
renzora_lighting = { path = "../core/renzora_lighting" }
renzora_water = { path = "../core/renzora_water" }
renzora_animation = { path = "../core/renzora_animation" }
renzora_game_ui = { path = "../core/renzora_game_ui" }
renzora_gauges = { path = "../core/renzora_gauges" }
renzora_hanabi = { path = "../core/renzora_hanabi" }
renzora_network = { path = "../core/renzora_network" }
renzora_audio = { path = "../core/renzora_audio" }
renzora_shader = { path = "../core/renzora_shader" }

# Postprocess framework + vital effects (same as renzora_runtime)
renzora_postprocess = { path = "../postprocessing/renzora_postprocess" }
renzora_tonemapping = { path = "../postprocessing/renzora_tonemapping" }
renzora_bloom_effect = { path = "../postprocessing/renzora_bloom_effect" }
renzora_antialiasing = { path = "../postprocessing/renzora_antialiasing" }
renzora_ssao = { path = "../postprocessing/renzora_ssao" }
renzora_ssr = { path = "../postprocessing/renzora_ssr" }
renzora_auto_exposure = { path = "../postprocessing/renzora_auto_exposure" }
renzora_oit = { path = "../postprocessing/renzora_oit" }
renzora_dof = { path = "../postprocessing/renzora_dof" }
renzora_motion_blur = { path = "../postprocessing/renzora_motion_blur" }
renzora_distance_fog = { path = "../postprocessing/renzora_distance_fog" }

# Environment (same as renzora_runtime)
renzora_atmosphere = { path = "../postprocessing/renzora_atmosphere" }
renzora_skybox = { path = "../postprocessing/renzora_skybox" }
renzora_clouds = { path = "../postprocessing/renzora_clouds" }
renzora_night_stars = { path = "../postprocessing/renzora_night_stars" }

# Editor framework
renzora_editor_framework = { path = "../editor/renzora_editor" }
renzora_splash = { path = "../ui/renzora_splash" }

# Critical editor infrastructure (must load before dynamic plugins)
renzora_viewport = { path = "../editor/renzora_viewport" }
renzora_camera = { path = "../editor/renzora_camera" }
renzora_gizmo = { path = "../editor/renzora_gizmo" }
renzora_grid = { path = "../editor/renzora_grid" }
renzora_scene = { path = "../editor/renzora_scene" }
renzora_keybindings = { path = "../editor/renzora_keybindings" }

# All other editor panels are standalone plugin DLLs loaded from plugins/
