# ── Dual-mode crates touched by the `editor` cascade above ───────────────────
# Non-optional: they arrive transitively anyway; listing them directly makes
# the `renzora_x/editor` feature refs in `[features].editor` resolvable and
# lets the keepalive cover them. They re-link as rlibs (accepted bloat from
# decision (a)); they install nothing extra at runtime (Editor-scope filter).
# Dual-mode crates NOT referenced by any `/editor` cascade (renzora_globals,
# renzora_input, renzora_blueprint, renzora_spline, renzora_audio,
# renzora_shader, renzora_postprocess) are omitted — they arrive transitively
# and hold no Editor-scope plugins for the bundle to install.
renzora_engine          = { path = "../renzora_engine" }
renzora_physics         = { path = "../renzora_physics" }
renzora_scripting       = { path = "../renzora_scripting" }
renzora_lighting        = { path = "../renzora_lighting" }
renzora_hanabi          = { path = "../renzora_hanabi" }
