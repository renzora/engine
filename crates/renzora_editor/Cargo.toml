[package]
name = "renzora_editor"
version = "0.1.0"
edition = "2021"
build = "build.rs"

# The editor bundle: ONE loadable cdylib that statically links every
# editor-only plugin crate (as rlibs) and exposes them through a single
# `extern "C"` entry point (`plugin_install_scope`) emitted by
# `renzora::export_plugin_bundle!` under the `dlopen` feature. The
# `dynamic_plugin_loader` dlopens it and installs its Editor-scope plugins.
#
# Present beside the host → the binary is the editor. Remove the dll → the
# same binary is the exported game.
#
# Step B: the bundle is now POPULATED. Its `editor` feature mirrors
# `renzora_runtime`'s `editor` feature exactly — the same editor-only `dep:`
# crates plus the same dual-mode `/editor` cascade — so the inspector/editor
# code inside the dual-mode crates compiles into this cdylib. The dual-mode
# crates re-link as rlibs here too (accepted bloat); they install nothing
# extra at runtime because `plugin_install_scope` is driven with host_scope =
# Editor and `PluginScope::matches` filters the fan-out to Editor-scope only —
# the dual-mode crates' Runtime/EditorAndRuntime plugins are installed by the
# host, never by the bundle.
[lib]
crate-type = ["cdylib"]

[features]
default = ["dlopen", "editor"]
# `dlopen` makes `export_plugin_bundle!` emit the FFI exports (resolves against
# THIS crate, the expansion site — same discipline as `renzora::add!`).
dlopen = []
# Mirror of `renzora_runtime`'s `editor` feature: pull every editor-only crate
# as a static rlib dep + cascade the dual-mode crates' own `editor` sub-feature
# so their inspector/editor code compiles into this bundle.
editor = [
    # Editor-only crates (foundation + panels)
    "dep:renzora_undo",
    "dep:renzora_editor_framework",
    "dep:renzora_splash",
    "dep:renzora_asset_registry",
    "dep:renzora_viewport",
    "dep:renzora_camera",
    "dep:renzora_gizmo",
    "dep:renzora_grid",
    "dep:renzora_scene",
    "dep:renzora_keybindings",
    "dep:renzora_console",
    "dep:renzora_shell",
    "dep:renzora_animation_editor",
    "dep:renzora_asset_browser",
    "dep:renzora_auth",
    "dep:renzora_blueprint_editor",
    "dep:renzora_code_editor",
    "dep:renzora_command_palette",
    "dep:renzora_context_menu",
    "dep:renzora_daw",
    "dep:renzora_debugger",
    "renzora_tracy/editor",
    "dep:renzora_export",
    "dep:renzora_foliage_editor",
    "dep:renzora_gamepad",
    "dep:renzora_hierarchy",
    "dep:renzora_history",
    "dep:renzora_hub",
    "dep:renzora_import_ui",
    "dep:renzora_inspector",
    "dep:renzora_level_presets",
    "dep:renzora_material_editor",
    "dep:renzora_mesh_draw",
    "dep:renzora_mesh_edit",
    "dep:renzora_mixer",
    "dep:renzora_network_editor",
    "dep:renzora_particle_editor",
    "dep:renzora_script_variables",
    "dep:renzora_sequencer",
    "dep:renzora_settings",
    "dep:renzora_shader_editor",
    "dep:renzora_shape_library",
    "dep:renzora_system_monitor",
    "dep:renzora_terrain_editor",
    "dep:renzora_test_component",
    "dep:renzora_theme_status",
    "dep:renzora_vst",
    # Cascade editor sub-features into the dual-mode crates (these arrive as
    # rlibs; this flips on their `editor` code so the panels compile here).
    # renzora_engine is fully split: its editor half is a separate dep crate.
    "dep:renzora_engine_editor",
    "renzora_physics/editor",
    "renzora_scripting/editor",
    "renzora_lighting/editor",
    "renzora_hanabi/editor",
    "dep:renzora_tonemapping_editor",
    "dep:renzora_bloom_effect_editor",
    "dep:renzora_dof_editor",
    "dep:renzora_motion_blur_editor",
    "dep:renzora_antialiasing_editor",
    "dep:renzora_distance_fog_editor",
    "dep:renzora_volumetric_fog_editor",
    "dep:renzora_atmosphere_editor",
    "dep:renzora_environment_map_editor",
    "dep:renzora_ssao_editor",
    "dep:renzora_ssr_editor",
    "dep:renzora_rt_editor",
    "dep:renzora_lumen_editor",
    "dep:renzora_auto_exposure_editor",
    "dep:renzora_oit_editor",
    "renzora_skybox/editor",
    "dep:renzora_night_stars_editor",
    "dep:renzora_clouds_editor",
    "renzora_network/editor",
    "renzora_animation/editor",
    "renzora_water/editor",
    "renzora_terrain/editor",
    "dep:renzora_game_ui_editor",
    "renzora_hui/editor",
    "renzora_gauges/editor",
    "dep:renzora_navmesh_editor",
]

[build-dependencies]
toml = "0.8"

[dependencies]
renzora = { path = "../renzora", default-features = false }

# ── Editor-only crates (the `dep:` entries flipped on by `editor`) ───────────
renzora_undo               = { path = "../renzora_undo", optional = true }
renzora_editor_framework             = { path = "../renzora_editor_framework", optional = true }
renzora_splash             = { path = "../renzora_splash", optional = true }
