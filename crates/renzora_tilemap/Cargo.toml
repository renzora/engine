[package]
name = "renzora_tilemap"
version = "0.1.0"
edition = "2021"
description = "2D tilemap runtime: a chunked quad-mesh renderer driven by a reflectable TilemapLayer component."

[dependencies]
bevy = { workspace = true }
serde = { version = "1", features = ["derive"] }
renzora = { path = "../renzora", default-features = false }
# Data types only (`default-features = false` = no avian): the collider builder
# tags merged tile rectangles with CollisionShapeData/Physics2d and the physics
# backend (when compiled in) turns them into real avian2d colliders — same
# pattern renzora_terrain uses for chunk colliders.
renzora_physics = { path = "../renzora_physics", default-features = false }

[lints]
workspace = true
