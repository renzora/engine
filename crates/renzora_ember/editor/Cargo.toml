[package]
name = "renzora_ember_editor"
version = "0.1.0"
edition = "2021"
description = "Editor-only markup editor (folded in from renzora_hui): the HTML-template entity preset + hierarchy icons + template-path inspector, and the bevy_ui style-component inspectors (Node/Background/Border/TextFont/TextColor/ImageNode) with markup writeback. Registered via renzora::add!(.., Editor) and linked only by the editor bundle."

[dependencies]
bevy = { workspace = true }
renzora = { path = "../../renzora", default-features = false, features = ["editor"] }
renzora_ember = { path = ".." }
bevy_hui = { path = "../../bevy_hui" }
image = { version = "0.25", default-features = false }

[lints]
workspace = true
