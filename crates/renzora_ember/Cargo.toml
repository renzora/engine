[package]
name = "renzora_ember"
version = "0.1.0"
edition = "2021"
description = "Renzora's unified bevy_ui UI framework — markup (HUI), widgets, docking, and particle UI (cinder) — shared by the editor and exported games."

[dependencies]
bevy = { workspace = true }
# Theme serialization: the per-widget Theme loads from project themes/*.toml
# (runtime-safe — the exported game uses the same Theme).
serde = { version = "1.0", features = ["derive"] }
toml = "0.8"
# HideInHierarchy + core types.
renzora = { path = "../renzora", default-features = false }
# Phosphor icon font + glyph lookup + CSS-style cursor icons (folding HUI into
# ember over time; for now ember reuses HUI's icon font + helpers).
renzora_hui = { path = "../renzora_hui" }

[lints]
workspace = true
