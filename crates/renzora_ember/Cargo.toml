[package]
name = "renzora_ember"
version = "0.1.0"
edition = "2021"
description = "Renzora's unified bevy_ui UI framework — markup (HUI), widgets, docking, and particle UI (cinder) — shared by the editor and exported games."

[features]
# `game_ui` gates the in-game `markup` module (the `.html` UI runtime). It's ON
# by default so the editor/dev build is unchanged, but the lean exporter drops it
# for a game with no markup UI — stripping `renzora_game_ui` (~3.8 MiB) AND the
# `bevy_hui` parser (~1.9 MiB), both of which are used ONLY by `markup`. The
# widget library, docking, theming and the foundational `cursor_icon`/`icons`
# helpers stay regardless (every widget needs them). `renzora_runtime` deps this
# crate with `default-features = false` and forwards its own `game_ui` feature.
default = ["game_ui"]
game_ui = ["dep:bevy_hui"]

[dependencies]
bevy = { workspace = true }
# Theme serialization: the per-widget Theme loads from project themes/*.toml
# (runtime-safe — the exported game uses the same Theme).
serde = { version = "1.0", features = ["derive"] }
toml = "0.8"
# HideInHierarchy + core types.
renzora = { path = "../renzora", default-features = false }
# Markup runtime (folded in from the former renzora_hui crate): the vendored
# bevy_hui parser, the game-UI canvas primitives, and the scripting bridge.
# Both are used only by the `markup` module → gated behind `game_ui`.
bevy_hui = { path = "../bevy_hui", optional = true }
# `default-features = false`: ember uses only core scripting types — the lean
# exporter strips the backends/blueprint/http via `renzora_runtime`'s forwarding,
# which only works if no other lean-closure crate forces the defaults back on.
renzora_scripting = { path = "../renzora_scripting", default-features = false }
# Send+Sync channel for the markdown widget's image downloads (background
# thread → per-frame poll), same as renzora_hub's thumbnail cache.
crossbeam-channel = "0.5"

# System clipboard for the code editor's cut/copy/paste. Native-only: arboard
# has no wasm backend (the browser clipboard is async + gesture-gated), so the
# editor's clipboard path no-ops on wasm.
[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
arboard = "3"
# Markdown image downloads (`![alt](url)`): fetch + decode on a background
# thread, register as bevy `Image` assets. wasm builds no-op the download.
ureq = "3"
image = { version = "0.25", default-features = false, features = ["png", "jpeg", "webp"] }

[dev-dependencies]
tempfile = "3"
# Same version as bevy_hui's — the template-parse test destructures
# `nom::Err` to format parse failures with file/line context.
nom = "7.1.3"

[lints]
workspace = true
