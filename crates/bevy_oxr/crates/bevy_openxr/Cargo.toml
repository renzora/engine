[package]
name = "bevy_mod_openxr"
description = "Community crate for OpenXR in Bevy"
version = "0.5.0"
edition = "2024"
repository = "https://github.com/awtterpip/bevy_oxr"
license = "MIT/Apache-2.0"
keywords = ["gamedev", "bevy", "Xr", "Vr", "OpenXR"]

[features]
default = ["vulkan"]
vulkan = ["dep:ash", "dep:android_system_properties"]
d3d12 = ["wgpu/dx12", "wgpu-hal/dx12", "dep:winapi"]
fb_passthrough = []
reflect = ["dep:bevy_reflect"]
window_support = ["dep:bevy_winit", "dep:bevy_window"]
raw_vulkan_init = []

[dev-dependencies]
bevy = { git = "https://github.com/bevyengine/bevy", tag = "v0.19.0" }

[target.'cfg(target_os = "android")'.dependencies]
ndk-context = "0.1"
jni = "0.20"
android_system_properties = { version = "0.1.5", optional = true }

# bevy can't be placed behind target or proc macros won't work properly
[dependencies]
bevy_ecs = { git = "https://github.com/bevyengine/bevy", tag = "v0.19.0", default-features = false }
bevy_math = { git = "https://github.com/bevyengine/bevy", tag = "v0.19.0", default-features = false }
bevy_render = { git = "https://github.com/bevyengine/bevy", tag = "v0.19.0", default-features = false }
bevy_app = { git = "https://github.com/bevyengine/bevy", tag = "v0.19.0", default-features = false }
bevy_reflect = { git = "https://github.com/bevyengine/bevy", tag = "v0.19.0", default-features = false, optional = true }
bevy_log = { git = "https://github.com/bevyengine/bevy", tag = "v0.19.0", default-features = false }
bevy_transform = { git = "https://github.com/bevyengine/bevy", tag = "v0.19.0", default-features = false }
bevy_camera = { git = "https://github.com/bevyengine/bevy", tag = "v0.19.0", default-features = false }
bevy_derive = { git = "https://github.com/bevyengine/bevy", tag = "v0.19.0", default-features = false }
bevy_platform = { git = "https://github.com/bevyengine/bevy", tag = "v0.19.0", default-features = false }
bevy_winit = { git = "https://github.com/bevyengine/bevy", tag = "v0.19.0", default-features = false, optional = true }
bevy_window = { git = "https://github.com/bevyengine/bevy", tag = "v0.19.0", default-features = false, optional = true }

# all other dependencies are placed under this since on wasm, this crate is completely empty
[target.'cfg(not(target_family = "wasm"))'.dependencies]
bevy_mod_xr = { path = "../bevy_xr", version = "0.5.0" }
openxr = "0.21.1"
thiserror = "2.0.3"
# Must match bevy 0.19's wgpu (29.x) — `raw_vulkan_init` hands raw wgpu objects
# to bevy's RenderDevice/RenderQueue, so a version skew makes them distinct types.
wgpu = "29"
wgpu-hal = "29"
ash = { version = "0.38", optional = true }

[target.'cfg(target_family = "unix")'.dependencies]
wgpu = { version = "29", features = ["vulkan-portability"] }

[target.'cfg(target_family = "windows")'.dependencies]
openxr = { version = "0.21.1", features = ["mint", "loaded"] }
winapi = { version = "0.3.9", optional = true }

[lints.clippy]
too_many_arguments = "allow"
type_complexity = "allow"
