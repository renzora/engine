[package]
name = "renzora_hui_editor"
version = "0.1.0"
edition = "2021"
description = "Editor-only half of renzora_hui: the HTML-template entity preset + hierarchy icons + template-path inspector, and the bevy_ui style-component inspectors (Node/Background/Border/TextFont/TextColor/ImageNode) with markup writeback. Registered via renzora::add!(.., Editor) and linked only by the editor bundle."

[dependencies]
bevy = { workspace = true }
renzora = { path = "../../renzora", default-features = false, features = ["editor"] }
renzora_hui = { path = ".." }
renzora_game_ui = { path = "../../renzora_game_ui" }
bevy_hui = { path = "../../bevy_hui" }

[lints]
workspace = true
