[package]
name = "renzora_hui"
version = "0.1.0"
edition = "2021"

[features]
# Editor-only canvas integration: tag built template nodes as draggable widgets,
# persist drag positions, and expose HtmlNode in the hierarchy/inspector. Off in
# shipped games, where bevy_hui owns layout.
editor = ["dep:renzora_editor", "dep:egui-phosphor"]

[dependencies]
bevy = { workspace = true }
bevy_hui = "0.6"
renzora = { path = "../renzora", default-features = false }
renzora_game_ui = { path = "../renzora_game_ui" }

# Editor-only deps
renzora_editor = { path = "../renzora_editor", optional = true }
egui-phosphor = { version = "0.11", features = ["regular"], optional = true }

[lints]
workspace = true
