[package]
name = "renzora_xr"
version = "0.1.0"
edition = "2021"
description = "XR/VR plugin for Renzora Engine — OpenXR stereo rendering, head tracking, controller input, hand tracking, locomotion"

[lib]
crate-type = ["dylib"]

[features]
default = ["editor"]
editor = ["renzora/editor"]

[dependencies]
bevy = { workspace = true }
renzora = { path = "../../renzora", default-features = false }
bevy_mod_openxr = { path = "../../third_party/bevy_oxr/crates/bevy_openxr", features = ["raw_vulkan_init"] }
bevy_mod_xr = { path = "../../third_party/bevy_oxr/crates/bevy_xr" }
bevy_xr_utils = { path = "../../third_party/bevy_oxr/crates/bevy_xr_utils" }
openxr = "0.21"
serde = { version = "1", features = ["derive"] }
log = "*"

[profile.dist]
inherits = "release"
opt-level = 2
