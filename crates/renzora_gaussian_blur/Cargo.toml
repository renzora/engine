[package]
name = "renzora_gaussian_blur"
version = "0.1.0"
edition = "2021"

# Distribution plugin: ships as a standalone .dll/.so/.dylib that
# `dynamic_plugin_loader` picks up from the engine's `plugins/`
# directory at startup. cdylib keeps the export surface to the
# unmangled `extern "C"` symbols emitted by `renzora::add!` under
# the `dlopen` feature.
[lib]
crate-type = ["cdylib"]

[features]
default = ["editor", "dlopen"]
dlopen = []
editor = ["renzora/editor", "dep:egui-phosphor"]

[dependencies]
renzora_macros = { path = "../renzora_macros" }
renzora_postprocess = { path = "../renzora_postprocess" }
renzora_editor_framework = { path = "../renzora_editor_framework" }
bevy = { workspace = true }
serde = { version = "1", features = ["derive"] }
egui-phosphor = { version = "0.11", features = ["regular"], optional = true }
renzora = { path = "../renzora", default-features = false }

[lints]
workspace = true
