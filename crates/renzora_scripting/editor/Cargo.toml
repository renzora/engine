[package]
name = "renzora_scripting_editor"
version = "0.1.0"
edition = "2021"
description = "Editor-only half of renzora_scripting: the ScriptComponent inspector entry (renzora editor contract + Phosphor icon). The native drawer lives in renzora_inspector. Registered via renzora::add!(.., Editor) and linked only by the editor bundle."

[dependencies]
bevy = { workspace = true }
renzora = { path = "../../renzora", default-features = false, features = ["editor"] }
renzora_scripting = { path = ".." }

[lints]
workspace = true
