[package]
name = "renzora_distance_fog"
version = "0.1.0"
edition = "2021"

# No `editor` feature: lean runtime crate. The inspector + native drawer moved to
# the nested renzora_distance_fog_editor crate (crates/renzora_distance_fog/editor).

[dependencies]
bevy = { workspace = true }
serde = { version = "1", features = ["derive"] }
renzora = { path = "../renzora", default-features = false }

[lints]
workspace = true
