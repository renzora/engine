[package]
name = "renzora_rpak"
version = "0.1.0"
edition = "2021"
description = "Renzora .rpak asset archive format — zstd-compressed pack files"

[dependencies]
zstd = "0.13"
cfg-if = "1"
toml = "0.8"

# Memory-mapped file backend for zero-copy reads on desktop/iOS. WASM and
# pure-bytes scenarios go through `BytesBackend` instead.
[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
memmap2 = "0.9"

[lints]
workspace = true
