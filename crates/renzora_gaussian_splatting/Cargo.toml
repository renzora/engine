[package]
name = "renzora_gaussian_splatting"
version = "0.1.0"
edition = "2021"
description = "3D Gaussian-splatting distribution plugin. Wraps the vendored bevy_gaussian_splatting renderer (.ply / .gcloud clouds) and resolves the serializable renzora::GaussianSplat contract component into live cloud handles; ships as a dlopen plugin in plugins/."

# Distribution plugin: ships as a standalone .dll/.so/.dylib that
# `dynamic_plugin_loader` picks up from the engine's `plugins/` directory at
# startup. cdylib keeps the export surface to the unmangled `extern "C"`
# symbols emitted by `renzora::add!` under the `dlopen` feature.
[lib]
crate-type = ["cdylib"]

[features]
default = ["editor", "dlopen"]
dlopen = []
editor = ["renzora/editor"]

[dependencies]
bevy = { workspace = true }
# The vendored gaussian-splatting renderer this plugin exposes to the runtime.
# Default features only (stable-rust set, see the vendored Cargo.toml) — no
# viewer/tooling extras.
bevy_gaussian_splatting = { path = "../bevy_gaussian_splatting" }
renzora = { path = "../renzora" }

# .sog bundle decoding (src/sog.rs): stored/deflate zip + lossless-WebP
# property images + meta.json.
zip = { version = "2", default-features = false, features = ["deflate"] }
image = { version = "0.25", default-features = false, features = ["webp"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[lints]
workspace = true
