[package]
name = "renzora_hierarchy"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["dylib"]

[dependencies]
renzora_macros = { path = "../renzora_macros" }
renzora_undo = { path = "../renzora_undo" }
renzora_theme = { path = "../renzora_theme" }
egui-phosphor = { workspace = true }
bevy_egui = { workspace = true }
renzora_editor_framework = { path = "../renzora_editor_framework" }
bevy = { workspace = true }
renzora = { path = "../renzora", default-features = false, features = ["editor"] }
renzora_blueprint = { path = "../renzora_blueprint" }
renzora_physics = { path = "../renzora_physics" }
