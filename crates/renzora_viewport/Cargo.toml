[package]
name = "renzora_viewport"
version = "0.1.0"
edition = "2021"


[dependencies]
renzora_undo = { path = "../renzora_undo" }
renzora_theme = { path = "../renzora_theme" }
renzora_ember = { path = "../renzora_ember" }
renzora_editor_framework = { path = "../renzora_editor_framework" }
bevy = { workspace = true }
renzora = { path = "../renzora", default-features = false, features = ["editor"] }
# Data types only (no avian): the 2D overlay draws the collider-edit chrome
# from `CollisionShapeData` + `ColliderEditMode` (the interaction half lives
# in renzora_gizmo::collider_edit_2d — the two crates don't link).
renzora_physics = { path = "../renzora_physics", default-features = false }
renzora_console = { path = "../renzora_console" }
renzora_ui = { path = "../renzora_ui" }
renzora_keybindings = { path = "../renzora_keybindings" }
renzora_animation = { path = "../renzora_animation" }
renzora_hanabi = { path = "../renzora_hanabi" }
renzora_blueprint = { path = "../renzora_blueprint" }
renzora_shader = { path = "../renzora_shader" }
renzora_terrain = { path = "../renzora_terrain" }
renzora_engine = { path = "../renzora_engine" }
renzora_import = { path = "../renzora_import" }
renzora_ember_editor = { path = "../renzora_ember/editor" }
serde_json = "1"
bytemuck = { version = "1.5", features = ["derive"] }

[lints]
workspace = true
