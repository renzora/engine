[package]
name = "renzora_splash"
version = "0.1.0"
edition = "2021"

[dependencies]
bevy = { workspace = true }
bevy_egui = "0.39"
renzora = { path = "../renzora", default-features = false }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
rfd = "0.15"
dirs = "6"

[target.'cfg(target_arch = "wasm32")'.dependencies]
web-sys = { version = "0.3", features = ["Window", "Storage", "console"] }
