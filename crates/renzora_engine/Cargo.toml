[package]
name = "renzora_engine"
version = "0.1.0"
edition = "2021"

# No `editor` feature: this crate is compiled lean. Its editor-only code moved
# to the nested `renzora_engine_editor` crate (crates/renzora_engine/editor),
# installed only by the editor bundle. Editor-vs-game is decided at runtime via
# `renzora::EditorSession`.

[features]
# Optional subsystems this core crate would otherwise drag into EVERY build â€”
# including the lean game export â€” even when a game never uses them. They're ON
# by default so the editor/dev/server build is byte-for-byte unchanged; the lean
# exporter drops one by depending on this crate with `default-features = false`
# (via `renzora_runtime`, which forwards only the kept subsystems). `audio` just
# re-exports the crate (see lib.rs); `animation` gates the scene-save deny of
# `AnimatorReadState` (see scene_io.rs). See `renzora_export::capabilities`.
default = ["audio", "animation", "terrain", "physics", "render_3d", "render_2d"]
# The 3D rendering pipeline: bevy_pbr (StandardMaterial/Mesh3d, deferred-vs-forward
# renderer, contact shadows, deferred prepass) + the renzora_shader graph-material
# system. Off = a 2D-only export (sprites + UI). Gates the scene-save 3D-material
# denies (scene_io.rs) and the render-mode/contact-shadow setup (lib.rs). NOTE: a
# full 2D build also needs the bevy `3d` meta-feature dropped at the root manifest
# + bevy_light handling â€” see plan (2D MODE).
render_3d = ["dep:renzora_shader", "renzora/render_3d"]
# The 2D sprite scene systems (scene_io.rs: SpriteImagePath image binding,
# SpriteCustomSize mirror, SpriteSheet frame cropping). Off = a 3D-only export
# with no sprite game-code. Mirror of `render_3d` in the other direction. NOTE:
# this cannot yet drop bevy's `2d` meta-feature at the root manifest â€” the
# window-blit present path (`renzora_runtime::viewport_stretch`) renders the
# offscreen viewport image with a bevy `Sprite` in EVERY export, 3D included.
# Until that blit is reworked, `render_2d` strips only our own sprite systems.
render_2d = []
audio = ["dep:renzora_audio"]
animation = ["dep:renzora_animation"]
# `terrain` only gates the scene-save deny of `TerrainCheckerboardMaterial`
# (scene_io.rs) â€” the sole renzora_terrain use in this crate.
terrain = ["dep:renzora_terrain"]
# `physics` gates the avian deny block in scene_io.rs (the only avian use â€” the
# `pub use renzora_physics` re-export below is the only renzora_physics use). The
# string-based `type_name.starts_with("avian3d::")` filters need no avian dep.
physics = ["dep:renzora_physics", "dep:avian3d"]

[dependencies]
renzora_macros = { path = "../renzora_macros" }
bevy = { workspace = true }
renzora = { path = "../renzora", default-features = false }
renzora_physics = { path = "../renzora_physics", optional = true }
renzora_rmip = { path = "../renzora_rmip" }
renzora_lighting = { path = "../renzora_lighting" }
renzora_shader = { path = "../renzora_shader", optional = true }
renzora_terrain = { path = "../renzora_terrain", optional = true }
renzora_network = { path = "../renzora_network" }
renzora_bsn = { path = "../renzora_bsn" }
renzora_rpak = { path = "../renzora_rpak" }
renzora_audio = { path = "../renzora_audio", optional = true }
# `default-features = false`: engine uses only core scripting types; backends/
# blueprint/http are forwarded from `renzora_runtime` (see its features). Keeping
# defaults here would pin them on for every lean export.
renzora_scripting = { path = "../renzora_scripting", default-features = false }
renzora_animation = { path = "../renzora_animation", default-features = false, optional = true }
futures-lite = "2"
ron = "0.8"
serde = "1"
thiserror = "2"
toml = "0.8"
avian3d = { path = "../avian/crates/avian3d", default-features = false, features = ["3d", "f32", "default-collider", "parry-f32"], optional = true }

[target.'cfg(not(any(target_arch = "wasm32", target_os = "android", target_os = "ios")))'.dependencies]
arboard = "3"
rfd = "0.15"

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
dirs = "6"

[lints]
workspace = true
