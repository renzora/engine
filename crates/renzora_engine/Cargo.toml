[package]
name = "renzora_engine"
version = "0.1.0"
edition = "2021"

# No `editor` feature: this crate is compiled lean. Its editor-only code moved
# to the nested `renzora_engine_editor` crate (crates/renzora_engine/editor),
# installed only by the editor bundle. Editor-vs-game is decided at runtime via
# `renzora::EditorSession`.

[dependencies]
renzora_macros = { path = "../renzora_macros" }
bevy = { workspace = true }
renzora = { path = "../renzora", default-features = false }
renzora_physics = { path = "../renzora_physics" }
renzora_rmip = { path = "../renzora_rmip" }
renzora_lighting = { path = "../renzora_lighting" }
renzora_shader = { path = "../renzora_shader" }
renzora_terrain = { path = "../renzora_terrain" }
renzora_network = { path = "../renzora_network" }
renzora_rpak = { path = "../renzora_rpak" }
renzora_audio = { path = "../renzora_audio" }
renzora_scripting = { path = "../renzora_scripting" }
renzora_animation = { path = "../renzora_animation", default-features = false }
futures-lite = "2"
ron = "0.8"
serde = "1"
thiserror = "2"
toml = "0.8"
avian3d = { version = "0.6", default-features = false, features = ["3d", "f32", "default-collider", "parry-f32"] }

[target.'cfg(not(any(target_arch = "wasm32", target_os = "android", target_os = "ios")))'.dependencies]
arboard = "3"
rfd = "0.15"

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
dirs = "6"

[lints]
workspace = true
