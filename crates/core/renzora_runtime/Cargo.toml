[package]
name = "renzora_runtime"
version = "0.1.0"
edition = "2021"

[features]
editor = ["dep:bevy_egui"]

[dependencies]
bevy = { version = "0.18" }
renzora_core = { path = "../renzora_core" }
renzora_physics = { path = "../renzora_physics" }
renzora_lighting = { path = "../renzora_lighting" }
renzora_terrain = { path = "../renzora_terrain" }
renzora_rpak = { path = "../renzora_rpak" }
renzora_audio = { path = "../renzora_audio" }
renzora_stinger = { path = "../renzora_stinger" }
futures-lite = "2"
ron = "0.8"
serde = "1"
toml = "0.8"
arboard = "3"
dirs = "6"
rfd = "0.15"
bevy_egui = { version = "0.39", optional = true }
