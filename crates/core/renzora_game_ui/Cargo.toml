[package]
name = "renzora_game_ui"
version = "0.1.0"
edition = "2021"

[features]
editor = [
    "dep:bevy_egui",
    "dep:egui-phosphor",
    "dep:renzora_editor_framework",
    "dep:renzora_theme",
    "dep:image",
]

[dependencies]
bevy = { workspace = true }
serde = { version = "1", features = ["derive"] }
renzora_core = { path = "../renzora_core" }

# Editor-only dependencies
bevy_egui = { version = "0.39", optional = true }
egui-phosphor = { version = "0.11", features = ["regular"], optional = true }
renzora_editor_framework = { path = "../../editor/renzora_editor", optional = true }
renzora_theme = { path = "../../ui/renzora_theme", optional = true }
image = { version = "0.25", default-features = false, optional = true }
