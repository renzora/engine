[package]
name = "renzora_terrain"
version = "0.1.0"
edition = "2021"

[features]
editor = ["dep:renzora_editor_framework", "dep:egui-phosphor"]

[dependencies]
bevy = { workspace = true }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
png = "0.17"
renzora_core = { path = "../renzora_core" }
renzora_editor_framework = { path = "../../editor/renzora_editor", optional = true }
egui-phosphor = { version = "0.11", features = ["regular"], optional = true }
avian3d = { version = "0.5", default-features = false, features = ["3d", "f32", "default-collider", "parry-f32"] }
