[package]
name = "renzora_import"
version = "0.1.0"
edition = "2021"
description = "3D model import and GLB conversion for Renzora"

[dependencies]
# GLB output
gltf-json = "1.4"
gltf = "1.4"

# Format parsers (pure Rust)
tobj = "4"
stl_io = "0.10"
ply-rs = "0.1"

# FBX (pure Rust)
fbxcel-dom = "0.0.10"
fbxcel = "0.9"

# Core types (AnimClip, BoneTrack, write_anim_file)
renzora_core = { path = "../renzora_core" }

# USDZ archive extraction
zip = "2"

# LZ4 decompression (USDC token tables, compressed arrays)
lz4_flex = "0.11"

# Float16 support (half-precision vertex data)
half = "2"

# Mesh optimization
meshopt = "0.3"

# Compression (legacy FBX binary arrays)
flate2 = "1"


# Collada XML parsing
quick-xml = "0.37"

# Utility
thiserror = "2"
log = "0.4"
serde_json = "1"
