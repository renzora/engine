[package]
name = "renzora_animation"
version = "0.1.0"
edition = "2021"

[features]
editor = ["dep:renzora_editor_framework", "dep:egui-phosphor", "dep:bevy_egui", "dep:renzora_theme", "dep:renzora_ui"]

[dependencies]
bevy = { workspace = true }
serde = { version = "1", features = ["derive"] }
ron = "0.8"
renzora_core = { path = "../renzora_core" }
renzora_editor_framework = { path = "../../editor/renzora_editor", optional = true }
egui-phosphor = { version = "0.11", features = ["regular"], optional = true }
bevy_egui = { version = "0.39", optional = true }
renzora_theme = { path = "../../ui/renzora_theme", optional = true }
renzora_ui = { path = "../../ui/renzora_ui", optional = true }
