[package]
name = "renzora_physics"
version = "0.1.0"
edition = "2021"

[features]
default = ["avian"]
avian = ["dep:avian3d"]
rapier = ["dep:bevy_rapier3d"]
editor = []

[dependencies]
bevy = { version = "0.18" }
serde = { version = "1", features = ["derive"] }

[dependencies.avian3d]
version = "0.5"
optional = true
default-features = false
features = ["3d", "f32", "default-collider", "parry-f32"]

# bevy_rapier3d not yet released for Bevy 0.18
[dependencies.bevy_rapier3d]
version = "0.29"
optional = true
default-features = false
features = ["dim3"]
