[package]
name = "renzora_audio"
version = "0.1.0"
edition = "2021"

[dependencies]
bevy = { version = "0.18", default-features = false }
serde = { version = "1", features = ["derive"] }
cfg-if = "1"

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
kira = { version = "0.12", features = ["cpal", "ogg", "mp3", "wav", "flac"] }
mint = "0.5"
