[package]
name = "renzora_hanabi"
version = "0.1.0"
edition = "2021"

[features]
editor = ["dep:renzora_editor", "dep:renzora_theme", "dep:bevy_egui", "dep:egui-phosphor"]

[dependencies]
bevy = { version = "0.18" }
bevy_hanabi = { version = "0.18" }
renzora_core = { path = "../renzora_core" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
ron = "0.8"

# Editor-only deps
renzora_editor = { path = "../../editor/renzora_editor", optional = true }
renzora_theme = { path = "../../ui/renzora_theme", optional = true }
bevy_egui = { version = "0.39", optional = true }
egui-phosphor = { version = "0.11", features = ["regular"], optional = true }
