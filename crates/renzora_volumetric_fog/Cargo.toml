[package]
name = "renzora_volumetric_fog"
version = "0.1.0"
edition = "2021"

[features]
default = []
editor = ["renzora/editor", "dep:egui-phosphor"]

[dependencies]
bevy = { workspace = true }
serde = { version = "1", features = ["derive"] }
renzora = { path = "../renzora", default-features = false }
egui-phosphor = { version = "0.11", features = ["regular"], optional = true }

[lints]
workspace = true
