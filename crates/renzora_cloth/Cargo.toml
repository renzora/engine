[package]
name = "renzora_cloth"
version = "0.1.0"
edition = "2021"
description = "Cloth physics (verlet) distribution plugin. Wraps the vendored bevy_silk engine and ships as a dlopen plugin in plugins/, like the postprocess effects."

# Distribution plugin: ships as a standalone .dll/.so/.dylib that
# `dynamic_plugin_loader` picks up from the engine's `plugins/` directory at
# startup. cdylib keeps the export surface to the unmangled `extern "C"`
# symbols emitted by `renzora::add!` under the `dlopen` feature.
[lib]
crate-type = ["cdylib"]

[features]
default = ["dlopen"]
dlopen = []

[dependencies]
bevy = { workspace = true }
# The vendored verlet cloth engine this plugin exposes to the runtime.
bevy_silk = { path = "../bevy_silk" }
renzora = { path = "../renzora", default-features = false }

[lints]
workspace = true
