[package]
name = "plugin_host"
version = "0.1.0"
edition = "2021"
description = "Plugin host for discovering, loading, and managing editor plugins"

[dependencies]
bevy = { version = "0.18", default-features = false }
editor_plugin_api = { path = "../editor_plugin_api", features = ["bevy"] }
renzora_core = { path = "../../core/renzora_core" }
serde_json = "1"

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
libloading = "0.8"
notify = "8"
