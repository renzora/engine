[package]
name = "renzora_environment_map_editor"
version = "0.1.0"
edition = "2021"
description = "Editor-only inspector for renzora_environment_map. Registered via renzora::add!(.., Editor) and linked only by the editor bundle."

[dependencies]
bevy = { workspace = true }
renzora = { path = "../../renzora", default-features = false, features = ["editor"] }
renzora_environment_map = { path = ".." }
egui-phosphor = { workspace = true }

[lints]
workspace = true
