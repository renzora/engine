[package]
name = "renzora_environment_map"
version = "0.1.0"
edition = "2021"
description = "Image-based lighting (IBL) component — controls sky-derived environment map intensity on cameras. Independent of the atmosphere effect; can be added/removed via inspector."

# No `editor` feature: lean runtime crate. The inspector moved to the nested
# renzora_environment_map_editor crate (crates/renzora_environment_map/editor).

[dependencies]
bevy = { workspace = true }
serde = { version = "1", features = ["derive"] }
renzora = { path = "../renzora", default-features = false }
# For `sun_horizon_factor` — sky-derived IBL fades with the sun so the
# scene goes properly dark at night (no residual atmospheric ambient).
renzora_lighting = { path = "../renzora_lighting" }

[lints]
workspace = true
