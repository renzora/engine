[package]
name = "renzora_postprocess"
version = "0.1.0"
edition = "2021"

# Thin re-export shim. The framework itself now lives in `renzora`
# (module `renzora::postprocess`, behind its `postprocess` feature) so it
# ships inside `renzora.dll` rather than a separate dylib. This crate is a
# zero-symbol `rlib` that just re-exports that module, keeping every existing
# `renzora_postprocess::…` path (effect plugins + the `post_process` macro)
# compiling unchanged. Because the real types belong to `renzora`, all
# plugins still share one `PostProcessRegistry` / one `TypeId` via `renzora.dll`.
[lib]
crate-type = ["rlib"]

[dependencies]
renzora = { path = "../renzora", default-features = false, features = ["postprocess"] }

[lints]
workspace = true
