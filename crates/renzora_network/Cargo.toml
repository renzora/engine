[package]
name = "renzora_network"
version = "0.1.0"
edition = "2021"

[features]
default = []
editor = []

[dependencies]
bevy = { workspace = true }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
renzora = { path = "../renzora", default-features = false }
log = "0.4"

# Native-only: from-scratch UDP networking lives behind this cfg (wasm has no
# UDP sockets). The transport is std `UdpSocket`; bincode is the wire format.
[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
bincode = { version = "2", features = ["serde"] }

[dev-dependencies]
serde_json = "1"

[lints]
workspace = true
