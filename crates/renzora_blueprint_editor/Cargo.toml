[package]
name = "renzora_blueprint_editor"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["dylib"]

[dependencies]
bevy = { workspace = true }
renzora = { path = "../renzora", default-features = false, features = ["editor"] }
renzora_ui = { path = "../renzora_ui" }
renzora_blueprint = { path = "../renzora_blueprint" }
renzora_scripting = { path = "../renzora_scripting" }
