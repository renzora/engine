[package]
name = "renzora_rt"
version = "0.1.0"
edition = "2021"
description = "Screen-space global illumination for Renzora. Lumen's ScreenSpace tier."

[dependencies]
bevy = { workspace = true }
renzora = { path = "../renzora" }
renzora_editor = { path = "../renzora_editor", optional = true }
egui-phosphor = { workspace = true, optional = true }
serde = { version = "1.0", features = ["derive"] }
bytemuck = { version = "1.5", features = ["derive"] }

[features]
editor = ["dep:renzora_editor", "dep:egui-phosphor"]

[lints]
workspace = true
