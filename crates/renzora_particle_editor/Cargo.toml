[package]
name = "renzora_particle_editor"
version = "0.1.0"
edition = "2021"

[dependencies]
renzora_editor_framework = { path = "../renzora_editor_framework" }
bevy = { workspace = true }
renzora = { path = "../renzora", default-features = false, features = ["editor"] }
bevy_hanabi = { path = "../bevy_hanabi" }
renzora_ember = { path = "../renzora_ember" }
renzora_hanabi = { path = "../renzora_hanabi" }
# For the relocated HanabiEffect inspector entry (moved here from
# renzora_hanabi's editor feature when it went lean): asset_drop_field.
renzora_inspector = { path = "../renzora_inspector" }
renzora_undo = { path = "../renzora_undo" }
ron = "0.8"

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
rfd = "0.15"

[lints]
workspace = true
