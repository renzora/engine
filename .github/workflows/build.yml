name: Build Editor

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: renzora.exe
            artifact: renzora-editor-windows-x64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: renzora
            artifact: renzora-editor-linux-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: renzora
            artifact: renzora-editor-macos-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Vulkan SDK
        if: runner.os != 'macOS'
        uses: humbletim/install-vulkan-sdk@v1.2
        with:
          version: latest
          cache: true

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libudev-dev \
            libwayland-dev \
            libxkbcommon-dev \
            libvulkan-dev

      - name: Build editor
        run: cargo build --profile dist --features editor --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: target/${{ matrix.target }}/dist/${{ matrix.binary }}

  web:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-bindgen-cli
        run: cargo install wasm-bindgen-cli

      - name: Build editor for WASM
        run: cargo build --profile dist --features editor --target wasm32-unknown-unknown

      - name: Run wasm-bindgen
        run: |
          wasm-bindgen \
            --out-dir web-dist \
            --out-name renzora \
            --target web \
            target/wasm32-unknown-unknown/dist/renzora.wasm
          cp web/index.html web-dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: renzora-editor-web
          path: web-dist/
