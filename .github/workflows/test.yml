name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Vulkan SDK
        uses: humbletim/install-vulkan-sdk@v1.2
        with:
          version: latest
          cache: true

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libudev-dev \
            libwayland-dev \
            libxkbcommon-dev \
            libvulkan-dev \
            mold

      - uses: Swatinem/rust-cache@v2

      # CI tests the engine's own crates only. The vendored Bevy-ecosystem
      # crates (bevy_*, vleue_navigator) are third-party code copied into the
      # tree; running their test suites and examples just re-tests upstream
      # against our Bevy version and breaks on every API drift — noise, not
      # signal. They are still built as dependencies; we just don't run their
      # tests. New first-party crates stay covered automatically via --workspace.
      #
      # renzora_shader is first-party but has 9 pre-existing test failures from
      # the material-graph rework era (see commit 5370748); excluded until that
      # suite is cleaned up.
      - name: Run tests
        run: |
          cargo test --workspace \
            --exclude renzora_shader \
            --exclude bevy_gauge \
            --exclude bevy_hanabi \
            --exclude bevy_mod_outline \
            --exclude bevy_silk \
            --exclude vleue_navigator \
            --exclude bevy_mod_openxr \
            --exclude bevy_mod_xr \
            --exclude bevy_xr_utils
