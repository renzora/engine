name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Both jobs run INSIDE the shared base toolchain image
# (ghcr.io/renzora/base) — native Linux `cargo test`/`clippy` need only
# rustc 1.93 + the Linux dev libs (alsa/udev/wayland/xkbcommon/vulkan/mold),
# which the base carries; the per-platform cross toolchains (osxcross/xwin/NDK)
# aren't needed to test first-party crates. We pin `:latest` rather than the
# content-hash tag because this workflow and docker-image.yml are independent —
# on a push that changes a Dockerfile the hash-tagged image may not be published
# yet; `:latest` with eventual consistency is fine for tests.

jobs:
  test:
    runs-on: ubuntu-latest
    container: ghcr.io/renzora/base:latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: Swatinem/rust-cache@v2

      # Tests the engine's own crates only. The vendored Bevy-ecosystem crates
      # (bevy_*, vleue_navigator) are third-party code copied into the tree;
      # running their suites just re-tests upstream against our Bevy version and
      # breaks on every API drift — noise, not signal. They're still built as
      # dependencies; we just don't run their tests. New first-party crates stay
      # covered automatically via --workspace.
      - name: Run tests
        run: |
          cargo test --workspace \
            --exclude bevy_firefly \
            --exclude bevy_gauge \
            --exclude bevy_gaussian_splatting \
            --exclude bevy_hanabi \
            --exclude bevy_hui \
            --exclude bevy_mod_outline \
            --exclude bevy_silk \
            --exclude glam_matrix_extras \
            --exclude vleue_navigator \
            --exclude bevy_mod_openxr \
            --exclude bevy_mod_xr \
            --exclude bevy_xr_utils

  clippy:
    runs-on: ubuntu-latest
    container: ghcr.io/renzora/base:latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      # The image deliberately doesn't ship the clippy component (it would make
      # the parallel docker build lanes race on the rustup component download),
      # so add it to the image's toolchain here.
      - name: Install clippy
        run: rustup component add clippy

      - uses: Swatinem/rust-cache@v2

      # Lints the engine's own crates (same first-party scope as `test`).
      # `--no-deps` keeps clippy off the vendored crates that leak in as
      # path-deps. `too_many_arguments` / `type_complexity` are allowed because
      # they're inherent to Bevy systems and queries (Bevy allows them too).
      - name: Clippy
        run: |
          cargo clippy --workspace --no-deps \
            --exclude bevy_firefly \
            --exclude bevy_gaussian_splatting \
            --exclude bevy_hanabi \
            --exclude bevy_hui \
            --exclude bevy_mod_outline \
            --exclude bevy_silk \
            --exclude glam_matrix_extras \
            --exclude vleue_navigator \
            --exclude polyanya \
            --exclude bevy_mod_openxr \
            --exclude bevy_mod_xr \
            --exclude bevy_xr_utils \
            -- -D warnings \
            -A clippy::too_many_arguments \
            -A clippy::type_complexity
